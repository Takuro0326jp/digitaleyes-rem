<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1300">
<title>新しいパスワードの設定 | Real Estate Manager by DIGITALEYES</title>
<link rel="stylesheet" href="common.css">
<style>
body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-card { background: #fff; padding: 48px 44px; width: 420px; box-shadow: 0 8px 40px rgba(0,0,0,0.2); }
.login-logo { text-align: center; margin-bottom: 32px; }
.login-logo h1 { font-size: 20px; font-weight: 700; color: rgb(70,83,98); margin-bottom: 4px; }
.login-logo p { font-size: 12px; color: rgb(53,124,176); }
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: rgb(70,83,98); margin-bottom: 6px; }
.form-group input { width: 100%; padding: 9px 12px; border: 1px solid #ced4da; font-size: 14px; font-family: inherit; color: rgb(70,83,98); box-sizing: border-box; }
.form-group input:focus { outline: none; border-color: rgb(53,124,176); }
.btn-login { width: 100%; padding: 11px; background: rgb(53,124,176); color: #fff; border: none; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 6px; }
.btn-login:hover { background: rgb(40,100,150); }
.btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
.error-msg { color: #cc0000; font-size: 13px; margin-top: 10px; display: none; padding: 8px 12px; background: #fff3f3; border: 1px solid #ffcccc; }
.ok-msg { color: #1b5e20; font-size: 13px; margin-top: 10px; display: none; padding: 8px 12px; background: #f1fff2; border: 1px solid #b7e2ba; }
.note { font-size: 11px; color: rgb(150,160,170); line-height: 1.55; margin-top: 16px; }
.back { margin-top: 20px; text-align: center; font-size: 13px; }
.back a { color: rgb(53,124,176); text-decoration: none; }
</style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <h1>Real Estate Manager</h1>
    <p>by DIGITALEYES</p>
  </div>
  <p id="introText" style="margin:0 0 18px;font-size:14px;color:rgb(70,83,98);line-height:1.6">新しいパスワードを入力してください（8文字以上）。</p>
  <div id="formBlock">
    <div class="form-group">
      <label>新しいパスワード</label>
      <input type="password" id="newPassword" placeholder="8文字以上" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label>新しいパスワード（確認）</label>
      <input type="password" id="newPassword2" placeholder="もう一度入力" autocomplete="new-password">
    </div>
    <div id="errorMsg" class="error-msg"></div>
    <div id="okMsg" class="ok-msg"></div>
    <button type="button" class="btn-login" id="btnSubmit" onclick="submitReset()">パスワードを設定</button>
  </div>
  <p class="note" id="tokenWarn" style="display:none">リンクが無効か期限切れです。ログイン画面の「パスワードを忘れた方はこちら」から再度お手続きください。</p>
  <div class="back"><a href="login.html">ログイン画面へ</a></div>
</div>
<script>
const API_BASE = window.location.protocol === "file:" ? "http://localhost:3001" : "";
const params = new URLSearchParams(window.location.search);
let resetToken = params.get("token") || "";

function hideMsgs() {
  document.getElementById("errorMsg").style.display = "none";
  document.getElementById("okMsg").style.display = "none";
}
function showErr(msg) {
  const el = document.getElementById("errorMsg");
  el.textContent = msg;
  el.style.display = "block";
}
function showOk(msg) {
  const el = document.getElementById("okMsg");
  el.textContent = msg;
  el.style.display = "block";
}

(function init() {
  if (!resetToken) {
    document.getElementById("formBlock").style.display = "none";
    document.getElementById("introText").style.display = "none";
    document.getElementById("tokenWarn").style.display = "block";
  }
})();

async function submitReset() {
  hideMsgs();
  if (!resetToken) {
    showErr("再設定用のトークンがありません。");
    return;
  }
  const newPassword = document.getElementById("newPassword").value;
  const newPassword2 = document.getElementById("newPassword2").value;
  if (newPassword.length < 8) {
    showErr("パスワードは8文字以上にしてください");
    return;
  }
  if (newPassword !== newPassword2) {
    showErr("パスワード（確認）が一致しません");
    return;
  }
  const btn = document.getElementById("btnSubmit");
  btn.disabled = true;
  btn.textContent = "保存中...";
  try {
    const res = await fetch(`${API_BASE}/auth/reset-password`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token: resetToken, newPassword, newPasswordConfirm: newPassword2 }),
    });
    const data = await res.json();
    if (!data.ok) {
      showErr(data.message || "設定に失敗しました");
      return;
    }
    showOk(data.message || "パスワードを更新しました。");
    document.getElementById("formBlock").style.display = "none";
    document.getElementById("introText").textContent = "パスワードを更新しました。ログイン画面からログインしてください。";
    resetToken = "";
  } catch (e) {
    showErr("接続エラー：サーバーが起動しているか確認してください");
  } finally {
    btn.disabled = false;
    btn.textContent = "パスワードを設定";
  }
}

document.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && resetToken) submitReset();
});
</script>
</body>
</html>
