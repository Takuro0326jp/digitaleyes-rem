<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1300">
<title>アカウント設定 | Real Estate Manager by DIGITALEYES</title>
<link rel="stylesheet" href="common.css">
<style>
.form-row { display:flex; gap:12px; flex-wrap:wrap; }
.form-group { margin-bottom: 14px; }
.form-group label { display:block; font-size:12px; font-weight:600; color:rgb(70,83,98); margin-bottom:6px; }
.form-group input, .form-group select { width:100%; padding:8px 10px; border:1px solid #ced4da; font-size:14px; font-family:inherit; color:rgb(70,83,98); }
.form-group input:focus, .form-group select:focus { outline:none; border-color:rgb(53,124,176); }
.err { font-size:12px; color:#cc0000; margin-top:6px; display:none; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; display: none; align-items: center; justify-content: center; }
.modal-box { background: #fff; width: 720px; box-shadow: 0 8px 40px rgba(0,0,0,0.2); }
.modal-header { background: rgb(70,83,98); padding: 14px 20px; display:flex; align-items:center; justify-content:space-between; }
.modal-header h3 { color:#fff; font-size:15px; font-weight:600; }
.modal-close { background:none; border:none; color:#fff; font-size:20px; cursor:pointer; }
.modal-body { padding: 20px; }
.modal-footer { padding: 12px 20px; border-top: 1px solid rgb(224,224,224); display:flex; justify-content:flex-end; gap:8px; }
.tag { display:inline-block; padding:2px 8px; border-radius: 2px; font-size:11px; border:1px solid rgb(224,224,224); color:rgb(70,83,98); background:#fff; }
.tag.master { border-color: rgba(122,74,184,.45); background: rgba(122,74,184,.08); font-weight:600; }
.tag.admin { border-color: rgba(53,124,176,.4); background: rgba(53,124,176,.06); }
.tag.staff { border-color: rgba(0,130,60,.35); background: rgba(0,130,60,.06); }
.prop-checks { display:flex; flex-wrap:wrap; gap:10px; padding:10px; border:1px solid rgb(224,224,224); background:#fff; }
.prop-checks label { display:flex; align-items:center; gap:6px; font-size:13px; color:rgb(70,83,98); }
</style>
</head>
<body>
<div id="wrapper">
<div id="page-wrapper">
  <header class="header" id="header"></header>
  <main class="main">
    <div class="page-title-bar">
      <h1>アカウント設定</h1>
      <span id="totalLabel" style="font-size:13px;color:rgb(120,130,140)"></span>
    </div>

    <div id="mailSmtpHint" style="display:none;max-width:900px;margin-bottom:14px;padding:10px 14px;border-radius:6px;font-size:13px;line-height:1.5"></div>

    <div class="action-row">
      <button class="btn btn-primary-solid btn-sm" id="btnNew" onclick="openCreate()">新規登録</button>
    </div>

    <div id="tableArea"></div>
    <div class="pagination" id="pagination"></div>
  </main>
</div>
</div>

<!-- 作成/編集 -->
<div class="modal-overlay" id="editModal" onclick="closeEdit()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="editTitle">アカウント</h3>
      <button class="modal-close" onclick="closeEdit()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-row">
        <div class="form-group" style="flex:1;min-width:260px">
          <label>担当者名 <span style="color:#cc0000">*</span></label>
          <input id="fName" type="text" placeholder="例：吉田 崇">
          <div class="err" id="eName"></div>
        </div>
        <div class="form-group" style="flex:1;min-width:260px">
          <label>E-mail <span style="color:#cc0000">*</span></label>
          <input id="fEmail" type="email" placeholder="example@company.com">
          <div class="err" id="eEmail"></div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group" style="flex:1;min-width:220px">
          <label>権限 <span style="color:#cc0000">*</span></label>
          <select id="fRole" onchange="onRoleChange()"></select>
          <div class="err" id="eRole"></div>
        </div>
        <div class="form-group" style="flex:1;min-width:220px">
          <label>クライアント <span style="color:#cc0000">*</span></label>
          <select id="fClient" onchange="onClientChange()"></select>
          <div class="err" id="eClient"></div>
        </div>
      </div>

      <div id="propBlock">
        <div class="form-group">
          <label>担当物件 <span style="color:#cc0000">*</span></label>
          <p id="propFilterHint" style="margin:0 0 8px;font-size:12px;color:rgb(120,130,140);line-height:1.5"></p>
          <div class="prop-checks" id="propChecks"></div>
          <div class="err" id="eProps"></div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group" style="flex:1;min-width:220px">
          <label>パスワード（任意・8文字以上）</label>
          <input id="fPassword" type="password" placeholder="空欄可">
          <div class="err" id="ePassword"></div>
        </div>
        <div class="form-group" style="flex:1;min-width:220px">
          <label>パスワード（確認）</label>
          <input id="fPassword2" type="password" placeholder="空欄可">
          <div class="err" id="ePassword2"></div>
        </div>
      </div>
      <p id="passwordInviteNote" style="display:none;margin:0 0 14px;padding:10px 12px;background:#f6f9fc;border:1px solid rgb(220,230,240);border-radius:6px;font-size:12px;line-height:1.55;color:rgb(70,83,98)">
        <strong>招待メールで案内する場合</strong>：パスワードは<strong>空欄のままで構いません</strong>。保存後に一覧の「招待」を押すと、<strong>新しい仮パスワードがメールで届きます</strong>（そのパスワードで初回ログインしてください）。手動で決める場合は8文字以上を両方に入力してください。
      </p>

      <div id="formMsg" class="error-box" style="display:none"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-sm" onclick="closeEdit()">キャンセル</button>
      <button class="btn btn-primary-solid btn-sm" onclick="saveAccount()">保存</button>
    </div>
  </div>
</div>

<!-- 削除 -->
<div class="modal-overlay" id="deleteModal" onclick="closeDelete()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3>削除確認</h3>
      <button class="modal-close" onclick="closeDelete()">✕</button>
    </div>
    <div class="modal-body" id="deleteText"></div>
    <div class="modal-footer">
      <button class="btn btn-sm" onclick="closeDelete()">キャンセル</button>
      <button class="btn btn-sm" style="color:#cc0000;border-color:#cc0000" onclick="confirmDelete()">削除する</button>
    </div>
  </div>
</div>

<script src="common.js"></script>
<script>
const LIMIT = 10;
const REM_ROLE_MASTER = 1;
const REM_ROLE_CLIENT_ADMIN = 2;
const REM_ROLE_PROPERTY_MANAGER = 3;
function remIsMaster(role) { return Number(role) === REM_ROLE_MASTER; }
function remIsAdminLike(role) {
  const n = Number(role);
  return n === REM_ROLE_MASTER || n === REM_ROLE_CLIENT_ADMIN;
}
function remIsPropertyManager(role) { return Number(role) === REM_ROLE_PROPERTY_MANAGER; }
function remSeesAllProperties(role) { return remIsAdminLike(role); }

function fillRoleSelect(selected) {
  const me = Auth.getUser();
  const sel = document.getElementById("fRole");
  if (!sel) return;
  let html = '<option value="">選択してください</option>';
  if (remIsMaster(me?.role)) {
    html += '<option value="1">マスター</option>';
  }
  html += '<option value="2">クライアント管理者</option><option value="3">物件管理者</option>';
  sel.innerHTML = html;
  const v = selected != null && selected !== "" ? String(selected) : "";
  if (v && [...sel.options].some((o) => o.value === v)) sel.value = v;
}

let accounts = [];
let props = [];
let clientsMaster = [];
let currentPage = 1;
let deleteId = null;

function safePropName(p) {
  const raw = p?.name ?? p?.propertyName ?? "";
  const s = String(raw).trim();
  return s && s !== "undefined" ? s : `物件(${p?.id || "-"})`;
}

function propNameById(id) {
  const p = props.find((x) => String(x.id) === String(id));
  return p ? safePropName(p) : `物件(${id})`;
}

function getPageFromUrl() {
  const p = parseInt(new URLSearchParams(location.search).get("page"), 10);
  return Number.isFinite(p) && p > 0 ? p : 1;
}
function setPageToUrl(p) {
  const u = new URL(location.href);
  u.searchParams.set("page", String(p));
  history.replaceState(null, "", u.toString());
}

function roleTag(role) {
  const r = Number(role);
  if (r === REM_ROLE_MASTER) return '<span class="tag master">マスター</span>';
  if (r === REM_ROLE_CLIENT_ADMIN) return '<span class="tag admin">クライアント管理者</span>';
  return '<span class="tag staff">物件管理者</span>';
}

function renderTable() {
  const me = Auth.getUser();
  const total = accounts.length;
  const pages = Math.max(1, Math.ceil(total / LIMIT));
  if (currentPage > pages) currentPage = pages;
  setPageToUrl(currentPage);
  document.getElementById("totalLabel").textContent = `総件数: ${total.toLocaleString()}件`;

  const start = (currentPage - 1) * LIMIT;
  const rows = accounts.slice(start, start + LIMIT);
  if (!rows.length) {
    document.getElementById("tableArea").innerHTML = '<div class="empty-msg">アカウントがありません</div>';
    document.getElementById("pagination").innerHTML = "";
    return;
  }

  const canAdmin = remIsAdminLike(me?.role);
  document.getElementById("btnNew").style.display = canAdmin ? "inline-block" : "none";

  let html = `<div class="table-scroll"><table class="list-table">
    <thead><tr>
      <th>担当者名</th><th>E-mail</th><th>権限</th><th>クライアント</th><th>担当物件</th>
      <th style="width:90px">招待</th><th style="width:90px">詳細</th><th style="width:90px">削除</th>
    </tr></thead><tbody>`;
  rows.forEach(a => {
    const propNames = (a.propertyIds || []).map((id) => propNameById(id)).filter(Boolean);
    const isMe = a.id === me?.id;
    const isMasterUser = Number(a.role) === 1;
    const delDisabled = isMe || isMasterUser;
    html += `<tr>
      <td style="font-weight:600">${a.name || ""}</td>
      <td style="color:rgb(53,124,176)">${a.email || ""}</td>
      <td>${roleTag(Number(a.role))}</td>
      <td>${a.client || ""}</td>
      <td>${remSeesAllProperties(a.role) ? "全物件" : (propNames.length ? propNames.join(" / ") : "―")}</td>
      <td><button class="btn btn-sm" ${canAdmin ? "" : "disabled"} onclick="sendInvite('${a.id}')">招待</button></td>
      <td><button class="btn btn-sm" onclick="openEdit('${a.id}')">詳細</button></td>
      <td><button class="btn btn-sm" ${delDisabled ? "disabled" : ""} style="color:#cc0000;border-color:#cc0000" onclick="openDelete('${a.id}')">削除</button></td>
    </tr>`;
  });
  html += "</tbody></table></div>";
  document.getElementById("tableArea").innerHTML = html;

  if (pages <= 1) { document.getElementById("pagination").innerHTML = ""; return; }
  let pHtml = `<button onclick="goPage(${currentPage-1})" ${currentPage===1?"disabled":""}>＜</button>`;
  const from = Math.max(1, currentPage-4), to = Math.min(pages, from+8);
  for (let p = from; p <= to; p++) pHtml += `<button class="${p===currentPage?"active":""}" onclick="goPage(${p})">${p}</button>`;
  pHtml += `<button onclick="goPage(${currentPage+1})" ${currentPage===pages?"disabled":""}>＞</button>`;
  document.getElementById("pagination").innerHTML = pHtml;
}

function goPage(p) {
  const pages = Math.max(1, Math.ceil(accounts.length / LIMIT));
  if (p < 1 || p > pages) return;
  currentPage = p;
  renderTable();
  window.scrollTo(0, 0);
}

async function loadAll() {
  const me = Auth.getUser();
  const canAdmin = remIsAdminLike(me?.role);

  const [aRes, pRes, cRes] = await Promise.all([
    fetch(`${CONFIG.API_BASE}/user/accounts`, { headers: { Authorization: `Bearer ${Auth.getToken()}` } }),
    fetch(`${CONFIG.API_BASE}/user/properties`, { headers: { Authorization: `Bearer ${Auth.getToken()}` } }),
    fetch(`${CONFIG.API_BASE}/client/master`, { headers: { Authorization: `Bearer ${Auth.getToken()}` } }),
  ]);
  const aData = await aRes.json();
  const pData = await pRes.json();
  const cData = await cRes.json();
  if (!aData.ok) throw new Error(aData.message || "アカウント取得に失敗しました");
  if (!pData.ok) throw new Error(pData.message || "物件取得に失敗しました");
  if (!cData.ok) throw new Error(cData.message || "クライアント取得に失敗しました");
  accounts = aData.accounts || [];
  props = pData.properties || [];
  clientsMaster = cData.clients || [];
  renderClientSelect();

  if (!canAdmin) {
    // 担当者は自分のみ（サーバーでも絞っている想定だが二重で安全に）
    accounts = accounts.filter(a => a.id === me?.id);
  }
  renderTable();
}

function escapeHtmlAttr(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;")
    .replace(/"/g, "&quot;")
    .replace(/</g, "&lt;");
}
function renderClientSelect(selected = "") {
  const el = document.getElementById("fClient");
  if (!el) return;
  const me = Auth.getUser();
  const sel = String(selected || "").trim();
  let list = clientsMaster || [];
  if (remIsAdminLike(me?.role) && !remIsMaster(me?.role)) {
    const mc = String(me?.client || "").trim();
    if (mc) {
      list = list.filter((c) => String(c.name || "").trim() === mc);
      if (!list.length) list = [{ name: mc }];
    } else {
      list = [];
    }
  }
  const names = new Set((list || []).map((c) => String(c.name || "").trim()).filter(Boolean));
  let extra = "";
  if (sel && !names.has(sel)) {
    extra = `<option value="${escapeHtmlAttr(sel)}">${escapeHtmlAttr(sel)}</option>`;
  }
  const options = (list || [])
    .map((c) => {
      const n = String(c.name || "").trim();
      if (!n) return "";
      return `<option value="${escapeHtmlAttr(n)}">${escapeHtmlAttr(n)}</option>`;
    })
    .join("");
  el.innerHTML = `<option value="">選択してください</option>${options}${extra}`;
  if (sel) el.value = sel;
}

function resetErrors() {
  ["eName","eEmail","eRole","eClient","eProps","ePassword","ePassword2"].forEach(id => {
    const el = document.getElementById(id);
    el.style.display = "none";
    el.textContent = "";
  });
  document.getElementById("formMsg").style.display = "none";
}

function setErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = "block";
}

function propsForSelectedClient() {
  const client = document.getElementById("fClient").value.trim();
  if (!client) return [];
  return props.filter((p) => String(p.clientName || "").trim() === client);
}

function onRoleChange() {
  const role = document.getElementById("fRole").value;
  document.getElementById("propBlock").style.display = role === "3" ? "block" : "none";
  if (role === "3") {
    const allowed = new Set(propsForSelectedClient().map((p) => String(p.id)));
    const sel = selectedPropIds().filter((id) => allowed.has(String(id)));
    renderPropChecks(sel);
  } else {
    updatePropFilterHint();
  }
}

function onClientChange() {
  if (document.getElementById("fRole").value !== "3") return;
  const allowed = new Set(propsForSelectedClient().map((p) => String(p.id)));
  const sel = selectedPropIds().filter((id) => allowed.has(String(id)));
  renderPropChecks(sel);
}

function updatePropFilterHint() {
  const hint = document.getElementById("propFilterHint");
  if (!hint) return;
  if (document.getElementById("fRole").value !== "3") {
    hint.textContent = "";
    return;
  }
  const client = document.getElementById("fClient").value.trim();
  if (!client) {
    hint.textContent =
      "先にクライアントを選ぶと、そのクライアントに紐づいた物件だけが表示されます。紐づけはクライアント詳細の「紐づく物件」で設定してください。";
    return;
  }
  const list = propsForSelectedClient();
  if (!list.length) {
    hint.textContent =
      "このクライアントに紐づく物件がありません。クライアント詳細の「紐づく物件」でチェックしてください。";
    return;
  }
  hint.textContent = `このクライアントに紐づく物件 ${list.length} 件を表示しています。`;
}

function renderPropChecks(selected) {
  const sel = (selected || []).map((x) => String(x));
  const wrap = document.getElementById("propChecks");
  wrap.innerHTML = "";
  const role = document.getElementById("fRole").value;
  const list = role === "3" ? propsForSelectedClient() : props;
  list.forEach((p) => {
    const checked = sel.includes(String(p.id));
    const pid = `prop_${p.id}`;
    wrap.innerHTML += `<label><input type="checkbox" id="${pid}" value="${p.id}" ${checked ? "checked" : ""}>${safePropName(p)}</label>`;
  });
  updatePropFilterHint();
}

function selectedPropIds() {
  return props.filter(p => document.getElementById(`prop_${p.id}`)?.checked).map(p => p.id);
}

function openCreate() {
  resetErrors();
  document.getElementById("editTitle").textContent = "新規登録";
  document.getElementById("editId").value = "";
  document.getElementById("fName").value = "";
  document.getElementById("fEmail").value = "";
  fillRoleSelect("");
  const me = Auth.getUser();
  renderClientSelect(
    remIsAdminLike(me?.role) && !remIsMaster(me?.role)
      ? String(me?.client || "").trim()
      : ""
  );
  document.getElementById("fPassword").value = "";
  document.getElementById("fPassword2").value = "";
  const note = document.getElementById("passwordInviteNote");
  if (note) note.style.display = "block";
  renderPropChecks([]);
  onRoleChange();
  document.getElementById("editModal").style.display = "flex";
}

function openEdit(id) {
  resetErrors();
  const a = accounts.find(x => x.id === id);
  if (!a) return;
  document.getElementById("editTitle").textContent = "詳細（編集）";
  document.getElementById("editId").value = a.id;
  document.getElementById("fName").value = a.name || "";
  document.getElementById("fEmail").value = a.email || "";
  fillRoleSelect(a.role);
  renderClientSelect(a.client || "");
  document.getElementById("fPassword").value = "";
  document.getElementById("fPassword2").value = "";
  const note = document.getElementById("passwordInviteNote");
  if (note) note.style.display = "none";
  onRoleChange();
  renderPropChecks(a.propertyIds || []);
  document.getElementById("editModal").style.display = "flex";
}

function closeEdit() { document.getElementById("editModal").style.display = "none"; }

async function saveAccount() {
  resetErrors();
  const id = document.getElementById("editId").value;
  const name = document.getElementById("fName").value.trim();
  const email = document.getElementById("fEmail").value.trim();
  const role = document.getElementById("fRole").value;
  const client = document.getElementById("fClient").value.trim();
  const password = document.getElementById("fPassword").value;
  const passwordConfirm = document.getElementById("fPassword2").value;
  const propertyIds = selectedPropIds();

  let ok = true;
  if (!name) { setErr("eName", "必須です"); ok = false; }
  if (!email) { setErr("eEmail", "必須です"); ok = false; }
  else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setErr("eEmail", "形式が不正です"); ok = false; }
  if (!role) { setErr("eRole", "選択してください"); ok = false; }
  if (!client) { setErr("eClient", "必須です"); ok = false; }
  if (!id) {
    const hasPwd = password.length > 0 || passwordConfirm.length > 0;
    if (hasPwd) {
      if (password.length < 8) { setErr("ePassword", "8文字以上で入力してください"); ok = false; }
      if (password !== passwordConfirm) { setErr("ePassword2", "一致しません"); ok = false; }
    }
  } else if (password) {
    if (password.length < 8) { setErr("ePassword", "8文字以上で入力してください"); ok = false; }
    if (password !== passwordConfirm) { setErr("ePassword2", "一致しません"); ok = false; }
  }
  if (role === "3") {
    const clientSel = document.getElementById("fClient").value.trim();
    const list = propsForSelectedClient();
    if (!clientSel) {
      setErr("eClient", "物件管理者では必須です");
      ok = false;
    } else if (!list.length) {
      setErr("eProps", "このクライアントに紐づく物件がありません。クライアント一覧の「詳細を開く」から「紐づく物件」で設定してください。");
      ok = false;
    } else if (propertyIds.length === 0) {
      setErr("eProps", "1件以上選択してください");
      ok = false;
    } else {
      const allowedIds = new Set(list.map((p) => String(p.id)));
      if (propertyIds.some((pid) => !allowedIds.has(String(pid)))) {
        setErr("eProps", "選択した物件が、選んだクライアントに紐づく一覧と一致しません。");
        ok = false;
      }
    }
  }
  if (!ok) return;

  const payload = { name, email, role: Number(role), client, propertyIds, password, passwordConfirm };
  const url = id ? `${CONFIG.API_BASE}/user/accounts/${encodeURIComponent(id)}` : `${CONFIG.API_BASE}/user/accounts`;
  const method = id ? "PUT" : "POST";
  try {
    const res = await fetch(url, {
      method,
      headers: { Authorization: `Bearer ${Auth.getToken()}`, "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    let d = {};
    const ct = res.headers.get("content-type") || "";
    if (ct.includes("application/json")) {
      d = await res.json();
    } else {
      const text = await res.text();
      throw new Error(text.slice(0, 200) || `HTTP ${res.status}`);
    }
    if (!d.ok) {
      document.getElementById("formMsg").textContent = d.message || `保存に失敗しました（${res.status}）`;
      document.getElementById("formMsg").style.display = "block";
      return;
    }
    closeEdit();
    await requireAuth();
    currentPage = getPageFromUrl();
    await loadAll();
  } catch (e) {
    console.error(e);
    document.getElementById("formMsg").textContent = e.message || "通信エラー：ネットワークまたはサーバーを確認してください";
    document.getElementById("formMsg").style.display = "block";
  }
}

function openDelete(id) {
  const me = Auth.getUser();
  if (id === me?.id) return;
  const a = accounts.find(x => x.id === id);
  if (!a) return;
  if (Number(a.role) === 1) return;
  deleteId = id;
  document.getElementById("deleteText").textContent = `${a.name} のアカウントを削除します。この操作は取り消せません。`;
  document.getElementById("deleteModal").style.display = "flex";
}
function closeDelete() { deleteId = null; document.getElementById("deleteModal").style.display = "none"; }
async function confirmDelete() {
  if (!deleteId) return;
  const res = await fetch(`${CONFIG.API_BASE}/user/accounts/${encodeURIComponent(deleteId)}`, {
    method: "DELETE",
    headers: { Authorization: `Bearer ${Auth.getToken()}` },
  });
  const d = await res.json();
  if (!d.ok) { alert(d.message || "削除に失敗しました"); return; }
  closeDelete();
  await loadAll();
}

async function refreshMailSmtpHint() {
  const el = document.getElementById("mailSmtpHint");
  if (!el) return;
  try {
    const res = await fetch(`${CONFIG.API_BASE}/user/mail-status`, {
      headers: { Authorization: `Bearer ${Auth.getToken()}` },
    });
    const d = await res.json();
    if (!res.ok || !d.ok) return;
    el.style.display = "block";
    if (d.smtpConfigured) {
      el.className = "";
      el.style.background = "#f0fff4";
      el.style.border = "1px solid #b2dfdb";
      el.style.color = "rgb(50,70,60)";
      el.innerHTML =
        '<span>招待メール: SMTP が設定されています。「招待」で送信するか、下のボタンで<strong>ログイン中のメール宛にテスト送信</strong>して疎通を確認できます。</span> ' +
        '<button type="button" class="btn btn-sm" id="btnMailTest" onclick="sendMailTest()">テスト送信</button>';
    } else {
      el.className = "error-box";
      el.style.background = "";
      el.style.border = "";
      el.style.color = "";
      el.innerHTML =
        "招待メール: <strong>SMTP が未設定</strong>です。ローカルは <code>.env</code>、本番は Vercel の Environment Variables に <code>SMTP_HOST</code>・<code>SMTP_PORT</code>（例: 587）・<code>SMTP_USER</code>・<code>SMTP_PASS</code>・<code>MAIL_FROM</code>（任意）を設定し、サーバーを再起動／再デプロイしてください。";
    }
  } catch (_) {}
}

async function sendMailTest() {
  const me = Auth.getUser();
  if (!remIsAdminLike(me?.role)) return;
  if (!confirm(`ログイン中のアドレス（${me.email || ""}）へテストメールを送ります。よろしいですか？`)) return;
  try {
    const res = await fetch(`${CONFIG.API_BASE}/user/mail-test`, {
      method: "POST",
      headers: { Authorization: `Bearer ${Auth.getToken()}`, "Content-Type": "application/json" },
      body: "{}",
    });
    const d = await res.json().catch(() => ({}));
    if (!res.ok || !d.ok) {
      alert(d.message || "テスト送信に失敗しました");
      return;
    }
    alert("テストメールを送信しました。受信トレイ（迷惑メールフォルダも含む）を確認してください。");
  } catch (e) {
    alert(e.message || "通信に失敗しました");
  }
}

async function sendInvite(id) {
  const a = accounts.find((x) => x.id === id);
  if (!a) return;
  const ok = confirm(`${a.name || ""}（${a.email || ""}）へ招待メールを送信します。よろしいですか？`);
  if (!ok) return;
  const payload = {
    loginUrl: `${location.origin}/login.html`,
  };
  const res = await fetch(`${CONFIG.API_BASE}/user/accounts/${encodeURIComponent(id)}/invite`, {
    method: "POST",
    headers: { Authorization: `Bearer ${Auth.getToken()}`, "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });
  const d = await res.json();
  if (!res.ok || !d.ok) {
    alert(d.message || "招待メール送信に失敗しました");
    return;
  }
  alert("招待メールを送信しました");
}

(async () => {
  if (!await requireAuth()) return;
  const me = Auth.getUser();
  document.getElementById("header").innerHTML = renderHeader("account.html");
  currentPage = getPageFromUrl();
  if (!remIsAdminLike(me?.role) && !remIsPropertyManager(me?.role)) {
    document.getElementById("tableArea").innerHTML = '<div class="error-box">⚠️ 権限情報が不正です</div>';
    return;
  }
  try {
    await loadAll();
    if (remIsAdminLike(me?.role)) await refreshMailSmtpHint();
  } catch (e) { document.getElementById("tableArea").innerHTML = `<div class="error-box">⚠️ ${e.message}</div>`; }
})();
</script>
