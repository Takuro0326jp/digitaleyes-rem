<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1300">
<title>物件詳細 | Real Estate Manager by DIGITALEYES</title>
<link rel="stylesheet" href="common.css">
<style>
.page-stack { display:flex; flex-direction:column; gap:14px; }
.panel { background:#fff; border:1px solid rgb(224,224,224); padding:16px 18px; }
.header-top { display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
.title-wrap { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.meta { color:rgb(120,130,140); font-size:12px; }
.status-badge { display:inline-block; padding:3px 9px; border-radius:12px; font-size:11px; font-weight:700; color:#fff; }
.status-sold { background:#6c757d; }
.status-sale { background:#2f86d5; }
.status-prep { background:#d78a2f; }
.cards { display:grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap:10px; }
.card { border:1px solid rgb(234,234,234); border-radius:6px; padding:12px; background:#fafafa; min-height:68px; }
.card .k { font-size:11px; color:rgb(120,130,140); }
.card .v { font-size:20px; font-weight:700; color:rgb(70,83,98); margin-top:6px; }
.sec-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.sec-head h2 { font-size:15px; margin:0; }
.detail-grid { display:grid; grid-template-columns: 200px 1fr; gap:10px 14px; }
.detail-grid dt { font-weight:600; color:rgb(70,83,98); }
.detail-grid dd { margin:0; color:rgb(70,83,98); }
.thumbs { display:flex; gap:10px; flex-wrap:wrap; }
.thumb { width:160px; border:1px solid #ddd; color:#999; font-size:12px; background:#f2f2f2; border-radius:4px; overflow:hidden; }
.thumb-img { width:100%; height:108px; object-fit:cover; display:block; background:#eee; }
.thumb-meta { padding:6px; background:#fff; border-top:1px solid #eee; }
.upload-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:10px; }
.log-list { margin:0; padding-left:18px; color:rgb(90,100,110); font-size:13px; }
details > summary { cursor:pointer; font-weight:600; color:rgb(70,83,98); margin-bottom:8px; }
.field-input { width:100%; padding:8px 10px; border:1px solid #ced4da; font-family:inherit; }
.field-input.dirty { border-color: rgb(53,124,176); background: rgb(246,251,255); }
.room-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:center; justify-content:center; z-index:1200; }
.room-modal { width:min(1220px,95vw); max-height:92vh; background:#fff; border-radius:8px; border:1px solid #d7dde5; display:flex; flex-direction:column; }
.room-modal-head { padding:12px 14px; border-bottom:1px solid #e5e9ef; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.room-modal-head h3 { margin:0; font-size:16px; margin-right:auto; }
.room-modal-body { padding:12px 14px; overflow:auto; }
.room-scroll { max-height:54vh; overflow:auto; border:1px solid #e1e6ed; border-radius:6px; }
.room-table { width:100%; border-collapse:collapse; font-size:13px; }
.room-table th,.room-table td { border-bottom:1px solid #edf1f5; padding:8px; vertical-align:top; }
.room-table th { position:sticky; top:0; background:#f8fafc; z-index:2; font-weight:600; }
.room-detail-row { background:#f7f8fa; }
.room-row-input { width:100%; padding:6px 8px; border:1px solid #ced4da; font-family:inherit; box-sizing:border-box; }
.room-actions { padding:10px 14px; border-top:1px solid #e5e9ef; display:flex; justify-content:flex-end; gap:8px; }
.drop-zone { border:1px dashed #9fb3c9; background:#f7fbff; border-radius:6px; padding:12px; text-align:center; font-size:12px; color:#4d6278; }
.panel-switch { display:none; }
.panel-switch.open { display:block; }
@media (max-width: 1200px) { .cards { grid-template-columns: repeat(2, minmax(0,1fr)); } }
</style>
</head>
<body>
<div id="wrapper">
<div id="page-wrapper">
  <header class="header" id="header"></header>
  <main class="main">
    <div class="page-title-bar">
      <h1>物件詳細</h1>
      <a class="btn btn-sm" href="property.html" onclick="return confirmLeaveIfDirty()">一覧へ戻る</a>
    </div>
    <div id="content"><div class="loading-spinner"></div></div>
  </main>
</div>
</div>
<div id="roomModalOverlay" class="room-modal-overlay">
  <div class="room-modal">
    <div class="room-modal-head">
      <h3>居室情報</h3>
      <button class="btn btn-primary-solid btn-sm" type="button" onclick="showRoomCsvPanel()">CSVインポート</button>
      <button class="btn btn-sm" type="button" id="btnRoomToggleSelect" onclick="toggleSelectAllRooms()">全て選択</button>
      <button class="btn btn-sm" type="button" style="color:#cc0000;border-color:#cc0000" onclick="deleteSelectedRooms()">削除</button>
      <button class="btn btn-sm" type="button" onclick="closeRoomModal()">閉じる</button>
    </div>
    <div class="room-modal-body">
      <div id="roomListPanel" class="panel-switch open">
        <div class="room-scroll">
          <table class="room-table">
            <thead>
              <tr>
                <th style="width:42px"></th>
                <th style="min-width:210px">タイプ名・号棟名</th>
                <th style="min-width:180px">居室情報（図面番号）</th>
                <th style="min-width:150px">間取り</th>
                <th style="min-width:140px">図面（画像登録）</th>
                <th style="width:90px">詳細</th>
              </tr>
            </thead>
            <tbody id="roomRows"></tbody>
          </table>
        </div>
      </div>
      <div id="roomCsvPanel" class="panel-switch">
        <h4 style="margin:0 0 10px">CSVアップロード</h4>
        <p style="margin:0 0 10px;font-size:12px"><a href="javascript:void(0)" onclick="downloadRoomCsvTemplate()">CSVテンプレートをダウンロード</a></p>
        <div class="drop-zone" id="roomCsvDropZone">CSVファイルをドラッグ＆ドロップ、または選択してください</div>
        <div style="margin-top:8px"><input id="roomCsvFile" type="file" accept=".csv,text/csv"></div>
        <p style="font-size:12px;color:#667; margin-top:6px">（CSVのみ対応）</p>
        <div style="margin-top:10px;display:flex;gap:8px">
          <button class="btn btn-primary-solid btn-sm" type="button" onclick="registerRoomCsv()">CSVを登録する</button>
          <button class="btn btn-sm" type="button" onclick="showRoomListPanel()">キャンセル</button>
        </div>
      </div>
      <div id="roomImagePanel" class="panel-switch">
        <h4 style="margin:0 0 10px">画像アップロード</h4>
        <div class="drop-zone" id="roomImageDropZone">PDF / jpg / jpeg / png / webp をドラッグ＆ドロップ、または選択してください</div>
        <div style="margin-top:8px"><input id="roomImageFile" type="file" accept=".pdf,.jpg,.jpeg,.png,.webp,application/pdf,image/jpeg,image/png,image/webp"></div>
        <div style="margin-top:8px">
          <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px">ALTテキスト（必須）</label>
          <input id="roomImageAlt" class="room-row-input" placeholder="例: Aタイプ図面">
        </div>
        <div style="margin-top:10px;display:flex;gap:8px">
          <button class="btn btn-primary-solid btn-sm" type="button" onclick="registerRoomImage()">画像を登録する</button>
          <button class="btn btn-sm" type="button" onclick="showRoomListPanel()">キャンセル</button>
        </div>
      </div>
    </div>
    <div class="room-actions">
      <button class="btn btn-sm" type="button" onclick="addRoomRow()">行を追加</button>
      <button class="btn btn-primary-solid btn-sm" type="button" onclick="confirmRegisterRooms()">登録</button>
    </div>
  </div>
</div>
<script src="common.js"></script>
<script>
function dash(v) { return v == null || String(v).trim() === "" ? "―" : String(v); }
function dateOnly(v) { return dash(v).slice(0, 10); }
function num(v) { return v == null || v === "" ? "―" : Number(v).toLocaleString(); }
function salesLabel(p) { return p.salesStatus || (p.isSoldOut ? "完売" : "販売中"); }
function salesClass(label) {
  if (label.includes("完売")) return "status-sold";
  if (label.includes("準備")) return "status-prep";
  return "status-sale";
}
function isAdmin() {
  const r = Number(Auth.getUser()?.role || 0);
  return r === 1 || r === 2;
}
function attrEsc(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;")
    .replace(/"/g, "&quot;")
    .replace(/</g, "&lt;");
}
function toYmd(v) {
  const s = String(v || "").trim();
  if (!s) return "";
  const m = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (m) return `${m[1]}-${String(m[2]).padStart(2, "0")}-${String(m[3]).padStart(2, "0")}`;
  const d = new Date(s);
  if (Number.isNaN(d.getTime())) return "";
  const y = d.getFullYear();
  const mo = String(d.getMonth() + 1).padStart(2, "0");
  const da = String(d.getDate()).padStart(2, "0");
  return `${y}-${mo}-${da}`;
}
function elapsedDaysFrom(ymd) {
  const n = toYmd(ymd);
  if (!n) return "";
  const s = new Date(`${n}T00:00:00`);
  if (Number.isNaN(s.getTime())) return "";
  const now = new Date();
  now.setHours(0, 0, 0, 0);
  const diff = Math.floor((now.getTime() - s.getTime()) / 86400000);
  return diff >= 0 ? String(diff) : "0";
}
async function fetchPropertySalesMetrics(totalUnits) {
  const qs = new URLSearchParams();
  if (String(totalUnits || "").trim()) qs.set("totalUnits", String(totalUnits).trim());
  const res = await fetch(`${CONFIG.API_BASE}/local/property-sales-metrics?${qs.toString()}`, {
    headers: { Authorization: `Bearer ${Auth.getToken()}` },
  });
  const d = await res.json();
  if (!res.ok || !d.ok) throw new Error(d.message || "販売指標の取得に失敗しました");
  return d.metrics || {};
}
let currentPropertyId = null;
let currentPropertyData = null;
let propertyDirty = false;
const ROOM_CSRF_TOKEN = "LzMAvKBmJ5jpiYMJjNkg9Wo7EfIbpcf5PfLeX5X2";
const ROOM_MADORI_OPTIONS = ["1R","1K","1DK","1LDK","2LDK","3LDK","4LDK","5LDK","6LDK以上","その他"];
let roomDraft = [];
let roomImageTargetId = "";
let roomSelectAll = false;

function uid() { return (crypto?.randomUUID?.() || `r_${Date.now()}_${Math.random().toString(16).slice(2)}`); }
function emptyRoomItem() {
  return {
    id: uid(),
    csrfToken: ROOM_CSRF_TOKEN,
    propertyId: currentPropertyId || "",
    checked: false,
    openDetail: false,
    typeName: "",
    drawingInfo: "",
    madori: "",
    imageName: "",
    imageData: "",
    imageAlt: "",
    roomNo: "",
    salePrice: "",
    landPrice: "",
    buildingPrice: "",
    tax: "",
    prepaidGroundRent: "",
    keyMoney: "",
    discountAmount: "",
    salesPhase: "",
  };
}
function normalizeRoomItems(raw) {
  if (!Array.isArray(raw) || !raw.length) return [];
  return raw.map((x) => ({ ...emptyRoomItem(), ...(x || {}), id: String(x?.id || uid()), propertyId: currentPropertyId || "" }));
}
function roomSummaryText(items = roomDraft) {
  const names = items.map((x) => String(x.typeName || "").trim()).filter(Boolean);
  return [...new Set(names)].join(", ");
}

function setPropertyDirty(v) {
  propertyDirty = Boolean(v);
  const saveBtns = document.querySelectorAll("button[data-save-kind]");
  saveBtns.forEach((b) => {
    b.style.borderColor = propertyDirty ? "rgb(53,124,176)" : "";
    b.style.boxShadow = propertyDirty ? "0 0 0 2px rgba(53,124,176,.12) inset" : "";
  });
}
function bindPropertyDirtyTracking() {
  const root = document.getElementById("content");
  if (!root) return;
  root.querySelectorAll(".field-input").forEach((el) => {
    if (el.dataset.dirtyBound === "1") return;
    el.dataset.dirtyBound = "1";
    el.addEventListener("input", () => {
      el.classList.add("dirty");
      setPropertyDirty(true);
    });
  });
}
function clearDirtyInputs() {
  document.querySelectorAll(".field-input.dirty").forEach((el) => el.classList.remove("dirty"));
}
function confirmLeaveIfDirty() {
  if (!propertyDirty) return true;
  return confirm("未保存の変更があります。保存せずに移動しますか？");
}

async function readFileAsDataUrl(file) {
  return new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onload = () => resolve(String(fr.result || ""));
    fr.onerror = () => reject(new Error("画像の読み込みに失敗しました"));
    fr.readAsDataURL(file);
  });
}

async function loadImages(propertyId) {
  const box = document.getElementById("imageList");
  if (!box) return;
  box.innerHTML = '<div class="loading-spinner"></div>';
  const res = await fetch(`${CONFIG.API_BASE}/user/properties/${encodeURIComponent(propertyId)}/images`, {
    headers: { Authorization: `Bearer ${Auth.getToken()}` },
  });
  const d = await res.json();
  if (!res.ok || !d.ok) throw new Error(d.message || "画像取得に失敗しました");
  const images = d.images || [];
  if (!images.length) {
    box.innerHTML = '<div class="thumb" style="height:108px;display:flex;align-items:center;justify-content:center">No Image</div>';
    return;
  }
  box.innerHTML = images.map((img) => `
    <div class="thumb">
      <img class="thumb-img" src="${img.imageData}" alt="${dash(img.filename)}">
      <div class="thumb-meta">
        <div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:rgb(90,100,110)">${dash(img.filename)}</div>
        ${isAdmin() ? `<div style="margin-top:6px"><button class="btn btn-sm" style="color:#cc0000;border-color:#cc0000" onclick="deleteImage('${img.id}')">削除</button></div>` : ""}
      </div>
    </div>
  `).join("");
}

async function uploadImage() {
  const input = document.getElementById("imageInput");
  const file = input?.files?.[0];
  if (!file) return;
  if (!file.type.startsWith("image/")) { alert("画像ファイルを選択してください"); return; }
  if (file.size > 3 * 1024 * 1024) { alert("3MB以下の画像を選択してください"); return; }
  const imageData = await readFileAsDataUrl(file);
  const res = await fetch(`${CONFIG.API_BASE}/user/properties/${encodeURIComponent(currentPropertyId)}/images`, {
    method: "POST",
    headers: { Authorization: `Bearer ${Auth.getToken()}`, "Content-Type": "application/json" },
    body: JSON.stringify({ filename: file.name, mimeType: file.type, imageData }),
  });
  const d = await res.json();
  if (!res.ok || !d.ok) throw new Error(d.message || "画像登録に失敗しました");
  input.value = "";
  await loadImages(currentPropertyId);
}

async function deleteImage(imageId) {
  if (!confirm("この画像を削除しますか？")) return;
  const res = await fetch(`${CONFIG.API_BASE}/user/properties/${encodeURIComponent(currentPropertyId)}/images/${encodeURIComponent(imageId)}`, {
    method: "DELETE",
    headers: { Authorization: `Bearer ${Auth.getToken()}` },
  });
  const d = await res.json();
  if (!res.ok || !d.ok) throw new Error(d.message || "画像削除に失敗しました");
  await loadImages(currentPropertyId);
}

function setRoomPanel(name) {
  ["roomListPanel", "roomCsvPanel", "roomImagePanel"].forEach((id) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.toggle("open", id === name);
  });
}
function showRoomListPanel() { setRoomPanel("roomListPanel"); }
function showRoomCsvPanel() { setRoomPanel("roomCsvPanel"); }
function showRoomImagePanel(roomId) {
  roomImageTargetId = String(roomId || "");
  const f = document.getElementById("roomImageFile");
  const a = document.getElementById("roomImageAlt");
  if (f) f.value = "";
  if (a) a.value = "";
  setRoomPanel("roomImagePanel");
}
function addRoomRow() {
  roomDraft.push(emptyRoomItem());
  setPropertyDirty(true);
  renderRoomRows();
}
function openRoomModal() {
  if (!roomDraft.length) roomDraft.push(emptyRoomItem());
  renderRoomRows();
  showRoomListPanel();
  document.getElementById("roomModalOverlay").style.display = "flex";
}
function closeRoomModal() {
  document.getElementById("roomModalOverlay").style.display = "none";
}
function toggleRoomDetail(id) {
  roomDraft = roomDraft.map((r) => (r.id === id ? { ...r, openDetail: !r.openDetail } : r));
  renderRoomRows();
}
function setRoomChecked(id, checked) {
  roomDraft = roomDraft.map((r) => (r.id === id ? { ...r, checked: !!checked } : r));
  updateRoomSelectButton();
}
function updateRoomField(id, key, value) {
  roomDraft = roomDraft.map((r) => (r.id === id ? { ...r, [key]: String(value || "") } : r));
  setPropertyDirty(true);
}
function updateRoomSelectButton() {
  const btn = document.getElementById("btnRoomToggleSelect");
  if (!btn) return;
  const allOn = roomDraft.length > 0 && roomDraft.every((r) => !!r.checked);
  roomSelectAll = allOn;
  btn.textContent = allOn ? "選択解除" : "全て選択";
}
function toggleSelectAllRooms() {
  const on = !(roomDraft.length > 0 && roomDraft.every((r) => !!r.checked));
  roomDraft = roomDraft.map((r) => ({ ...r, checked: on }));
  renderRoomRows();
}
function deleteSelectedRooms() {
  const n = roomDraft.filter((r) => r.checked).length;
  if (!n) { alert("削除対象を選択してください"); return; }
  if (!confirm("本当にこの項目を削除しますか？\nこの操作は取り消せません。")) return;
  roomDraft = roomDraft.filter((r) => !r.checked);
  if (!roomDraft.length) roomDraft.push(emptyRoomItem());
  setPropertyDirty(true);
  renderRoomRows();
}
function roomMadoriOptionsHtml(v) {
  const curr = String(v || "");
  return `<option value="">選択してください</option>${
    ROOM_MADORI_OPTIONS.map((x) => `<option value="${attrEsc(x)}"${x===curr?" selected":""}>${x}</option>`).join("")
  }`;
}
function renderRoomRows() {
  const body = document.getElementById("roomRows");
  if (!body) return;
  body.innerHTML = roomDraft.map((r) => `
    <tr>
      <td>
        <input type="checkbox" ${r.checked ? "checked" : ""} onchange="setRoomChecked('${attrEsc(r.id)}', this.checked)">
        <input type="hidden" value="${attrEsc(r.csrfToken)}">
        <input type="hidden" value="${attrEsc(r.id)}">
        <input type="hidden" value="${attrEsc(r.propertyId || currentPropertyId || '')}">
      </td>
      <td><input class="room-row-input" value="${attrEsc(r.typeName)}" oninput="updateRoomField('${attrEsc(r.id)}','typeName',this.value)"><div style="font-size:11px;color:#789;margin-top:4px">Type</div></td>
      <td><input class="room-row-input" value="${attrEsc(r.drawingInfo)}" oninput="updateRoomField('${attrEsc(r.id)}','drawingInfo',this.value)"></td>
      <td><select class="room-row-input" onchange="updateRoomField('${attrEsc(r.id)}','madori',this.value)">${roomMadoriOptionsHtml(r.madori)}</select></td>
      <td>
        <button class="btn btn-primary-solid btn-sm" type="button" onclick="showRoomImagePanel('${attrEsc(r.id)}')">画像登録</button>
        <div style="font-size:11px;color:#667;margin-top:4px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${dash(r.imageName || "")}</div>
      </td>
      <td><button class="btn btn-sm" type="button" onclick="toggleRoomDetail('${attrEsc(r.id)}')">${r.openDetail ? "閉じる" : "詳細"}</button></td>
    </tr>
    ${r.openDetail ? `
    <tr class="room-detail-row">
      <td></td>
      <td colspan="5">
        <div style="display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin-bottom:8px">
          <input class="room-row-input" placeholder="部屋番号" value="${attrEsc(r.roomNo)}" oninput="updateRoomField('${attrEsc(r.id)}','roomNo',this.value)">
          <input class="room-row-input" placeholder="分譲価格" value="${attrEsc(r.salePrice)}" oninput="updateRoomField('${attrEsc(r.id)}','salePrice',this.value)">
          <input class="room-row-input" placeholder="土地価格" value="${attrEsc(r.landPrice)}" oninput="updateRoomField('${attrEsc(r.id)}','landPrice',this.value)">
          <input class="room-row-input" placeholder="建物価格" value="${attrEsc(r.buildingPrice)}" oninput="updateRoomField('${attrEsc(r.id)}','buildingPrice',this.value)">
          <input class="room-row-input" placeholder="消費税" value="${attrEsc(r.tax)}" oninput="updateRoomField('${attrEsc(r.id)}','tax',this.value)">
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px">
          <input class="room-row-input" placeholder="前払い地代" value="${attrEsc(r.prepaidGroundRent)}" oninput="updateRoomField('${attrEsc(r.id)}','prepaidGroundRent',this.value)">
          <input class="room-row-input" placeholder="権利金" value="${attrEsc(r.keyMoney)}" oninput="updateRoomField('${attrEsc(r.id)}','keyMoney',this.value)">
          <input class="room-row-input" placeholder="値引き金額" value="${attrEsc(r.discountAmount)}" oninput="updateRoomField('${attrEsc(r.id)}','discountAmount',this.value)">
          <input class="room-row-input" placeholder="販売期" value="${attrEsc(r.salesPhase)}" oninput="updateRoomField('${attrEsc(r.id)}','salesPhase',this.value)">
        </div>
      </td>
    </tr>` : ""}
  `).join("");
  updateRoomSelectButton();
}
function parseCsvLine(line) {
  const out = [];
  let cur = "";
  let q = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (q && line[i + 1] === '"') { cur += '"'; i++; continue; }
      q = !q; continue;
    }
    if (ch === "," && !q) { out.push(cur); cur = ""; continue; }
    cur += ch;
  }
  out.push(cur);
  return out.map((s) => s.trim());
}
async function registerRoomCsv() {
  const file = document.getElementById("roomCsvFile")?.files?.[0];
  if (!file) { alert("CSVファイルを選択してください"); return; }
  const text = await file.text();
  const lines = text.split(/\r?\n/).map((x) => x.trim()).filter(Boolean);
  if (lines.length <= 1) { alert("CSVにデータがありません"); return; }
  const header = parseCsvLine(lines[0]);
  const idx = (name) => header.indexOf(name);
  const next = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = parseCsvLine(lines[i]);
    const r = emptyRoomItem();
    r.typeName = cols[idx("typeName")] || "";
    r.drawingInfo = cols[idx("drawingInfo")] || "";
    r.madori = cols[idx("madori")] || "";
    r.roomNo = cols[idx("roomNo")] || "";
    r.salePrice = cols[idx("salePrice")] || "";
    r.landPrice = cols[idx("landPrice")] || "";
    r.buildingPrice = cols[idx("buildingPrice")] || "";
    r.tax = cols[idx("tax")] || "";
    r.prepaidGroundRent = cols[idx("prepaidGroundRent")] || "";
    r.keyMoney = cols[idx("keyMoney")] || "";
    r.discountAmount = cols[idx("discountAmount")] || "";
    r.salesPhase = cols[idx("salesPhase")] || "";
    next.push(r);
  }
  roomDraft = next.length ? next : [emptyRoomItem()];
  setPropertyDirty(true);
  renderRoomRows();
  showRoomListPanel();
}
function downloadRoomCsvTemplate() {
  const headers = ["typeName","drawingInfo","madori","roomNo","salePrice","landPrice","buildingPrice","tax","prepaidGroundRent","keyMoney","discountAmount","salesPhase"];
  const blob = new Blob([headers.join(",") + "\n"], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "room_template.csv";
  a.click();
  URL.revokeObjectURL(url);
}

function bindDropZone(zoneId, fileInputId) {
  const zone = document.getElementById(zoneId);
  const input = document.getElementById(fileInputId);
  if (!zone || !input || zone.dataset.bound === "1") return;
  zone.dataset.bound = "1";
  ["dragenter", "dragover"].forEach((ev) => zone.addEventListener(ev, (e) => {
    e.preventDefault();
    zone.style.background = "#eaf4ff";
  }));
  ["dragleave", "drop"].forEach((ev) => zone.addEventListener(ev, (e) => {
    e.preventDefault();
    zone.style.background = "";
  }));
  zone.addEventListener("drop", (e) => {
    const files = e.dataTransfer?.files;
    if (!files || !files.length) return;
    input.files = files;
  });
}

async function submitNewProperty() {
  const name = document.getElementById("npName").value.trim();
  const databaseId = document.getElementById("npDatabaseId").value.trim();
  const databasePassword = document.getElementById("npDatabasePassword").value;
  const tableName = document.getElementById("npTableName").value.trim();
  const errEl = document.getElementById("npErr");
  errEl.style.display = "none";
  errEl.textContent = "";
  if (!name || !databaseId || !tableName) {
    errEl.textContent = "物件名・データベースID・テーブル名は必須です。";
    errEl.style.display = "block";
    return;
  }
  try {
    const res = await fetch(`${CONFIG.API_BASE}/user/properties`, {
      method: "POST",
      headers: { Authorization: `Bearer ${Auth.getToken()}`, "Content-Type": "application/json" },
      body: JSON.stringify({ name, databaseId, databasePassword, tableName }),
    });
    const raw = await res.text();
    let d = {};
    try {
      d = raw ? JSON.parse(raw) : {};
    } catch (_) {
      errEl.textContent = res.status >= 400 ? `登録に失敗しました（HTTP ${res.status}）` : "応答の解析に失敗しました";
      errEl.style.display = "block";
      return;
    }
    if (!res.ok || !d.ok) {
      errEl.textContent = d.message || `登録に失敗しました（HTTP ${res.status}）`;
      errEl.style.display = "block";
      return;
    }
    await requireAuth();
    location.href = `property-detail.html?id=${encodeURIComponent(d.property.id)}`;
  } catch (e) {
    errEl.textContent = e.message || "通信に失敗しました";
    errEl.style.display = "block";
  }
}

}

async function loadPropertyHistory(propertyId, created, updated) {
  const el = document.getElementById("historyList");
  if (!el) return;
  const res = await fetch(`${CONFIG.API_BASE}/user/properties/${encodeURIComponent(propertyId)}/history?limit=100`, {
    headers: { Authorization: `Bearer ${Auth.getToken()}` },
  });
  const d = await res.json();
  if (!res.ok || !d.ok) {
    el.innerHTML = `<ol class="log-list"><li>初回登録: ${dateOnly(created)}</li><li>最終更新: ${dateOnly(updated)}</li></ol>`;
    return;
  }
  const rows = d.history || [];
  if (!rows.length) {
    el.innerHTML = `<ol class="log-list"><li>初回登録: ${dateOnly(created)}</li><li>最終更新: ${dateOnly(updated)}</li></ol>`;
    return;
  }
  el.innerHTML = `<ol class="log-list">${rows.map((h) => {
    let t = "更新";
    try { const j = JSON.parse(h.changeJson || "{}"); t = j.type || t; } catch (_) {}
    return `<li>${(h.createdAt || "").replace("T"," ").slice(0,16)} / ${t}${h.actorName ? ` / ${h.actorName}` : ""}</li>`;
  }).join("")}</ol>`;
}

  });

})();
