<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1300">
<title>顧客マッピング | Real Estate Manager by DIGITALEYES</title>
<link rel="stylesheet" href="common.css">
<style>
.map-top { display:flex; gap:10px; align-items:center; margin-bottom:10px; flex-wrap:wrap; }
.status-cards { display:grid; grid-template-columns: repeat(auto-fill, minmax(118px, 1fr)); gap:8px; margin-bottom:12px; max-height:240px; overflow-y:auto; padding:2px; align-content:start; }
.status-card { border:1px solid rgb(224,224,224); padding:8px; border-radius:6px; background:#fff; }
.status-card.clickable { cursor:pointer; user-select:none; }
.status-card.active { border-color:rgb(53,124,176); box-shadow:0 0 0 2px rgba(53,124,176,.15) inset; }
.status-card .k { font-size:11px; color:rgb(120,130,140); }
.status-card .v { font-size:20px; font-weight:700; color:rgb(53,124,176); }
.filters { border:1px solid rgb(224,224,224); background:#fff; padding:10px; margin-bottom:10px; }
.filter-grid { display:grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap:10px; }
.filter-grid label { font-size:12px; font-weight:600; margin-bottom:4px; display:block; }
.filter-grid input,.filter-grid select { width:100%; padding:6px 8px; border:1px solid #ced4da; font-family:inherit; }
.multi-select { position:relative; }
.multi-select-toggle {
  width:100%;
  padding:6px 10px;
  border:1px solid #ced4da;
  background:#fff;
  text-align:left;
  font-family:inherit;
  font-size:14px;
  color:rgb(70,83,98);
  cursor:pointer;
}
.multi-select.open .multi-select-toggle { border-color:rgb(53,124,176); }
.multi-select-panel {
  position:absolute;
  top:calc(100% + 4px);
  left:0;
  width:100%;
  max-height:220px;
  overflow:auto;
  background:#fff;
  border:1px solid #ced4da;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
  z-index:20;
  display:none;
}
.multi-select.open .multi-select-panel { display:block; }
.multi-option { display:flex; gap:8px; align-items:center; padding:6px 8px; font-size:13px; color:rgb(70,83,98); }
.multi-option:hover { background:rgb(247,249,251); }
.map-wrap { border:1px solid rgb(224,224,224); background:#fff; padding:8px; }
#map { width:100%; height:560px; }
.legend { display:flex; gap:14px; font-size:12px; margin:6px 0 8px; color:rgb(70,83,98); }
.dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:4px; vertical-align:middle; }
.dot.black{background:#222}.dot.green{background:#2e7d32}.dot.red{background:#d84315}.dot.purple{background:#6a1b9a}
details { margin-top:10px; }
.confirm-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:1200; display:none; align-items:center; justify-content:center; }
.confirm-box { width:420px; background:#fff; box-shadow:0 10px 40px rgba(0,0,0,.2); }
.confirm-head { background:rgb(70,83,98); color:#fff; padding:12px 16px; font-weight:700; }
.confirm-body { padding:16px; color:rgb(70,83,98); }
.confirm-foot { padding:10px 16px; border-top:1px solid rgb(224,224,224); display:flex; justify-content:flex-end; gap:8px; }
</style>
</head>
<body>
<div id="wrapper">
<div id="page-wrapper">
  <header class="header" id="header"></header>
  <main class="main">
    <div class="page-title-bar" style="flex-wrap:wrap;gap:8px 12px">
      <div style="display:flex;flex-wrap:wrap;align-items:baseline;gap:8px 12px">
        <h1 style="margin:0">顧客マッピング</h1>
        <span style="font-size:12px;color:rgb(120,130,140);font-weight:400">件数は顧客一覧と同じ（ローカルDB・同一メール統合後）</span>
      </div>
      <a href="customer.html" class="btn btn-sm">顧客一覧へ戻る</a>
    </div>

    <div class="map-top">
      <label>stat_1 <input id="stat1" type="date" class="form-control"></label>
      <label>stat_2 <input id="stat2" type="date" class="form-control"></label>
      <button class="btn" onclick="exportTargets()">対象者出力</button>
      <input id="gmKey" placeholder="GoogleMap APIキー" style="padding:6px 8px;border:1px solid #ced4da;min-width:320px">
      <button class="btn btn-sm" onclick="saveMapKey()">Mapキー保存</button>
    </div>

    <div class="status-cards" id="cards"></div>

    <form class="filters" onsubmit="event.preventDefault();applyFilters();">
      <div class="filter-grid">
        <div><label>キーワード(name)</label><input id="fName"></div>
        <div><label>都道府県(pre[])</label><div id="fPre" class="multi-select"></div></div>
        <div><label>反響メディア(media[])</label><div id="fMedia" class="multi-select"></div></div>
        <div><label>ステータス(status[])</label><div id="fStatus" class="multi-select"></div></div>
      </div>
      <details>
        <summary>詳しい検索条件を設定する</summary>
        <div class="filter-grid" style="margin-top:8px">
          <div><label>ご本人様年収(income[])</label><div id="fIncome" class="multi-select"></div></div>
          <div><label>ご家族人数(number[])</label><div id="fNumber" class="multi-select"></div></div>
          <div><label>予算(budget[])</label><div id="fBudget" class="multi-select"></div></div>
          <div><label>自己資金(funds[])</label><div id="fFunds" class="multi-select"></div></div>
          <div><label>ご希望の間取り(layout[])</label><div id="fLayout" class="multi-select"></div></div>
          <div><label>ご希望の面積(size[])</label><div id="fSize" class="multi-select"></div></div>
        </div>
      </details>
      <details>
        <summary>除外する検索条件を設定する</summary>
        <div class="filter-grid" style="margin-top:8px">
          <div><label>除外ステータス(n_status[])</label><div id="nStatus" class="multi-select"></div></div>
          <div><label>除外ステータス日付 開始</label><input id="nStatusStart" type="date"></div>
          <div><label>除外ステータス日付 終了</label><input id="nStatusEnd" type="date"></div>
          <div><label>除外年収(n_income[])</label><div id="nIncome" class="multi-select"></div></div>
          <div><label>除外家族人数(n_number[])</label><div id="nNumber" class="multi-select"></div></div>
          <div><label>除外予算(n_budget[])</label><div id="nBudget" class="multi-select"></div></div>
          <div><label>除外自己資金(n_funds[])</label><div id="nFunds" class="multi-select"></div></div>
          <div><label>除外間取り(n_layout[])</label><div id="nLayout" class="multi-select"></div></div>
          <div><label>除外面積(n_size[])</label><div id="nSize" class="multi-select"></div></div>
        </div>
      </details>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn btn-primary-solid" type="submit">検索</button>
        <button class="btn" type="button" onclick="clearAllFilters()">すべての条件をクリアする</button>
      </div>
      <input type="hidden" id="_scpos">
      <input type="hidden" id="center_location">
      <input type="hidden" id="zoom">
    </form>

    <section class="map-wrap">
      <div class="legend">
        <span><i class="dot black" id="legendDotProperty"></i>物件地</span>
        <span><i class="dot green" id="legendDotRequest"></i>資料請求・エントリー系</span>
        <span><i class="dot red" id="legendDotVisit"></i>来場系</span>
        <span><i class="dot purple" id="legendDotOther"></i>その他</span>
      </div>
      <div id="map"></div>
    </section>
  </main>
</div>
</div>
<div class="confirm-overlay" id="confirmModal">
  <div class="confirm-box">
    <div class="confirm-head" id="confirmTitle">確認</div>
    <div class="confirm-body" id="confirmMessage"></div>
    <div class="confirm-foot">
      <button class="btn btn-sm" onclick="closeConfirm(false)">キャンセル</button>
      <button class="btn btn-primary-solid btn-sm" id="confirmOkBtn" onclick="closeConfirm(true)">実行する</button>
    </div>
  </div>
</div>
<script src="common.js"></script>
<script>
const PREFS=["北海道","青森県","岩手県","宮城県","秋田県","山形県","福島県","茨城県","栃木県","群馬県","埼玉県","千葉県","東京都","神奈川県","新潟県","富山県","石川県","福井県","山梨県","長野県","岐阜県","静岡県","愛知県","三重県","滋賀県","京都府","大阪府","兵庫県","奈良県","和歌山県","鳥取県","島根県","岡山県","広島県","山口県","徳島県","香川県","愛媛県","高知県","福岡県","佐賀県","長崎県","熊本県","大分県","宮崎県","鹿児島県","沖縄県"];
const MEDIAS=["SUUMO","Yahoo!不動産","HOMES","アットホーム","AirRESERVE","公式HP"];
const FALLBACK_VISIT_STATUSES = [
  "来場前アンケート", "サブアン", "資料請求・エントリー", "来場予約", "アンダーエントリー", "ウェビナー回答",
  "新規来場", "再来場", "再々来場1", "再々来場2", "再々来場3", "要望", "登録", "申込", "契約", "引渡", "検討中止",
];
const MAP_KEY_STORE="google_maps_api_key";
const MAP_PIN_COLORS_KEY = "map_pin_colors_v1";
const MAP_STATUS_PIN_GROUP_KEY = "map_status_pin_group_v1";
const MAP_PIN_COLOR_DEFAULTS = { property:"#111111", request:"#2e7d32", visit:"#d84315", other:"#6a1b9a" };
let VISIT_STATUSES_LIST = [];
let allCustomers=[], filteredCustomers=[], map=null, geocoder=null, markers=[], infoWindow=null;
let confirmResolver = null;
let statusCardFilter = "";
let statusCardsDelegationBound = false;

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
function defaultPinGroupForStatus(name) {
  const t = String(name || "").trim();
  if (t === "資料請求・エントリー") return "request";
  if (t === "新規来場") return "visit";
  return "other";
}
function loadAllStatusPinGroupMaps() {
  try {
    const raw = localStorage.getItem(MAP_STATUS_PIN_GROUP_KEY);
    const j = raw ? JSON.parse(raw) : {};
    return j && typeof j === "object" ? j : {};
  } catch (_) {
    return {};
  }
}
function pinColorGroupForStatus(status) {
  const s = norm(status);
  const pid = Auth.getActiveProperty()?.id;
  if (pid) {
    const all = loadAllStatusPinGroupMaps();
    const m = all[pid];
    if (m && typeof m === "object" && m[s]) {
      const g = m[s];
      if (g === "request" || g === "visit" || g === "other") return g;
    }
  }
  return defaultPinGroupForStatus(s);
}
async function loadVisitStatusesForMapping() {
  VISIT_STATUSES_LIST = [];
  try {
    const res = await fetch(`${CONFIG.API_BASE}/local/visit-statuses`, {
      headers: { Authorization: `Bearer ${Auth.getToken()}` },
    });
    const d = await res.json();
    if (d.ok && Array.isArray(d.statuses) && d.statuses.length) VISIT_STATUSES_LIST = d.statuses;
  } catch (_) {}
}
function bindStatusCardsClickDelegation() {
  if (statusCardsDelegationBound) return;
  const el = document.getElementById("cards");
  if (!el) return;
  statusCardsDelegationBound = true;
  el.addEventListener("click", (ev) => {
    const card = ev.target.closest(".status-card");
    if (!card) return;
    const f = card.getAttribute("data-filter");
    if (f == null) return;
    setStatusCardFilter(f === "__all__" ? "" : decodeURIComponent(f));
  });
}

function multiSelectedSet(el){ try { return new Set(JSON.parse(el.dataset.selected || "[]")); } catch(_) { return new Set(); } }
function multiSetSelected(el, values){ el.dataset.selected = JSON.stringify(values); }
function multiRefreshLabel(el){
  const values = [...multiSelectedSet(el)];
  const label = values.length ? `${values.length}件選択中` : "未選択";
  const toggle = el.querySelector(".multi-select-toggle");
  if (toggle) toggle.textContent = label;
}
function fillMulti(id, arr){
  const el = document.getElementById(id);
  el.dataset.options = JSON.stringify(arr || []);
  const items = (arr || []).map((v, idx)=>
    `<label class="multi-option"><input type="checkbox" value="${String(v).replace(/"/g,"&quot;")}" data-idx="${idx}"><span>${v}</span></label>`
  ).join("");
  el.innerHTML = `<button type="button" class="multi-select-toggle">未選択</button><div class="multi-select-panel">${items}</div>`;
  multiSetSelected(el, []);
  multiRefreshLabel(el);
  const toggle = el.querySelector(".multi-select-toggle");
  const panel = el.querySelector(".multi-select-panel");
  toggle.onclick = (ev)=>{ ev.stopPropagation(); document.querySelectorAll(".multi-select.open").forEach((x)=>{ if (x!==el) x.classList.remove("open"); }); el.classList.toggle("open"); };
  panel.addEventListener("click", (ev)=>{
    ev.stopPropagation();
    const cb = ev.target && ev.target.closest ? ev.target.closest("input[type='checkbox']") : null;
    if (!cb) return;
    const next = [...panel.querySelectorAll("input[type='checkbox']:checked")].map((c)=>c.value);
    multiSetSelected(el, next);
    multiRefreshLabel(el);
  });
}
function selectedMulti(id){
  const el = document.getElementById(id);
  return [...multiSelectedSet(el)];
}
function setMultiSelected(id, values){
  const el = document.getElementById(id);
  const set = new Set(values || []);
  el.querySelectorAll("input[type='checkbox']").forEach((cb)=>{ cb.checked = set.has(cb.value); });
  multiSetSelected(el, [...set]);
  multiRefreshLabel(el);
}
function clearMulti(id){ setMultiSelected(id, []); }
function norm(v){return String(v||"").trim();}
function ymd(v){const s=norm(v).replace(/\//g,"-");return s.slice(0,10);}
function pick(c, ...keys){for(const k of keys){if(c[k]!=null&&String(c[k]).trim()!=="") return c[k];}return "";}
function addrOf(c){return [pick(c,"c.zip"),pick(c,"c.state"),pick(c,"c.city"),pick(c,"c.town"),pick(c,"c.address"),pick(c,"c.tatemono")].filter(Boolean).join(" ");}
function normalizeColorHex(v, fallback){ const s = String(v || "").trim(); return /^#[0-9a-fA-F]{6}$/.test(s) ? s.toLowerCase() : fallback; }
function loadMapPinColors(){
  try {
    const raw = localStorage.getItem(MAP_PIN_COLORS_KEY);
    const j = raw ? JSON.parse(raw) : {};
    return {
      property: normalizeColorHex(j.property, MAP_PIN_COLOR_DEFAULTS.property),
      request: normalizeColorHex(j.request, MAP_PIN_COLOR_DEFAULTS.request),
      visit: normalizeColorHex(j.visit, MAP_PIN_COLOR_DEFAULTS.visit),
      other: normalizeColorHex(j.other, MAP_PIN_COLOR_DEFAULTS.other),
    };
  } catch (_) {
    return { ...MAP_PIN_COLOR_DEFAULTS };
  }
}
function markerColor(status){
  const c = loadMapPinColors();
  const g = pinColorGroupForStatus(status);
  if (g === "request") return c.request;
  if (g === "visit") return c.visit;
  return c.other;
}
function getMapKey(){return localStorage.getItem(MAP_KEY_STORE)||"";}
function numOrNaN(v){ const n = Number(v); return Number.isFinite(n) ? n : NaN; }
function extractPropertyCenter(active){
  const ex = active && active.extra_json ? (()=>{ try { return JSON.parse(active.extra_json); } catch(_) { return {}; } })() : {};
  const lat = numOrNaN(active?.latitude ?? active?.lat ?? ex?.latitude ?? ex?.lat);
  const lng = numOrNaN(active?.longitude ?? active?.lng ?? ex?.longitude ?? ex?.lng);
  if (Number.isFinite(lat) && Number.isFinite(lng)) return { lat, lng };
  return { lat: 35.4174, lng: 139.4873 };
}
function blackPinIcon(){
  const pinColor = loadMapPinColors().property;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="40" viewBox="0 0 28 40"><path d="M14 0C6.3 0 0 6.3 0 14c0 10.9 14 26 14 26s14-15.1 14-26C28 6.3 21.7 0 14 0z" fill="#111"/><circle cx="14" cy="14" r="5" fill="#fff"/></svg>`;
  const colored = svg.replace('fill="#111"', `fill="${pinColor}"`);
  return {
    url: `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(colored)}`,
    scaledSize: new google.maps.Size(28, 40),
    anchor: new google.maps.Point(14, 40),
  };
}
function applyLegendColors(){
  const c = loadMapPinColors();
  const ids = [
    ["legendDotProperty", c.property],
    ["legendDotRequest", c.request],
    ["legendDotVisit", c.visit],
    ["legendDotOther", c.other],
  ];
  ids.forEach(([id, color]) => {
    const el = document.getElementById(id);
    if (el) el.style.background = color;
  });
}
async function saveMapKey(){
  const ok = await showConfirm("更新確認", "GoogleMap APIキーを更新します。よろしいですか？", "更新する");
  if (!ok) return;
  localStorage.setItem(MAP_KEY_STORE, document.getElementById("gmKey").value.trim());
  alert("保存しました。再検索で地図表示します。");
}
function csv(rows, headers, keys, filename){const text=[headers.join(","),...rows.map(r=>keys.map(k=>`\"${String(r[k]??"").replace(/\"/g,'\"\"')}\"`).join(","))].join("\n"); const b=new Blob(["\uFEFF"+text],{type:"text/csv;charset=utf-8;"}); const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=filename;a.click();}
function currentMapRows(){
  if (!statusCardFilter) return filteredCustomers;
  return filteredCustomers.filter((c)=>norm(c["c.status"])===statusCardFilter);
}
function setStatusCardFilter(v){
  statusCardFilter = statusCardFilter === v ? "" : v;
  renderCards();
  renderMap();
}
function showConfirm(title, message, okLabel){
  document.getElementById("confirmTitle").textContent = title;
  document.getElementById("confirmMessage").textContent = message;
  document.getElementById("confirmOkBtn").textContent = okLabel || "実行する";
  document.getElementById("confirmModal").style.display = "flex";
  return new Promise((resolve)=>{ confirmResolver = resolve; });
}
function closeConfirm(ok){
  document.getElementById("confirmModal").style.display = "none";
  const r = confirmResolver;
  confirmResolver = null;
  if (r) r(Boolean(ok));
}

async function fetchAllCustomers(){
  const limit=200; let page=1; let out=[];
  for(;;){
    const qs=new URLSearchParams({page:String(page),limit:String(limit)});
    const res=await fetch(`${CONFIG.API_BASE}/local/customers?${qs}`,{headers:{Authorization:`Bearer ${Auth.getToken()}`}});
    const d=await res.json(); if(!res.ok||!d.ok) throw new Error(d.message||"顧客取得失敗");
    const rows=d.data?.result||[]; out=out.concat(rows);
    const total=parseTotalCount(d.data||{});
    if(!rows.length||out.length>=total) break; page++; if(page>500) break;
  }
  return out;
}

function applyFilters(){
  statusCardFilter = "";
  const name=norm(document.getElementById("fName").value).toLowerCase();
  const pre=selectedMulti("fPre"), media=selectedMulti("fMedia"), status=selectedMulti("fStatus");
  const income=selectedMulti("fIncome"), number=selectedMulti("fNumber"), budget=selectedMulti("fBudget"), funds=selectedMulti("fFunds"), layout=selectedMulti("fLayout"), size=selectedMulti("fSize");
  const nStatus=selectedMulti("nStatus"), nIncome=selectedMulti("nIncome"), nNumber=selectedMulti("nNumber"), nBudget=selectedMulti("nBudget"), nFunds=selectedMulti("nFunds"), nLayout=selectedMulti("nLayout"), nSize=selectedMulti("nSize");
  const nStatusStart=norm(document.getElementById("nStatusStart").value), nStatusEnd=norm(document.getElementById("nStatusEnd").value);
  filteredCustomers = allCustomers.filter(c=>{
    if(name && !(`${norm(c["c.name"])} ${norm(c["c.kana"])} ${addrOf(c)}`.toLowerCase().includes(name))) return false;
    if(pre.length && !pre.includes(norm(c["c.state"]))) return false;
    if(media.length && !media.includes(norm(c["c.baitai"]))) return false;
    if(status.length && !status.includes(norm(c["c.status"]))) return false;
    if(income.length && !income.includes(norm(c["c.questionnaire30"]))) return false;
    if(number.length && !number.includes(norm(c["c.ninzu"]))) return false;
    if(budget.length && !budget.includes(norm(c["c.yosan"]))) return false;
    if(funds.length && !funds.includes(norm(c["c.jikosikin"]))) return false;
    if(layout.length && !layout.includes(norm(c["c.questionnaire23"]))) return false;
    if(size.length && !size.includes(norm(c["c.questionnaire24"]))) return false;
    if(nStatus.length && nStatus.includes(norm(c["c.status"]))) {
      const sd=ymd(c["c.status_changed_at"]||c["c.upd_date"]);
      if((!nStatusStart||sd>=nStatusStart)&&(!nStatusEnd||sd<=nStatusEnd)) return false;
    }
    if(nIncome.length && nIncome.includes(norm(c["c.questionnaire30"]))) return false;
    if(nNumber.length && nNumber.includes(norm(c["c.ninzu"]))) return false;
    if(nBudget.length && nBudget.includes(norm(c["c.yosan"]))) return false;
    if(nFunds.length && nFunds.includes(norm(c["c.jikosikin"]))) return false;
    if(nLayout.length && nLayout.includes(norm(c["c.questionnaire23"]))) return false;
    if(nSize.length && nSize.includes(norm(c["c.questionnaire24"]))) return false;
    return true;
  });
  renderCards();
  renderMap();
}

function clearAllFilters(){
  showConfirm("削除確認", "検索条件を削除（クリア）します。よろしいですか？", "削除する").then((ok)=>{
    if (!ok) return;
  ["fName","nStatusStart","nStatusEnd"].forEach(id=>document.getElementById(id).value="");
  ["fPre","fMedia","fStatus","fIncome","fNumber","fBudget","fFunds","fLayout","fSize","nStatus","nIncome","nNumber","nBudget","nFunds","nLayout","nSize"]
    .forEach((id)=>clearMulti(id));
  applyFilters();
  });
}

function renderCards(){
  bindStatusCardsClickDelegation();
  const total = filteredCustomers.length;
  const statuses = VISIT_STATUSES_LIST.length ? VISIT_STATUSES_LIST : FALLBACK_VISIT_STATUSES;
  const allActive = !statusCardFilter;
  let html = `<div class="status-card clickable ${allActive ? "active" : ""}" data-filter="__all__"><div class="k">全件</div><div class="v">${total}<span style="font-size:12px">件</span></div></div>`;
  for (const st of statuses) {
    const cnt = filteredCustomers.filter((c) => norm(c["c.status"]) === st).length;
    const active = statusCardFilter === st;
    html += `<div class="status-card clickable ${active ? "active" : ""}" data-filter="${encodeURIComponent(st)}"><div class="k">${escapeHtml(st)}</div><div class="v">${cnt}<span style="font-size:12px">件</span></div></div>`;
  }
  document.getElementById("cards").innerHTML = html;
}

async function ensureMap(){
  if(map) return;
  const key=getMapKey();
  document.getElementById("gmKey").value=key;
  if(!key){document.getElementById("map").innerHTML='<div class="error-box">GoogleMap APIキーを入力して保存してください</div>'; return;}
  if(!window.google || !window.google.maps){
    await new Promise((resolve,reject)=>{
      const s=document.createElement("script");
      s.src=`https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(key)}`;
      s.async=true; s.defer=true; s.onload=resolve; s.onerror=()=>reject(new Error("Google Maps API読み込み失敗"));
      document.head.appendChild(s);
    });
  }
  geocoder=new google.maps.Geocoder();
  const active=Auth.getActiveProperty()||{};
  const center=extractPropertyCenter(active);
  map=new google.maps.Map(document.getElementById("map"),{center,zoom:15,mapTypeControl:true,fullscreenControl:true,streetViewControl:true,rotateControl:true,tilt:0});
  infoWindow=new google.maps.InfoWindow();
  map.addListener("idle",()=>{
    const c=map.getCenter(); if(!c) return;
    document.getElementById("center_location").value=`${c.lat()},${c.lng()}`;
    document.getElementById("zoom").value=String(map.getZoom()||15);
    document.getElementById("_scpos").value=String(window.scrollY||0);
  });
  new google.maps.Marker({
    map,
    position: center,
    icon: blackPinIcon(),
    title: "物件地",
    zIndex: 999,
  });
}
function clearMarkers(){markers.forEach(m=>m.setMap(null)); markers=[];}
async function geocodeAddress(addr){
  const k=`geo:${addr}`; const c=localStorage.getItem(k); if(c){try{return JSON.parse(c);}catch(_){}}
  const r=await geocoder.geocode({address:addr});
  if(!r.results?.length) return null;
  const p=r.results[0].geometry.location; const out={lat:p.lat(),lng:p.lng()};
  localStorage.setItem(k,JSON.stringify(out)); return out;
}
async function renderMap(){
  await ensureMap(); if(!map||!geocoder) return;
  clearMarkers();
  const list=currentMapRows().slice(0,300);
  for(const c of list){
    const addr=addrOf(c); if(!addr) continue;
    const pos=await geocodeAddress(addr); if(!pos) continue;
    const fill=markerColor(norm(c["c.status"]));
    const m=new google.maps.Marker({map,position:pos,icon:{path:google.maps.SymbolPath.CIRCLE,scale:6,fillColor:fill,fillOpacity:0.95,strokeColor:"#fff",strokeWeight:1}});
    m.addListener("click",()=>{
      const cid = encodeURIComponent(String(c["c.id"]||""));
      const html=`<div style="min-width:220px"><div style="font-weight:700">${(c["c.name"]||"")}</div><div style="font-size:12px;margin-top:4px">住所: ${addr}</div><div style="margin-top:8px"><a class="btn btn-sm" href="customer.html?cid=${cid}" style="text-decoration:none">詳細を見る</a></div></div>`;
      infoWindow.setContent(html); infoWindow.open({anchor:m,map});
    });
    markers.push(m);
  }
}

}
