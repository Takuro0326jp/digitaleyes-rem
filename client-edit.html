<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1300">
  <title>クライアント編集 | Real Estate Manager by DIGITALEYES</title>
  <link rel="stylesheet" href="common.css">
  <style>
    .crumb { font-size:12px; color:rgb(120,130,140); margin: 14px 0 6px; }
    .crumb a { color:rgb(53,124,176); }
    .form-card { background:#fff; border:1px solid rgb(224,224,224); border-radius:8px; padding:22px 24px; max-width:760px; }
    .grid { display:grid; grid-template-columns: 1fr 1fr; gap:18px 16px; }
    .fg--full { grid-column: 1 / -1; }
    .fg label { display:block; font-size:12px; font-weight:600; color:rgb(70,83,98); margin-bottom:8px; letter-spacing:0.02em; }
    .fg .req { color:#c62828; font-weight:700; }
    .fg input, .fg select {
      width:100%; box-sizing:border-box; padding:10px 14px; border:1px solid #b8c2cc; border-radius:6px;
      font-size:14px; font-family:inherit; color:rgb(50,60,72); background:#fff; line-height:1.4;
      transition:border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .fg input:hover, .fg select:hover { border-color:#97a6b3; }
    .fg input:focus, .fg select:focus {
      outline:none; border-color:rgb(53,124,176); box-shadow:0 0 0 3px rgba(53,124,176,0.18);
    }
    .fg input::placeholder { color:#9aa5b1; }
    .err { color:#cc0000; font-size:12px; margin-top:6px; display:none; }
  </style>
</head>
<body>
<div id="wrapper">
<div id="page-wrapper">
  <header class="header" id="header"></header>
  <main class="main">
    <div class="crumb"><a href="dashboard.html">ダッシュボード</a> ＞ <a href="client.html">クライアント一覧</a> ＞ クライアント編集</div>
    <div class="page-title-bar">
      <h1>クライアント編集</h1>
      <a class="btn btn-sm" href="client.html">一覧へ戻る</a>
    </div>

    <div id="content"><div class="loading-spinner"></div></div>
  </main>
</div>
</div>

<div class="modal-overlay" id="confirmModal" style="display:none" onclick="closeConfirm()">
  <div class="modal-box" style="max-width:520px" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3>確認</h3>
      <button class="modal-close" onclick="closeConfirm()">✕</button>
    </div>
    <div class="modal-body">更新します。よろしいですか？</div>
    <div class="modal-footer">
      <button class="btn btn-sm" onclick="closeConfirm()">キャンセル</button>
      <button class="btn btn-primary-solid btn-sm" onclick="confirmUpdate()">更新する</button>
    </div>
  </div>
</div>

<script src="common.js"></script>
<script>
let clientId = null;
function idFromPath(){
  const m = location.pathname.match(/\/client\/edit\/(\d+)/);
  if (m) return m[1];
  return new URLSearchParams(location.search).get("id");
}
function validEmail(s){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(s||"").trim()); }
function setErr(id, msg) { const el = document.getElementById(id); el.textContent = msg; el.style.display = "block"; }
function clearErr() { ["eName","eKana","eEmail"].forEach(id => { const el=document.getElementById(id); el.style.display="none"; el.textContent=""; }); document.getElementById("formMsg").style.display="none"; }
function closeConfirm(){ document.getElementById("confirmModal").style.display="none"; }

async function load() {
  clientId = idFromPath();
  if (!clientId) { document.getElementById("content").innerHTML = '<div class="error-box">⚠️ IDが不正です</div>'; return; }
  const res = await fetch(`${CONFIG.API_BASE}/client/api/detail?id=${encodeURIComponent(clientId)}`, { headers:{ Authorization:`Bearer ${Auth.getToken()}` } });
  const d = await res.json();
  if (!d.ok) { document.getElementById("content").innerHTML = `<div class="error-box">⚠️ ${d.message || "取得に失敗しました"}</div>`; return; }
  const c = d.client;
  document.getElementById("content").innerHTML = `
    <div class="form-card">
      <div class="grid">
        <div class="fg">
          <label for="fName">企業名 <span class="req">*</span></label>
          <input id="fName" type="text" autocomplete="organization">
          <div class="err" id="eName"></div>
        </div>
        <div class="fg">
          <label for="fKana">フリガナ <span class="req">*</span></label>
          <input id="fKana" type="text" autocomplete="off">
          <div class="err" id="eKana"></div>
        </div>
        <div class="fg fg--full">
          <label for="fEmail">E-mail <span class="req">*</span></label>
          <input id="fEmail" type="email" autocomplete="email">
          <div class="err" id="eEmail"></div>
        </div>
      </div>
      <div style="margin-top:14px;display:flex;justify-content:flex-end;gap:8px">
        <a class="btn btn-sm" href="/client/detail/${clientId}" style="text-decoration:none">キャンセル</a>
        <button class="btn btn-primary-solid btn-sm" onclick="submitUpdate()">更新</button>
      </div>
      <div id="formMsg" class="error-box" style="display:none;margin-top:12px"></div>
    </div>`;
  document.getElementById("fName").value = c.name || "";
  document.getElementById("fKana").value = c.nameKana || "";
  document.getElementById("fEmail").value = c.email || "";
}

function submitUpdate() {
  clearErr();
  const name = document.getElementById("fName").value.trim();
  const nameKana = document.getElementById("fKana").value.trim();
  const email = document.getElementById("fEmail").value.trim();
  let ok = true;
  if (!name) { setErr("eName","必須です"); ok=false; }
  if (!nameKana) { setErr("eKana","必須です"); ok=false; }
  if (!email) { setErr("eEmail","必須です"); ok=false; }
  else if (!validEmail(email)) { setErr("eEmail","形式が不正です"); ok=false; }
  if (!ok) return;
  window.__updatePayload = { name, nameKana, email };
  document.getElementById("confirmModal").style.display="flex";
}

async function confirmUpdate() {
  const payload = window.__updatePayload || {};
  const res = await fetch(`${CONFIG.API_BASE}/client/edit/${encodeURIComponent(clientId)}`, {
    method: "POST",
    headers: { Authorization: `Bearer ${Auth.getToken()}`, "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });
  const d = await res.json();
  if (!d.ok) {
    closeConfirm();
    document.getElementById("formMsg").textContent = d.message || "更新に失敗しました";
    document.getElementById("formMsg").style.display = "block";
    return;
  }
  location.href = `/client/detail/${clientId}`;
}

(async () => {
  if (!await requireAuth()) return;
  document.getElementById("header").innerHTML = renderHeader("client.html");
  await load();
})();
</script>
</body>
</html>
