<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1300">
<title>広告管理 | Real Estate Manager by DIGITALEYES</title>
<link rel="stylesheet" href="common.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
.media-card { border: 1px solid rgb(224,224,224); border-radius: 4px; padding: 16px; text-align: center; min-width: 140px; }
.media-card h4 { font-size: 13px; font-weight: 600; margin-bottom: 12px; color: rgb(70,83,98); }
.media-num { font-size: 28px; font-weight: 700; color: rgb(53,124,176); }
.media-num small { font-size: 12px; color: rgb(70,83,98); font-weight: 400; }
.media-sub { font-size: 11px; color: rgb(120,130,140); margin-top: 4px; }
.media-grid { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
</style>
</head>
<body>
<div id="wrapper">
<div id="page-wrapper">
  <header class="header" id="header"></header>
  <main class="main">
    <div class="page-title-bar"><h1>広告管理</h1></div>
    <div id="content"><div class="loading-spinner"></div></div>
  </main>
</div>
</div>
<script src="common.js"></script>
<script>
const MEDIAS = ["公式HP","SUUMO","Yahoo!不動産","HOMES","アットホーム","AirRESERVE"];

async function load() {
  try {
    const data = await apiCall({
      limit: 1000,
      fields: JSON.stringify(["c.id","c.status","c.baitai","c.date_entry","c.q1"])
    });
    const all = data.result || [];
    const total = all.length;

    // 媒体別集計
    const mediaCounts = {};
    MEDIAS.forEach(m => mediaCounts[m] = { total: 0, visited: 0, contracted: 0 });
    all.forEach(c => {
      const m = c["c.baitai"];
      if (mediaCounts[m]) {
        mediaCounts[m].total++;
        if (["新規来場","再来場","再々来場1","申込","契約","引渡"].includes(c["c.status"])) mediaCounts[m].visited++;
        if (c["c.status"]==="契約") mediaCounts[m].contracted++;
      }
    });

    // 月別集計（6ヶ月）
    const months = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(); d.setMonth(d.getMonth()-i);
      months.push({ label: `${d.getMonth()+1}月`, key: `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}` });
    }

    document.getElementById("content").innerHTML = `
      <!-- 媒体別カード -->
      <section class="section">
        <div class="section-header"><h2 class="section-heading">媒体別反響状況</h2></div>
        <div class="media-grid">
          ${MEDIAS.map(m => {
            const d = mediaCounts[m];
            if (!d.total) return `<div class="media-card"><h4>${m}</h4><div class="media-num">0<small>件</small></div><div class="media-sub">反響なし</div></div>`;
            return `<div class="media-card">
              <h4>${m}</h4>
              <div class="media-num">${d.total}<small>件</small></div>
              <div class="media-sub">来場: ${d.visited}件（${d.total>0?(d.visited/d.total*100).toFixed(1):0}%）</div>
              <div class="media-sub">成約: ${d.contracted}件（${d.visited>0?(d.contracted/d.visited*100).toFixed(1):0}%）</div>
            </div>`;
          }).join("")}
        </div>
      </section>

      <!-- 媒体別グラフ -->
      <section class="section">
        <div class="section-header"><h2 class="section-heading">媒体別反響数グラフ</h2></div>
        <div style="max-width:600px"><canvas id="mediaChart" height="200"></canvas></div>
      </section>

      <!-- 月別・媒体別推移表 -->
      <section class="section">
        <div class="section-header"><h2 class="section-heading">月別・媒体別反響推移</h2></div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr><th class="th-left">媒体</th>${months.map(m=>`<th>${m.label}</th>`).join("")}<th>合計</th></tr>
            </thead>
            <tbody>
              ${MEDIAS.map(media => {
                const mCounts = months.map(m => all.filter(c=>c["c.baitai"]===media&&c["c.date_entry"]&&c["c.date_entry"].slice(0,7)===m.key).length);
                const tot = mCounts.reduce((a,b)=>a+b,0);
                if (!tot) return "";
                return `<tr class="row-main"><td>${baitaiBadge(media)||media}</td>${mCounts.map(n=>`<td>${n}</td>`).join("")}<td><strong>${tot}</strong></td></tr>`;
              }).join("")}
              <tr class="row-main" style="font-weight:700;background:rgba(224,224,224,0.3)">
                <td>合計</td>
                ${months.map(m=>`<td>${all.filter(c=>c["c.date_entry"]&&c["c.date_entry"].slice(0,7)===m.key).length}</td>`).join("")}
                <td><strong>${total}</strong></td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- 流入経路分析 -->
      <section class="section">
        <div class="section-header"><h2 class="section-heading">反響内訳（ステータス × 媒体）</h2></div>
        <div class="table-scroll">
          <table>
            <thead><tr><th class="th-left">媒体</th><th>資料請求</th><th>来場予約</th><th>新規来場</th><th>再来場</th><th>申込</th><th>契約</th><th>検討中止</th><th>合計</th></tr></thead>
            <tbody>
              ${MEDIAS.map(media => {
                const rows = ["資料請求・エントリー","来場予約","新規来場","再来場","申込","契約","検討中止"].map(s =>
                  all.filter(c=>c["c.baitai"]===media&&c["c.status"]===s).length
                );
                const tot = mediaCounts[media].total;
                if (!tot) return "";
                return `<tr class="row-main"><td>${baitaiBadge(media)||media}</td>${rows.map(n=>`<td>${n||0}</td>`).join("")}<td><strong>${tot}</strong></td></tr>`;
              }).join("")}
            </tbody>
          </table>
        </div>
      </section>
    `;

    // 媒体別円グラフ
    const activeMedias = MEDIAS.filter(m => mediaCounts[m].total > 0);
    new Chart(document.getElementById("mediaChart"), {
      type: "doughnut",
      data: {
        labels: activeMedias,
        datasets: [{
          data: activeMedias.map(m => mediaCounts[m].total),
          backgroundColor: ["rgb(53,124,176)","rgb(0,160,100)","rgb(255,50,50)","rgb(255,100,50)","rgb(100,100,200)","rgb(200,150,50)"],
        }]
      },
      options: { responsive: true, plugins: { legend: { position: "right" } } }
    });

  } catch(e) {
    document.getElementById("content").innerHTML = `<div class="error-box">⚠️ ${e.message}</div>`;
  }
}

(async () => {
  if (!await requireAuth()) return;
  document.getElementById("header").innerHTML = renderHeader("ad.html");
  load();
})();
</script>
</body>
</html>
