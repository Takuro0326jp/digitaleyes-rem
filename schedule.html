<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1300">
<title>接客スケジュール | Real Estate Manager by DIGITALEYES</title>
<link rel="stylesheet" href="common.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.17/index.global.min.css">
<style>
.filter-bar2 { display:flex; gap:10px; align-items:end; flex-wrap:wrap; margin-bottom:12px; }
.filter-item2 label { display:block; font-size:11px; color:rgb(120,130,140); margin-bottom:4px; }
.filter-item2 input, .filter-item2 select { min-width:140px; padding:7px 9px; border:1px solid #ced4da; font-size:13px; font-family:inherit; color:rgb(70,83,98); }
.fc-wrap { background:#fff; border:1px solid rgb(224,224,224); padding:8px; }
.badge-pending { background:#f0f0f0; border:1px solid #ddd; color:#666; padding:1px 6px; border-radius:10px; font-size:10px; margin-left:6px; }
.badge-room-none { background:#ffecec; border:1px solid #f5a2a2; color:#b71c1c; padding:1px 6px; border-radius:10px; font-size:10px; margin-left:6px; font-weight:700; }
.fc .event-room-none { box-shadow: inset 0 0 0 2px #e57373; color: #1e293b !important; }
.fc .event-room-none .fc-event-main { background: linear-gradient(135deg, rgba(255,235,238,.9), rgba(255,255,255,.95)); color: #1e293b !important; }
.fc .event-room-none .fc-event-main-frame { color: inherit; }
.pending-notice { margin:8px 0 12px; padding:10px 12px; border:1px solid #f3c26b; background:#fff7e8; color:#8a5200; border-radius:6px; font-size:13px; font-weight:600; display:none; }
.pill { display:inline-block; font-size:11px; border:1px solid rgb(224,224,224); padding:2px 8px; border-radius:12px; margin-right:6px; margin-top:4px; background:#fff; }
.fc .fc-toolbar-title { font-size:20px; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; display: none; align-items: center; justify-content: center; }
.modal-box { background: #fff; width: 760px; box-shadow: 0 8px 40px rgba(0,0,0,0.2); }
.modal-header { background: rgb(70,83,98); padding: 14px 20px; display:flex; align-items:center; justify-content:space-between; }
.modal-header h3 { color:#fff; font-size:15px; font-weight:600; }
.modal-close { background:none; border:none; color:#fff; font-size:20px; cursor:pointer; }
.modal-body { padding: 18px 20px; }
.modal-footer { padding: 12px 20px; border-top:1px solid rgb(224,224,224); display:flex; justify-content:flex-end; gap:8px; }
.row { display:flex; gap:12px; flex-wrap:wrap; }
.form-group { margin-bottom:12px; }
.form-group label { display:block; font-size:12px; font-weight:600; color:rgb(70,83,98); margin-bottom:6px; }
.form-group input, .form-group select, .form-group textarea { width:100%; padding:8px 10px; border:1px solid #ced4da; font-size:13px; font-family:inherit; color:rgb(70,83,98); }
.err { color:#cc0000; font-size:12px; margin-top:5px; display:none; }
</style>
</head>
<body>
<div id="wrapper">
<div id="page-wrapper">
  <header class="header" id="header"></header>
  <main class="main">
    <div class="page-title-bar">
      <h1>接客スケジュール</h1>
      <span id="dailyTotal" style="font-size:13px;color:rgb(120,130,140)"></span>
    </div>
    <div class="filter-bar2">
      <div class="filter-item2"><label>日付</label><input type="date" id="fDate"></div>
      <div class="filter-item2"><label>担当者</label><select id="fStaff"><option value="">すべて</option></select></div>
      <div class="filter-item2"><label>ステータス</label><input id="fStatusValues" placeholder="例: 2,3"></div>
      <div class="filter-item2"><label>部屋名</label><select id="fRoom"><option value="">すべて</option></select></div>
      <div class="filter-item2"><label>仮/確定</label><select id="fVF"><option value="">すべて</option><option value="pending">仮登録のみ</option><option value="confirmed">確定済みのみ</option></select></div>
      <div class="filter-item2"><label>キーワード</label><input id="fKeyword" placeholder="顧客名・メール等"></div>
      <div><button class="btn btn-primary-solid btn-sm" onclick="applyFilters()">適用</button><button class="btn btn-sm" onclick="clearFilters()" style="margin-left:6px">すべてクリア</button></div>
    </div>
    <div id="activeFilters"></div>
    <div id="pendingNotice" class="pending-notice"></div>
    <div class="fc-wrap"><div id="calendar"></div></div>
  </main>
</div>
</div>

<div class="modal-overlay" id="editModal" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modalTitle">予約登録</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="evId">
      <div class="row">
        <div class="form-group" style="flex:1;min-width:160px"><label>日付 *</label><input id="mDate" type="date"></div>
        <div class="form-group" style="flex:1;min-width:120px"><label>開始時刻 *</label><input id="mStart" type="time" step="900"></div>
        <div class="form-group" style="flex:1;min-width:120px"><label>終了時刻 *</label><input id="mEnd" type="time" step="900"></div>
        <div class="form-group" style="flex:1;min-width:140px"><label>部屋名</label><select id="mRoom"></select></div>
      </div>
      <div class="row">
        <div class="form-group" style="flex:1;min-width:140px"><label>担当者</label><select id="mStaff"></select></div>
        <div class="form-group" style="flex:1;min-width:140px"><label>参加人数</label><select id="mParticipants"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option value="6">6以上</option></select></div>
        <div class="form-group" style="flex:1;min-width:160px"><label>打ち合わせ形式</label><select id="mType" onchange="onTypeChange()"><option value="visit">来店</option><option value="phone">電話</option><option value="web">WEBミーティング</option></select></div>
        <div class="form-group" style="flex:1;min-width:160px"><label>接客状況</label><input id="mReception" placeholder="対応中 など"></div>
      </div>
      <div class="form-group" id="webUrlBlock" style="display:none"><label>WEB会議URL</label><input id="mWebUrl"></div>
      <div class="row">
        <div class="form-group" style="flex:1;min-width:180px"><label>顧客姓</label><input id="mSei"></div>
        <div class="form-group" style="flex:1;min-width:180px"><label>顧客名</label><input id="mMei"></div>
        <div class="form-group" style="flex:1;min-width:180px"><label>メール</label><input id="mEmail"></div>
      </div>
      <div class="row">
        <div class="form-group" style="flex:1;min-width:180px"><label>電話</label><input id="mTel"></div>
        <div class="form-group" style="flex:1;min-width:140px"><label>顧客ステータス(0-11)</label><input id="mCustomerStatus" type="number" min="0" max="11"></div>
        <div class="form-group" style="flex:1;min-width:140px"><label>仮/確定</label><select id="mStatus"><option value="pending">仮登録</option><option value="confirmed">確定</option></select></div>
      </div>
      <div class="form-group"><label>メモ</label><textarea id="mMemo" rows="3"></textarea></div>
      <div id="mErr" class="err"></div>
    </div>
    <div class="modal-footer" id="modalButtons"></div>
  </div>
</div>

<script src="common.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar-scheduler@6.1.17/index.global.min.js"></script>
<script>
let calendar;
let rooms = [];
let users = [];
let currentEvents = [];
let scheduleSettings = { autoSlotMinutes: 60, dailyLimit: 20, bookingOpenDays: 30 };

function colorByEvent(e) {
  if (e.status === "pending") return "#b3b3b3";
  const s = Number(e.customerStatus);
  if ([2].includes(s)) return "#357cb0";
  if ([3].includes(s)) return "#2e8b57";
  if ([4,5,6].includes(s)) return "#2aa8a5";
  if ([7,8].includes(s)) return "#d2852f";
  if ([9,10].includes(s)) return "#7a4ab8";
  if ([11].includes(s)) return "#cc3333";
  return "#357cb0";
}
function roomResourceList() {
  return [{ id: "none", title: "未設定" }, ...rooms.map((r) => ({ id: String(r.id), title: r.name }))];
}
function onTypeChange() { document.getElementById("webUrlBlock").style.display = document.getElementById("mType").value === "web" ? "block" : "none"; }
function clearErr() { const el = document.getElementById("mErr"); el.style.display = "none"; el.textContent = ""; }
function showErr(msg) { const el = document.getElementById("mErr"); el.style.display = "block"; el.textContent = msg; }
function fillRoomAndStaffSelect() {
  document.getElementById("fRoom").innerHTML = '<option value="">すべて</option><option value="none">未設定</option>' + rooms.map((r) => `<option value="${r.id}">${r.name}</option>`).join("");
  document.getElementById("mRoom").innerHTML = '<option value="">未設定</option>' + rooms.map((r) => `<option value="${r.id}">${r.name}</option>`).join("");
  const uopts = users.map((u) => `<option value="${u.id}">${u.name}</option>`).join("");
  document.getElementById("fStaff").innerHTML = '<option value="">すべて</option>' + uopts;
  document.getElementById("mStaff").innerHTML = '<option value="">未設定</option>' + uopts;
}
function activeFilterTags() {
  const tags = [];
  [["fDate","日付"],["fStaff","担当者"],["fStatusValues","ステータス"],["fRoom","部屋"],["fVF","仮/確定"],["fKeyword","キーワード"]].forEach(([id,l]) => {
    const v = document.getElementById(id).value;
    if (v) tags.push(`<span class="pill">${l}: ${v} <a href="#" onclick="clearOneFilter('${id}');return false;" style="margin-left:6px;color:#666;text-decoration:none">×</a></span>`);
  });
  document.getElementById("activeFilters").innerHTML = tags.join("");
}
function updatePendingNotice() {
  const box = document.getElementById("pendingNotice");
  if (!box) return;
  const pending = currentEvents.filter((e) => e.status === "pending");
  if (!pending.length) {
    box.style.display = "none";
    box.textContent = "";
    return;
  }
  box.style.display = "block";
  box.textContent = `仮登録が ${pending.length} 件あります。未設定の予定が混在するため、内容を確認して「確定」に更新してください。`;
}
function toDateYmdLocal(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
function toHmLocal(d) {
  return `${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
}
async function persistCalendarDragChange(fcEvent, revertFn) {
  const e = fcEvent.extendedProps || {};
  const id = fcEvent.id;
  if (!id) { if (typeof revertFn === "function") revertFn(); return; }
  const st = fcEvent.start;
  const ed = fcEvent.end;
  if (!st || !ed) { if (typeof revertFn === "function") revertFn(); return; }
  const payload = {
    date: toDateYmdLocal(st),
    startTime: toHmLocal(st),
    endTime: toHmLocal(ed),
    roomId: fcEvent.getResources && fcEvent.getResources()[0] ? (fcEvent.getResources()[0].id === "none" ? null : fcEvent.getResources()[0].id) : (fcEvent.getResourceId && fcEvent.getResourceId() !== "none" ? fcEvent.getResourceId() : null),
    staffId: e.staffId || null,
    participants: Number(e.participants || 1),
    meetingType: e.meetingType || "visit",
    webMeetingUrl: e.webMeetingUrl || "",
    receptionStatus: e.receptionStatus || "",
    customerNameSei: e.customerNameSei || "",
    customerNameMei: e.customerNameMei || "",
    customerEmail: e.customerEmail || "",
    customerTel: e.customerTel || "",
    customerStatus: e.customerStatus == null ? "" : e.customerStatus,
    memo: e.memo || "",
    status: e.status || "pending",
    source: e.source || "manual",
  };
  try {
    const res = await fetch(`${CONFIG.API_BASE}/schedule/events/${encodeURIComponent(id)}`, {
      method: "PUT",
      headers: { Authorization: `Bearer ${Auth.getToken()}`, "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    const d = await res.json();
    if (!res.ok || !d.ok) throw new Error(d.message || "更新に失敗しました");
    if (d.warning) alert(d.warning);
    calendar.refetchEvents();
  } catch (err) {
    if (typeof revertFn === "function") revertFn();
    alert(err.message || "ドラッグ更新に失敗しました");
  }
}
function clearOneFilter(id) { document.getElementById(id).value = ""; applyFilters(); }
function buildQuery(info) {
  const q = new URLSearchParams();
  if (info?.startStr) q.set("start", info.startStr);
  if (info?.endStr) q.set("end", info.endStr);
  const date = document.getElementById("fDate").value;
  if (date) { q.set("start", `${date}T00:00:00`); q.set("end", `${date}T23:59:59`); }
  const roomId = document.getElementById("fRoom").value;
  const staffId = document.getElementById("fStaff").value;
  const vf = document.getElementById("fVF").value;
  const keyword = document.getElementById("fKeyword").value.trim();
  const statusValues = document.getElementById("fStatusValues").value.trim();
  if (roomId) q.set("roomId", roomId);
  if (staffId) q.set("staffId", staffId);
  if (vf) q.set("vf", vf);
  if (keyword) q.set("keyword", keyword);
  if (statusValues) q.set("statusValues", statusValues);
  return q.toString();
}
function recalcDailyTotal(dateStr) {
  const day = dateStr.slice(0, 10);
  const list = currentEvents.filter((e) => (e.date || "").slice(0, 10) === day);
  const groups = list.length;
  const people = list.reduce((a, b) => a + Number(b.participants || 0), 0);
  document.getElementById("dailyTotal").textContent = `来場予定者合計: ${groups}組（${people}名）`;
}
function eventToFc(e) {
  const title = `${(e.customerNameSei || "")}${(e.customerNameMei || "")}`.trim() || "未入力";
  const out = {
    id: e.id,
    title,
    start: e.start,
    end: e.end,
    resourceId: e.roomId || "none",
    backgroundColor: colorByEvent(e),
    borderColor: colorByEvent(e),
    extendedProps: e,
  };
  // 部屋未設定は背景を薄色にしているため、FC 既定の白文字だと視認性が悪い
  if (!e.roomId) out.textColor = "#1e293b";
  return out;
}
async function fetchEvents(info, success, failure) {
  try {
    activeFilterTags();
    const q = buildQuery(info);
    const res = await fetch(`${CONFIG.API_BASE}/schedule/events?${q}`, { headers: { Authorization: `Bearer ${Auth.getToken()}` } });
    const data = await res.json();
    if (!data.ok) throw new Error(data.message || "イベント取得に失敗しました");
    currentEvents = data.events || [];
    updatePendingNotice();
    recalcDailyTotal(calendar.getDate().toISOString());
    success(currentEvents.map(eventToFc));
  } catch (e) { failure(e); }
}
function setModalButtons(status, isUpdate) {
  const area = document.getElementById("modalButtons");
  if (!isUpdate) { area.innerHTML = `<button class="btn btn-sm" onclick="closeModal()">キャンセル</button><button class="btn btn-primary-solid btn-sm" onclick="saveEvent(false)">登録する</button>`; return; }
  if (status === "pending") { area.innerHTML = `<button class="btn btn-sm" onclick="closeModal()">キャンセル</button><button class="btn btn-sm" onclick="saveEvent(false)">仮登録のまま更新</button><button class="btn btn-primary-solid btn-sm" onclick="saveEvent(true)">確定する</button>`; return; }
  area.innerHTML = `<button class="btn btn-sm" style="color:#cc0000;border-color:#cc0000" onclick="deleteEvent()">削除</button><button class="btn btn-sm" onclick="closeModal()">キャンセル</button><button class="btn btn-primary-solid btn-sm" onclick="saveEvent(false)">更新する</button>`;
}
function openModalWith(e) {
  clearErr();
  document.getElementById("evId").value = e.id || "";
  document.getElementById("mDate").value = e.date || "";
  document.getElementById("mStart").value = e.startTime || "10:00";
  document.getElementById("mEnd").value = e.endTime || "11:00";
  document.getElementById("mRoom").value = e.roomId || "";
  document.getElementById("mStaff").value = e.staffId || "";
  document.getElementById("mParticipants").value = String(e.participants || 1);
  document.getElementById("mType").value = e.meetingType || "visit";
  document.getElementById("mWebUrl").value = e.webMeetingUrl || "";
  document.getElementById("mReception").value = e.receptionStatus || "";
  document.getElementById("mSei").value = e.customerNameSei || "";
  document.getElementById("mMei").value = e.customerNameMei || "";
  document.getElementById("mEmail").value = e.customerEmail || "";
  document.getElementById("mTel").value = e.customerTel || "";
  document.getElementById("mCustomerStatus").value = e.customerStatus ?? "";
  document.getElementById("mStatus").value = e.status || "pending";
  document.getElementById("mMemo").value = e.memo || "";
  onTypeChange();
  document.getElementById("modalTitle").textContent = e.id ? "予約詳細・編集" : "予約登録";
  setModalButtons(e.status || "pending", !!e.id);
  document.getElementById("editModal").style.display = "flex";
}
function closeModal() { document.getElementById("editModal").style.display = "none"; }
function payloadFromModal(forceConfirm) {
  const status = forceConfirm ? "confirmed" : document.getElementById("mStatus").value;
  return {
    date: document.getElementById("mDate").value,
    startTime: document.getElementById("mStart").value,
    endTime: document.getElementById("mEnd").value,
    roomId: document.getElementById("mRoom").value || null,
    staffId: document.getElementById("mStaff").value || null,
    participants: Number(document.getElementById("mParticipants").value || 1),
    meetingType: document.getElementById("mType").value,
    webMeetingUrl: document.getElementById("mWebUrl").value.trim(),
    receptionStatus: document.getElementById("mReception").value.trim(),
    customerNameSei: document.getElementById("mSei").value.trim(),
    customerNameMei: document.getElementById("mMei").value.trim(),
    customerEmail: document.getElementById("mEmail").value.trim(),
    customerTel: document.getElementById("mTel").value.trim(),
    customerStatus: document.getElementById("mCustomerStatus").value,
    memo: document.getElementById("mMemo").value.trim(),
    status,
    source: "manual",
  };
}
async function saveEvent(forceConfirm) {
  clearErr();
  const id = document.getElementById("evId").value;
  const payload = payloadFromModal(forceConfirm);
  if (!payload.date || !payload.startTime || !payload.endTime) return showErr("日付・開始時刻・終了時刻は必須です");
  if (payload.endTime <= payload.startTime) return showErr("終了時刻は開始時刻より後にしてください");
  const url = id ? `${CONFIG.API_BASE}/schedule/events/${encodeURIComponent(id)}` : `${CONFIG.API_BASE}/schedule/events`;
  const method = id ? "PUT" : "POST";
  const res = await fetch(url, { method, headers: { Authorization: `Bearer ${Auth.getToken()}`, "Content-Type": "application/json" }, body: JSON.stringify(payload) });
  const d = await res.json();
  if (!d.ok) return showErr(d.message || "保存に失敗しました");
  if (d.warning) alert(d.warning);
  closeModal();
  calendar.refetchEvents();
}
async function deleteEvent() {
  const id = document.getElementById("evId").value;
  if (!id) return;
  const res = await fetch(`${CONFIG.API_BASE}/schedule/events/${encodeURIComponent(id)}`, { method: "DELETE", headers: { Authorization: `Bearer ${Auth.getToken()}` } });
  const d = await res.json();
  if (!d.ok) return showErr(d.message || "削除に失敗しました");
  closeModal();
  calendar.refetchEvents();
}
function slotEnd(startDate) { const e = new Date(startDate.getTime()); e.setMinutes(e.getMinutes() + Number(scheduleSettings.autoSlotMinutes || 60)); return e; }
function applyFilters() { calendar.refetchEvents(); }
function clearFilters() { ["fDate","fStaff","fStatusValues","fRoom","fVF","fKeyword"].forEach((id)=>{document.getElementById(id).value="";}); applyFilters(); }

async function initSchedule() {
  const [rRes, uRes, sRes] = await Promise.all([
    fetch(`${CONFIG.API_BASE}/schedule/rooms`, { headers: { Authorization: `Bearer ${Auth.getToken()}` } }),
    fetch(`${CONFIG.API_BASE}/user/accounts`, { headers: { Authorization: `Bearer ${Auth.getToken()}` } }),
    fetch(`${CONFIG.API_BASE}/schedule/settings`, { headers: { Authorization: `Bearer ${Auth.getToken()}` } }),
  ]);
  const rData = await rRes.json();
  const uData = await uRes.json();
  const sData = await sRes.json();
  if (!rData.ok) throw new Error(rData.message || "部屋取得に失敗しました");
  if (!uData.ok) throw new Error(uData.message || "担当者取得に失敗しました");
  rooms = rData.rooms || [];
  users = uData.accounts || [];
  if (sData.ok && sData.settings) scheduleSettings = sData.settings;
  fillRoomAndStaffSelect();

  calendar = new FullCalendar.Calendar(document.getElementById("calendar"), {
    schedulerLicenseKey: "GPL-My-Project-Is-Open-Source",
    locale: "ja",
    initialView: "resourceTimeGridDay",
    resourceAreaHeaderContent: "部屋",
    resources: roomResourceList(),
    resourceOrder: (a, b) => {
      if (a.id === "none" && b.id !== "none") return -1;
      if (a.id !== "none" && b.id === "none") return 1;
      return String(a.title || "").localeCompare(String(b.title || ""), "ja");
    },
    slotDuration: "00:15:00",
    slotMinTime: "09:00:00",
    slotMaxTime: "20:00:00",
    selectable: true,
    editable: true,
    eventStartEditable: true,
    eventDurationEditable: true,
    eventResourceEditable: true,
    nowIndicator: true,
    headerToolbar: { left: "prev,next todayBtn", center: "title", right: "resourceTimeGridDay,timeGridWeek,dayGridMonth" },
    customButtons: { todayBtn: { text: "今日", click() { calendar.today(); recalcDailyTotal(new Date().toISOString()); } } },
    datesSet(info) { if (calendar.view.type === "resourceTimeGridDay") recalcDailyTotal(info.startStr); },
    events: fetchEvents,
    eventContent(arg) {
      const e = arg.event.extendedProps;
      const nm = `${e.customerNameSei || ""}${e.customerNameMei || ""}`.trim() || "未入力";
      const staff = users.find((u) => String(u.id) === String(e.staffId || ""))?.name || "未設定";
      const roomNone = !e.roomId;
      const textColor = roomNone ? "color:#1e293b" : "";
      return {
        html: `<div class="schedule-event-inner" style="font-size:11px;line-height:1.35;${textColor}">
          <div style="font-weight:700">${nm}${e.status==="pending"?'<span class="badge-pending">仮</span>':""}${roomNone?'<span class="badge-room-none">部屋未設定</span>':""}</div>
          <div>${e.participants||1}名 / ${staff}</div>
        </div>`,
      };
    },
    eventClassNames(arg) {
      const e = arg.event.extendedProps || {};
      return !e.roomId ? ["event-room-none"] : [];
    },
    dateClick(arg) {
      if (calendar.view.type === "dayGridMonth") { calendar.changeView("resourceTimeGridDay", arg.dateStr); return; }
      const s = arg.date;
      const e = slotEnd(s);
      openModalWith({
        date: arg.dateStr.slice(0, 10),
        startTime: `${String(s.getHours()).padStart(2, "0")}:${String(s.getMinutes()).padStart(2, "0")}`,
        endTime: `${String(e.getHours()).padStart(2, "0")}:${String(e.getMinutes()).padStart(2, "0")}`,
        roomId: arg.resource?.id && arg.resource.id !== "none" ? arg.resource.id : null,
        status: "pending",
      });
    },
    dayCellDidMount(arg) {
      if (calendar.view.type !== "dayGridMonth") return;
      const ymd = arg.date.toISOString().slice(0, 10);
      const list = currentEvents.filter((e) => (e.date || "").slice(0, 10) === ymd);
      if (!list.length) return;
      const wrap = document.createElement("div");
      wrap.style.marginTop = "2px";
      const confirmed = list.some((x) => x.status === "confirmed");
      const bg = confirmed ? "#e8f2ff" : "#f2f2f2";
      const names = list.slice(0, 2).map((x) => `${x.customerNameSei || ""}${x.customerNameMei || ""}`.trim() || "未入力");
      wrap.innerHTML = `<div style="display:inline-block;padding:1px 6px;border-radius:10px;background:${bg};font-size:10px;margin-bottom:2px">${list.length}件</div>
        ${names.map((n)=>`<div style="font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:${bg};border-radius:8px;padding:0 5px;margin-top:1px">${n}</div>`).join("")}
        ${list.length > 2 ? `<div style="font-size:10px;color:#666">+${list.length - 2}件</div>` : ""}`;
      arg.el.appendChild(wrap);
    },
    eventClick(arg) { openModalWith(arg.event.extendedProps); },
    eventDrop(arg) { persistCalendarDragChange(arg.event, arg.revert); },
    eventResize(arg) { persistCalendarDragChange(arg.event, arg.revert); },
  });
  calendar.render();
}

(async () => {
  if (!await requireAuth()) return;
  document.getElementById("header").innerHTML = renderHeader("schedule.html");
  try { await initSchedule(); }
  catch (e) { document.getElementById("calendar").innerHTML = `<div class="error-box">⚠️ ${e.message}</div>`; }
})();
</script>
</body>
</html>
