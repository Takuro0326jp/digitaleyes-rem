<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1300">
<title>ログイン | Real Estate Manager by DIGITALEYES</title>
<link rel="stylesheet" href="common.css">
<style>
body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-card { background: #fff; padding: 48px 44px; width: 420px; box-shadow: 0 8px 40px rgba(0,0,0,0.2); }
.login-logo { text-align: center; margin-bottom: 32px; }
.login-logo h1 { font-size: 20px; font-weight: 700; color: rgb(70,83,98); margin-bottom: 4px; }
.login-logo p { font-size: 12px; color: rgb(53,124,176); }
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: rgb(70,83,98); margin-bottom: 6px; }
.form-group input { width: 100%; padding: 9px 12px; border: 1px solid #ced4da; font-size: 14px; font-family: inherit; color: rgb(70,83,98); }
.form-group input:focus { outline: none; border-color: rgb(53,124,176); }
.btn-login { width: 100%; padding: 11px; background: rgb(53,124,176); color: #fff; border: none; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 6px; }
.btn-login:hover { background: rgb(40,100,150); }
.btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
.error-msg { color: #cc0000; font-size: 13px; margin-top: 10px; display: none; padding: 8px 12px; background: #fff3f3; border: 1px solid #ffcccc; }
.note { font-size: 11px; color: rgb(150,160,170); text-align: center; margin-top: 20px; }
</style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <h1>Real Estate Manager</h1>
    <p>by DIGITALEYES</p>
  </div>
  <div class="form-group">
    <label>メールアドレス</label>
    <input type="email" id="email" placeholder="admin@example.com" autocomplete="email">
  </div>
  <div class="form-group">
    <label>パスワード</label>
    <input type="password" id="password" placeholder="パスワード" autocomplete="current-password">
  </div>
  <div id="errorMsg" class="error-msg"></div>
  <button class="btn-login" id="btnLogin" onclick="login()">ログイン</button>
  <div class="note">初期アカウント: admin@example.com / admin</div>
</div>
<script>
const API_BASE = window.location.protocol === "file:" ? "http://localhost:3001" : "";
const token = localStorage.getItem("token");
if (token) {
  fetch(`${API_BASE}/auth/me`, { headers: { "Authorization": `Bearer ${token}` } })
    .then(r => r.json()).then(d => { if (d.ok) window.location.href = "dashboard.html"; }).catch(()=>{});
}
async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  if (!email || !password) { showErr("メールアドレスとパスワードを入力してください"); return; }
  const btn = document.getElementById("btnLogin");
  btn.disabled = true; btn.textContent = "ログイン中...";
  try {
    const res = await fetch(`${API_BASE}/auth/login`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!data.ok) { showErr(data.message || "ログインに失敗しました"); return; }
    localStorage.setItem("token", data.token);
    localStorage.setItem("user", JSON.stringify(data.user));
    localStorage.setItem("properties", JSON.stringify(data.properties));
    const active = data.properties.find(p => p.id === data.user.activePropertyId) || data.properties[0] || null;
    localStorage.setItem("activeProperty", JSON.stringify(active));
    window.location.href = "dashboard.html";
  } catch(e) {
    showErr("接続エラー：ターミナルで「node proxy-server.js」が起動しているか確認してください");
  } finally { btn.disabled = false; btn.textContent = "ログイン"; }
}
function showErr(msg) { const el = document.getElementById("errorMsg"); el.textContent = msg; el.style.display = "block"; }
document.addEventListener("keydown", e => { if (e.key === "Enter") login(); });
</script>
</body>
</html>
