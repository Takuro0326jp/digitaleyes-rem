<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1300">
  <title>クライアント一覧 | Real Estate Manager by DIGITALEYES</title>
  <link rel="stylesheet" href="common.css">
  <style>
    .crumb { font-size:12px; color:rgb(120,130,140); margin: 14px 0 6px; }
    .crumb a { color:rgb(53,124,176); }
    .row-even td { background: rgba(53,124,176,0.06); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; display:none; align-items:center; justify-content:center; padding:24px; }
    .modal-box { background:#fff; width:100%; max-width:600px; box-shadow:0 8px 40px rgba(0,0,0,0.25); border-radius: 8px; overflow: hidden; }
    .modal-header { background: rgb(70,83,98); padding: 14px 20px; display:flex; align-items:center; justify-content:space-between; }
    .modal-header h3 { color:#fff; font-size: 16px; font-weight:600; margin:0; }
    .modal-close { background:none; border:none; color:#fff; font-size:20px; cursor:pointer; line-height:1; }
    .modal-body { padding: 22px 24px; }
    .modal-footer { padding: 14px 24px; border-top:1px solid rgb(224,224,224); display:flex; justify-content:flex-end; gap:10px; background:#fafbfc; }
    /* クライアント登録・編集フォーム */
    #clientModal .form-row { display:flex; flex-wrap:wrap; gap:18px 16px; align-items:flex-start; }
    #clientModal .form-row--single .form-group { flex:1 1 100%; min-width:0; }
    #clientModal .form-group { flex:1 1 200px; min-width:0; margin:0; }
    #clientModal .form-group label { display:block; font-size:12px; font-weight:600; color:rgb(70,83,98); margin-bottom:8px; letter-spacing:0.02em; }
    #clientModal .form-group .req { color:#c62828; font-weight:700; }
    #clientModal .form-group input {
      width:100%;
      box-sizing:border-box;
      padding:10px 14px;
      border:1px solid #b8c2cc;
      border-radius:6px;
      font-size:14px;
      font-family:inherit;
      color:rgb(50,60,72);
      background:#fff;
      line-height:1.4;
      transition:border-color 0.15s ease, box-shadow 0.15s ease;
    }
    #clientModal .form-group input:hover { border-color:#97a6b3; }
    #clientModal .form-group input:focus {
      outline:none;
      border-color:rgb(53,124,176);
      box-shadow:0 0 0 3px rgba(53,124,176,0.18);
    }
    #clientModal .form-group input::placeholder { color:#9aa5b1; }
  </style>
</head>
<body>
<div id="wrapper">
<div id="page-wrapper">
  <header class="header" id="header"></header>
  <main class="main">
    <div class="crumb"><a href="dashboard.html">ダッシュボード</a> ＞ クライアント一覧</div>
    <div class="page-title-bar">
      <h1>クライアント一覧</h1>
      <span id="totalLabel" style="font-size:13px;color:rgb(120,130,140)"></span>
    </div>

    <div class="action-row">
      <button class="btn btn-primary-solid btn-sm" onclick="openClientModal()">新規登録</button>
      <button class="btn btn-sm" id="btnToggleAll" onclick="toggleAll()">全て選択</button>
      <button class="btn btn-sm" id="btnDelete" onclick="openDelete()" disabled>削除</button>
    </div>

    <div id="tableArea"><div class="loading-spinner"></div></div>
  </main>
</div>
</div>

<div class="modal-overlay" id="clientModal" onclick="closeClientModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="clientModalTitle">クライアント登録</h3>
      <button class="modal-close" onclick="closeClientModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="mId">
      <div class="form-row">
        <div class="form-group">
          <label for="mName">企業名 <span class="req">*</span></label>
          <input id="mName" type="text" autocomplete="organization" placeholder="例：株式会社〇〇">
        </div>
        <div class="form-group">
          <label for="mKana">フリガナ <span class="req">*</span></label>
          <input id="mKana" type="text" autocomplete="off" placeholder="例：カブシキガイシャ〇〇">
        </div>
      </div>
      <div class="form-row form-row--single">
        <div class="form-group">
          <label for="mEmail">E-mail <span class="req">*</span></label>
          <input id="mEmail" type="email" autocomplete="email" placeholder="例：contact@example.com">
        </div>
      </div>
      <div id="mErr" class="error-box" style="display:none"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-sm" onclick="closeClientModal()">キャンセル</button>
      <button class="btn btn-primary-solid btn-sm" onclick="saveClientModal()">保存</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="deleteModal" onclick="closeDelete()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3>削除確認</h3>
      <button class="modal-close" onclick="closeDelete()">✕</button>
    </div>
    <div class="modal-body">
      <div style="font-weight:700;margin-bottom:8px">本当にこの項目を削除しますか？</div>
      <div style="color:rgb(120,130,140)">この操作は取り消せません。</div>
      <div id="deleteCount" style="margin-top:10px"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-sm" onclick="closeDelete()">キャンセル</button>
      <button class="btn btn-sm" style="color:#cc0000;border-color:#cc0000" onclick="confirmDelete()">削除する</button>
    </div>
  </div>
</div>

<script src="common.js"></script>
<script>
let clients = [];
let selected = new Set();
function validEmail(s){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(s||"").trim()); }

function clientDetailHref(id) {
  const sid = encodeURIComponent(String(id));
  if (typeof location !== "undefined" && location.protocol === "file:") {
    return `client-detail.html?id=${sid}`;
  }
  return `/client/detail/${sid}`;
}

function updateDeleteUi() {
  document.getElementById("btnDelete").disabled = selected.size === 0;
  document.getElementById("btnToggleAll").textContent = (clients.length && selected.size === clients.length) ? "選択解除" : "全て選択";
}

function render() {
  document.getElementById("totalLabel").textContent = `総件数: ${clients.length.toLocaleString()}件`;
  if (!clients.length) {
    document.getElementById("tableArea").innerHTML = '<div class="empty-msg">クライアントがありません</div>';
    updateDeleteUi();
    return;
  }
  let html = `<div class="table-scroll"><table class="list-table">
    <thead><tr>
      <th style="width:46px"><input type="checkbox" onclick="toggleAll()" ${selected.size===clients.length?"checked":""}></th>
      <th>企業名</th><th>E-mail</th><th style="width:140px">操作</th>
    </tr></thead><tbody>`;
  clients.forEach((c, idx) => {
    const checked = selected.has(String(c.id));
    html += `<tr class="${idx%2===1?'row-even':''}">
      <td style="text-align:center"><input type="checkbox" ${checked?"checked":""} onchange="toggleOne('${c.id}')"></td>
      <td style="font-weight:700">${c.name || ""}</td>
      <td style="color:rgb(53,124,176)">${c.email || ""}</td>
      <td><a class="btn btn-sm" href="${clientDetailHref(c.id)}">詳細を開く</a></td>
    </tr>`;
  });
  html += "</tbody></table></div>";
  document.getElementById("tableArea").innerHTML = html;
  updateDeleteUi();
}

function toggleOne(id) {
  const k = String(id);
  if (selected.has(k)) selected.delete(k);
  else selected.add(k);
  updateDeleteUi();
}

function toggleAll() {
  if (!clients.length) return;
  if (selected.size === clients.length) selected = new Set();
  else selected = new Set(clients.map((c) => String(c.id)));
  render();
}

function openDelete() {
  if (!selected.size) return;
  document.getElementById("deleteCount").textContent = `選択した ${selected.size} 件を削除します。`;
  document.getElementById("deleteModal").style.display = "flex";
}
function closeDelete() { document.getElementById("deleteModal").style.display = "none"; }

function closeClientModal() {
  document.getElementById("clientModal").style.display = "none";
}

function openClientModal() {
  document.getElementById("mId").value = "";
  document.getElementById("mName").value = "";
  document.getElementById("mKana").value = "";
  document.getElementById("mEmail").value = "";
  document.getElementById("clientModalTitle").textContent = "クライアント登録";
  document.getElementById("mErr").style.display = "none";
  document.getElementById("mErr").textContent = "";
  document.getElementById("clientModal").style.display = "flex";
}

async function saveClientModal() {
  const id = document.getElementById("mId").value;
  const name = document.getElementById("mName").value.trim();
  const nameKana = document.getElementById("mKana").value.trim();
  const email = document.getElementById("mEmail").value.trim();
  if (!name || !nameKana || !email) {
    document.getElementById("mErr").textContent = "企業名・フリガナ・E-mail は必須です";
    document.getElementById("mErr").style.display = "block";
    return;
  }
  if (!validEmail(email)) {
    document.getElementById("mErr").textContent = "E-mail 形式が不正です";
    document.getElementById("mErr").style.display = "block";
    return;
  }
  const url = id ? `${CONFIG.API_BASE}/client/edit/${encodeURIComponent(id)}` : `${CONFIG.API_BASE}/client/create`;
  let res;
  try {
    res = await fetch(url, {
      method: "POST",
      headers: { Authorization: `Bearer ${Auth.getToken()}`, "Content-Type": "application/json" },
      body: JSON.stringify({ name, nameKana, email }),
    });
  } catch (e) {
    document.getElementById("mErr").textContent = "通信に失敗しました。ネットワークを確認してください。";
    document.getElementById("mErr").style.display = "block";
    return;
  }
  const raw = await res.text();
  let d;
  try {
    d = raw ? JSON.parse(raw) : {};
  } catch (_) {
    document.getElementById("mErr").textContent =
      res.status >= 400
        ? `保存に失敗しました（HTTP ${res.status}）${raw ? `: ${raw.slice(0, 200)}` : ""}`
        : "サーバーからの応答を解析できませんでした。";
    document.getElementById("mErr").style.display = "block";
    return;
  }
  if (!d.ok) {
    document.getElementById("mErr").textContent = d.message || "保存に失敗しました";
    document.getElementById("mErr").style.display = "block";
    return;
  }
  closeClientModal();
  await load();
}

async function confirmDelete() {
  const ids = Array.from(selected);
  const res = await fetch(`${CONFIG.API_BASE}/client/delete`, {
    method: "POST",
    headers: { Authorization: `Bearer ${Auth.getToken()}`, "Content-Type": "application/json" },
    body: JSON.stringify({ ids }),
  });
  const d = await res.json();
  if (!d.ok) { alert(d.message || "削除に失敗しました"); return; }
  closeDelete();
  await load();
}

async function load() {
  selected = new Set();
  document.getElementById("tableArea").innerHTML = '<div class="loading-spinner"></div>';
  let res;
  try {
    res = await fetch(`${CONFIG.API_BASE}/client/api/list`, { headers: { Authorization: `Bearer ${Auth.getToken()}` } });
    // 古い proxy / 末尾スラッシュ差などで 404 のときは従来のクエリ付き URL にフォールバック
    if (res.status === 404) {
      res = await fetch(`${CONFIG.API_BASE}/client?api=1`, { headers: { Authorization: `Bearer ${Auth.getToken()}` } });
    }
  } catch (_) {
    document.getElementById("tableArea").innerHTML = '<div class="error-box">⚠️ 通信に失敗しました。ネットワークを確認してください。</div>';
    return;
  }
  const raw = await res.text();
  let d;
  try {
    d = raw ? JSON.parse(raw) : {};
  } catch (_) {
    document.getElementById("tableArea").innerHTML = `<div class="error-box">⚠️ サーバーから JSON 以外の応答が返りました（HTTP ${res.status}）。再読み込みするか、管理者にお問い合わせください。</div>`;
    return;
  }
  if (!d.ok) { document.getElementById("tableArea").innerHTML = `<div class="error-box">⚠️ ${d.message || "取得に失敗しました"}</div>`; return; }
  clients = d.clients || [];
  render();
}

(async () => {
  if (!await requireAuth()) return;
  document.getElementById("header").innerHTML = renderHeader("client.html");
  await load();
})();
</script>
</body>
</html>
