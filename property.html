<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1300">
<title>物件一覧 | Real Estate Manager by DIGITALEYES</title>
<link rel="stylesheet" href="common.css">
<style>
.toolbar { margin-bottom: 14px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.search-input { width: 260px; padding: 8px 10px; border: 1px solid #ced4da; font-size: 13px; font-family: inherit; }
.select-sm { min-width: 180px; padding: 8px 10px; border: 1px solid #ced4da; font-size: 13px; font-family: inherit; }
.table-scroll { background: #fff; border: 1px solid rgb(224,224,224); }
.sortable { cursor: pointer; user-select: none; }
.sortable .arrow { margin-left: 4px; color: rgb(120,130,140); font-size: 10px; }
.property-cell { display: flex; align-items: center; gap: 10px; min-height: 54px; }
.thumb { width: 64px; height: 48px; border: 1px solid rgb(224,224,224); background: #f2f2f2; flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; color: rgb(150,160,170); font-size: 10px; }
.thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.property-name { font-weight: 700; color: rgb(70,83,98); }
.row-clickable { cursor: pointer; }
.muted { color: rgb(150,160,170); }
.pagination { margin-top: 14px; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 1000; display: none; align-items: center; justify-content: center; }
.modal-box { background: #fff; width: 560px; box-shadow: 0 8px 40px rgba(0,0,0,.2); }
.modal-header { background: rgb(70,83,98); color: #fff; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
.modal-body { padding: 20px; }
.modal-footer { border-top: 1px solid rgb(224,224,224); padding: 12px 20px; display: flex; justify-content: flex-end; gap: 8px; }
</style>
</head>
<body>
<div id="wrapper">
<div id="page-wrapper">
  <header class="header" id="header"></header>
  <main class="main">
    <div class="page-title-bar">
      <h1>物件一覧</h1>
    </div>

    <div class="toolbar">
      <button class="btn btn-primary-solid btn-sm" onclick="goNew()">新規登録</button>
      <button id="btnSelectAll" class="btn btn-sm" onclick="toggleSelectAll()">全て選択</button>
      <button id="btnDeleteSelected" class="btn btn-sm" onclick="openBulkDeleteModal()" disabled>削除</button>
      <label style="margin-left:10px"><input type="checkbox" id="showSoldout" onchange="onFilterChange()"> 完売物件を表示</label>
      <select id="salesStatusFilter" class="select-sm" onchange="onFilterChange()">
        <option value="">販売状況: すべて</option>
      </select>
      <input id="keyword" class="search-input" type="text" placeholder="物件名で検索">
    </div>

    <div id="content"><div class="loading-spinner"></div></div>
    <div class="pagination" id="pagination"></div>
  </main>
</div>
</div>

<div class="modal-overlay" id="singleDeleteModal" onclick="closeSingleDeleteModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header"><h3>物件削除</h3><button class="modal-close" onclick="closeSingleDeleteModal()">✕</button></div>
    <div class="modal-body" id="singleDeleteText"></div>
    <div class="modal-footer">
      <button class="btn btn-sm" onclick="closeSingleDeleteModal()">キャンセル</button>
      <button class="btn btn-sm" style="color:#cc0000;border-color:#cc0000" onclick="confirmSingleDelete()">削除する</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="bulkDeleteModal" onclick="closeBulkDeleteModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header"><h3>一括削除</h3><button class="modal-close" onclick="closeBulkDeleteModal()">✕</button></div>
    <div class="modal-body" id="bulkDeleteText"></div>
    <div class="modal-footer">
      <button class="btn btn-sm" onclick="closeBulkDeleteModal()">キャンセル</button>
      <button class="btn btn-sm" style="color:#cc0000;border-color:#cc0000" onclick="confirmBulkDelete()">削除する</button>
    </div>
  </div>
</div>

<script src="common.js"></script>
<script>
const PAGE_SIZE = 20;
let allRows = [];
let filteredRows = [];
let selectedIds = new Set();
let page = 1;
let sortKey = "registeredAt";
let sortDir = "desc";
let deleteTarget = null;
let searchTimer = null;

const SORTABLE_COLUMNS = [
  { key: "name", label: "物件名" },
  { key: "salesStatus", label: "販売状況" },
  { key: "buildingConfirmDate", label: "建築確認取得日" },
  { key: "remainingRate", label: "残戸数/販売戸数" },
  { key: "completionDate", label: "竣工年月日" },
];

function valueOrDash(v) {
  return v === undefined || v === null || String(v).trim() === "" ? "―" : String(v);
}

function statusOf(p) {
  return p.salesStatus || (p.isSoldOut ? "完売" : "販売中");
}

function toRow(p, i) {
  const sold = p.isSoldOut || statusOf(p) === "完売";
  const salesUnits = Number(p.salesUnits || 0);
  const remainingUnits = p.remainingUnits === undefined || p.remainingUnits === null ? null : Number(p.remainingUnits);
  const registeredAt = p.createdAt || p.insDate || p.updatedAt || String(i);
  return {
    id: p.id,
    name: p.name || "―",
    salesStatus: statusOf(p),
    buildingConfirmDate: p.buildingConfirmDate || p.kakuninDate || "",
    salesUnits,
    remainingUnits,
    remainingRate: remainingUnits === null ? "" : `${remainingUnits}/${salesUnits || 0}`,
    completionDate: p.completionDate || p.kanseiDate || "",
    thumbnailUrl: p.thumbnailUrl || p.thumbUrl || "",
    soldOut: sold,
    raw: p,
    registeredAt
  };
}

function arrowFor(key) {
  if (sortKey !== key) return "";
  return sortDir === "asc" ? "▲" : "▼";
}

function renderHeaderSort() {
  return SORTABLE_COLUMNS.map((c) => {
    return `<th class="sortable" onclick="setSort('${c.key}')">${c.label}<span class="arrow">${arrowFor(c.key)}</span></th>`;
  }).join("");
}

function getCurrentPageFromUrl() {
  const p = parseInt(new URLSearchParams(location.search).get("page"), 10);
  return Number.isFinite(p) && p > 0 ? p : 1;
}

function setPageToUrl(p) {
  const u = new URL(location.href);
  u.searchParams.set("page", String(p));
  history.replaceState(null, "", u.toString());
}

function applyFiltersAndSort() {
  const showSold = document.getElementById("showSoldout").checked;
  const statusFilter = document.getElementById("salesStatusFilter").value;
  const keyword = document.getElementById("keyword").value.trim().toLowerCase();

  filteredRows = allRows.filter((r) => {
    if (!showSold && r.soldOut) return false;
    if (statusFilter && r.salesStatus !== statusFilter) return false;
    if (keyword && !r.name.toLowerCase().includes(keyword)) return false;
    return true;
  });

  filteredRows.sort((a, b) => {
    const va = a[sortKey] ?? "";
    const vb = b[sortKey] ?? "";
    let cmp;
    if (sortKey === "remainingRate") {
      const ra = a.remainingUnits ?? 999999;
      const rb = b.remainingUnits ?? 999999;
      cmp = ra - rb;
    } else {
      cmp = String(va).localeCompare(String(vb), "ja");
    }
    return sortDir === "asc" ? cmp : -cmp;
  });
}

function renderTable() {
  applyFiltersAndSort();
  const maxPage = Math.max(1, Math.ceil(filteredRows.length / PAGE_SIZE));
  if (page > maxPage) page = maxPage;
  setPageToUrl(page);
  const start = (page - 1) * PAGE_SIZE;
  const rows = filteredRows.slice(start, start + PAGE_SIZE);

  if (!rows.length) {
    document.getElementById("content").innerHTML = `<div class="empty-msg">該当する物件が見つかりません</div>`;
    renderPagination();
    updateSelectUi();
    return;
  }

  document.getElementById("content").innerHTML = `
    <div class="table-scroll">
      <table class="list-table">
        <thead>
          <tr>
            <th style="width:36px"><input type="checkbox" ${rows.length && rows.every((r) => selectedIds.has(r.id)) ? "checked" : ""} onclick="toggleSelectVisible(event)"></th>
            ${renderHeaderSort()}
            <th style="width:70px">詳細</th>
            <th style="width:70px">削除</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map((r) => `
            <tr class="row-clickable" onclick="goDetail('${r.id}')">
              <td onclick="event.stopPropagation()"><input type="checkbox" ${selectedIds.has(r.id) ? "checked" : ""} onchange="toggleSelectOne('${r.id}')"></td>
              <td>
                <div class="property-cell">
                  <div class="thumb">
                    ${r.thumbnailUrl ? `<img src="${r.thumbnailUrl}" alt="">` : `<span>placeholder</span>`}
                  </div>
                  <div class="property-name">${valueOrDash(r.name)}</div>
                </div>
              </td>
              <td>${valueOrDash(r.salesStatus)}</td>
              <td>${valueOrDash(r.buildingConfirmDate)}</td>
              <td>${valueOrDash(r.remainingRate)}</td>
              <td>${valueOrDash(r.completionDate)}</td>
              <td onclick="event.stopPropagation()"><a href="property-detail.html?id=${encodeURIComponent(r.id)}">詳細</a></td>
              <td onclick="event.stopPropagation()"><button class="btn btn-sm" style="color:#cc0000;border-color:#cc0000" onclick="openSingleDeleteModal('${r.id}')">削除</button></td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>
  `;
  renderPagination();
  updateSelectUi();
}

function renderPagination() {
  const totalPage = Math.max(1, Math.ceil(filteredRows.length / PAGE_SIZE));
  if (totalPage <= 1) {
    document.getElementById("pagination").innerHTML = "";
    return;
  }
  let html = `<button onclick="goPage(${page - 1})" ${page === 1 ? "disabled" : ""}>＜</button>`;
  const from = Math.max(1, page - 3);
  const to = Math.min(totalPage, from + 6);
  for (let p = from; p <= to; p++) {
    html += `<button class="${p === page ? "active" : ""}" onclick="goPage(${p})">${p}</button>`;
  }
  html += `<button onclick="goPage(${page + 1})" ${page === totalPage ? "disabled" : ""}>＞</button>`;
  document.getElementById("pagination").innerHTML = html;
}

function goPage(p) {
  const totalPage = Math.max(1, Math.ceil(filteredRows.length / PAGE_SIZE));
  if (p < 1 || p > totalPage) return;
  page = p;
  renderTable();
}

function updateSelectUi() {
  const selectedCount = selectedIds.size;
  const deleteBtn = document.getElementById("btnDeleteSelected");
  deleteBtn.disabled = selectedCount === 0;
  document.getElementById("btnSelectAll").textContent = selectedCount ? "選択解除" : "全て選択";
}

function toggleSelectOne(id) {
  if (selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  updateSelectUi();
}

function toggleSelectVisible(e) {
  const checked = e.target.checked;
  const start = (page - 1) * PAGE_SIZE;
  const rows = filteredRows.slice(start, start + PAGE_SIZE);
  rows.forEach((r) => {
    if (checked) selectedIds.add(r.id);
    else selectedIds.delete(r.id);
  });
  renderTable();
}

function toggleSelectAll() {
  if (selectedIds.size) selectedIds.clear();
  else filteredRows.forEach((r) => selectedIds.add(r.id));
  renderTable();
}

function setSort(key) {
  if (sortKey === key) sortDir = sortDir === "asc" ? "desc" : "asc";
  else {
    sortKey = key;
    sortDir = "asc";
  }
  renderTable();
}

function onFilterChange() {
  page = 1;
  renderTable();
}

function bindSearch() {
  const input = document.getElementById("keyword");
  input.addEventListener("input", () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      page = 1;
      renderTable();
    }, 300);
  });
}

function populateSalesStatusFilter() {
  const current = document.getElementById("salesStatusFilter").value;
  document.getElementById("salesStatusFilter").innerHTML = '<option value="">販売状況: すべて</option>';
  const statuses = [...new Set(allRows.map((r) => r.salesStatus).filter(Boolean))];
  const el = document.getElementById("salesStatusFilter");
  statuses.forEach((s) => {
    const opt = document.createElement("option");
    opt.value = s;
    opt.textContent = s;
    el.appendChild(opt);
  });
  if (current) el.value = current;
}

function goNew() {
  location.href = "settings.html";
}

function goDetail(id) {
  location.href = `property-detail.html?id=${encodeURIComponent(id)}`;
}

function openSingleDeleteModal(id) {
  deleteTarget = id;
  const row = allRows.find((r) => r.id === id);
  document.getElementById("singleDeleteText").textContent = `${row ? row.name : "この物件"} を削除します。この操作は取り消せません。`;
  document.getElementById("singleDeleteModal").style.display = "flex";
}

function closeSingleDeleteModal() {
  deleteTarget = null;
  document.getElementById("singleDeleteModal").style.display = "none";
}

function openBulkDeleteModal() {
  if (!selectedIds.size) return;
  document.getElementById("bulkDeleteText").textContent = `選択した ${selectedIds.size} 件を削除します。この操作は取り消せません。`;
  document.getElementById("bulkDeleteModal").style.display = "flex";
}

function closeBulkDeleteModal() {
  document.getElementById("bulkDeleteModal").style.display = "none";
}

async function confirmSingleDelete() {
  if (!deleteTarget) return;
  await deleteByIds([deleteTarget]);
  closeSingleDeleteModal();
}

async function confirmBulkDelete() {
  if (!selectedIds.size) return;
  await deleteByIds([...selectedIds]);
  closeBulkDeleteModal();
}

async function deleteByIds(ids) {
  for (const id of ids) {
    await fetch(`${CONFIG.API_BASE}/user/properties/${id}`, {
      method: "DELETE",
      headers: { "Authorization": `Bearer ${Auth.getToken()}` }
    });
  }
  selectedIds.clear();
  await requireAuth();
  allRows = Auth.getProperties().map(toRow);
  populateSalesStatusFilter();
  renderTable();
}

function load() {
  allRows = Auth.getProperties().map(toRow);
  page = getCurrentPageFromUrl();
  populateSalesStatusFilter();
  bindSearch();
  renderTable();
}

(async () => {
  if (!await requireAuth()) return;
  document.getElementById("header").innerHTML = renderHeader("property.html");
  load();
})();
</script>
</body>
</html>
