<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1300">
<title>物件一覧 | Real Estate Manager by DIGITALEYES</title>
<link rel="stylesheet" href="common.css">
<style>
.property-card { border: 1px solid rgb(224,224,224); padding: 24px; margin-bottom: 16px; display: flex; gap: 24px; }
.property-card:hover { background: rgba(53,124,176,0.03); }
.property-img { width: 200px; height: 140px; background: rgba(224,224,224,0.4); flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: rgb(150,160,170); font-size: 12px; }
.property-info { flex: 1; }
.property-name { font-size: 18px; font-weight: 700; color: rgb(70,83,98); margin-bottom: 8px; }
.property-stats { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 12px; }
.stat-item { text-align: center; }
.stat-label { font-size: 11px; color: rgb(120,130,140); margin-bottom: 2px; }
.stat-value { font-size: 22px; font-weight: 700; color: rgb(53,124,176); }
.stat-value small { font-size: 12px; color: rgb(70,83,98); font-weight: 400; }
.property-meta { font-size: 12px; color: rgb(120,130,140); display: flex; gap: 20px; flex-wrap: wrap; }
.property-meta dt { font-weight: 600; display: inline; }
.property-meta dd { display: inline; margin-left: 4px; margin-right: 16px; }
.property-actions { display: flex; flex-direction: column; gap: 8px; justify-content: center; }
</style>
</head>
<body>
<div id="wrapper">
<div id="page-wrapper">
  <header class="header" id="header"></header>
  <main class="main">
    <div class="page-title-bar">
      <h1>物件一覧</h1>
    </div>
    <div id="content"><div class="loading-spinner"></div></div>
  </main>
</div>
</div>
<script src="common.js"></script>
<script>
async function load() {
  try {
    const data = await apiCall({
      limit: 1000,
      fields: JSON.stringify(["c.id","c.status","c.baitai","c.date_entry","c.date_visit","c.bukkenflag"])
    });
    const all = data.result || [];
    const total = all.length;
    const visited = all.filter(c => ["新規来場","再来場","再々来場1","申込","契約","引渡"].includes(c["c.status"])).length;
    const contracted = all.filter(c => c["c.status"]==="契約").length;
    const applied = all.filter(c => c["c.status"]==="申込").length;
    const requested = all.filter(c => c["c.status"]==="要望").length;

    document.getElementById("content").innerHTML = `
      <div class="property-card">
        <div class="property-img">物件画像</div>
        <div class="property-info">
          <div class="property-name">${CONFIG.PROPERTY_NAME}</div>
          <div class="property-stats">
            <div class="stat-item"><div class="stat-label">総反響数</div><div class="stat-value">${total}<small>件</small></div></div>
            <div class="stat-item"><div class="stat-label">総来場数</div><div class="stat-value">${visited}<small>件</small></div></div>
            <div class="stat-item"><div class="stat-label">成約数</div><div class="stat-value">${contracted}<small>件</small></div></div>
            <div class="stat-item"><div class="stat-label">申込数</div><div class="stat-value">${applied}<small>件</small></div></div>
            <div class="stat-item"><div class="stat-label">要望数</div><div class="stat-value">${requested}<small>件</small></div></div>
            <div class="stat-item"><div class="stat-label">来場率</div><div class="stat-value">${total>0?(visited/total*100).toFixed(1):0}<small>%</small></div></div>
            <div class="stat-item"><div class="stat-label">成約率</div><div class="stat-value">${visited>0?(contracted/visited*100).toFixed(1):0}<small>%</small></div></div>
          </div>
          <dl class="property-meta">
            <div><dt>HP公開日</dt><dd>2024年08月01日</dd></div>
            <div><dt>来場開始日</dt><dd>2024年10月26日</dd></div>
            <div><dt>販売開始日</dt><dd>2024年11月23日</dd></div>
            <div><dt>総戸数</dt><dd>36戸</dd></div>
            <div><dt>残戸数</dt><dd>27戸</dd></div>
            <div><dt>テーブル名</dt><dd>${CONFIG.TABLE_NAME}</dd></div>
          </dl>
        </div>
        <div class="property-actions">
          <a href="dashboard.html" class="btn">ダッシュボード</a>
          <a href="customer.html" class="btn">顧客一覧</a>
        </div>
      </div>

      <!-- ステータス別内訳 -->
      <section class="section" style="margin-top:24px">
        <div class="section-header"><h2 class="section-heading">ステータス別内訳</h2></div>
        <table class="list-table" style="max-width:600px">
          <thead><tr><th>ステータス</th><th style="text-align:right">件数</th><th style="text-align:right">構成比</th></tr></thead>
          <tbody>
          ${["資料請求・エントリー","来場予約","新規来場","再来場","再々来場1","要望","登録","申込","契約","引渡","検討中止"].map(s => {
            const cnt = all.filter(c=>c["c.status"]===s).length;
            if (!cnt) return "";
            return `<tr><td>${statusBadge(s)}</td><td style="text-align:right;font-weight:600">${cnt}</td><td style="text-align:right;color:rgb(120,130,140)">${(cnt/total*100).toFixed(1)}%</td></tr>`;
          }).join("")}
          </tbody>
        </table>
      </section>

      <!-- 媒体別内訳 -->
      <section class="section">
        <div class="section-header"><h2 class="section-heading">媒体別反響内訳</h2></div>
        <table class="list-table" style="max-width:500px">
          <thead><tr><th>媒体</th><th style="text-align:right">件数</th><th style="text-align:right">構成比</th></tr></thead>
          <tbody>
          ${["公式HP","SUUMO","Yahoo!不動産","HOMES","アットホーム","その他"].map(b => {
            const cnt = b==="その他" ? all.filter(c=>!["公式HP","SUUMO","Yahoo!不動産","HOMES","アットホーム"].includes(c["c.baitai"])&&c["c.baitai"]).length : all.filter(c=>c["c.baitai"]===b).length;
            if (!cnt) return "";
            return `<tr><td>${baitaiBadge(b)||b}</td><td style="text-align:right;font-weight:600">${cnt}</td><td style="text-align:right;color:rgb(120,130,140)">${(cnt/total*100).toFixed(1)}%</td></tr>`;
          }).join("")}
          </tbody>
        </table>
      </section>
    `;
  } catch(e) {
    document.getElementById("content").innerHTML = `<div class="error-box">⚠️ ${e.message}</div>`;
  }
}

(async () => {
  if (!await requireAuth()) return;
  document.getElementById("header").innerHTML = renderHeader("property.html");
  load();
})();
</script>
</body>
</html>
