<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1300">
<title>設定 | Real Estate Manager by DIGITALEYES</title>
<link rel="stylesheet" href="common.css">
<style>
.settings-section { max-width: 700px; margin-bottom: 40px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: rgb(70,83,98); margin-bottom: 6px; }
.form-group input { width: 100%; padding: 8px 10px; border: 1px solid #ced4da; font-size: 14px; font-family: inherit; color: rgb(70,83,98); }
.form-group input:focus { outline: none; border-color: rgb(53,124,176); }
.form-group .hint { font-size: 11px; color: rgb(150,160,170); margin-top: 4px; }
.success-msg { color: rgb(0,130,60); font-size: 13px; padding: 8px 12px; background: #f0fff4; border: 1px solid #b2dfdb; display: none; }
.active-prop-note { display:inline-flex; align-items:center; gap:8px; font-size:12px; color:rgb(70,83,98); background:rgb(245,250,255); border:1px solid rgb(208,224,240); padding:6px 10px; border-radius:4px; }
.color-grid { display:grid; grid-template-columns: repeat(2,minmax(220px,1fr)); gap:12px; max-width:700px; }
.color-item { border:1px solid rgb(224,224,224); padding:10px 12px; background:#fff; }
.color-row { display:flex; gap:10px; align-items:center; }
.color-dot { width:12px; height:12px; border-radius:50%; display:inline-block; border:1px solid rgba(0,0,0,.2); }
.pin-group-table-wrap { max-width: 720px; margin-top: 14px; border: 1px solid rgb(224,224,224); border-radius: 6px; max-height: 340px; overflow: auto; background: #fff; }
.pin-group-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.pin-group-table th, .pin-group-table td { border-bottom: 1px solid rgb(230,230,230); padding: 8px 10px; text-align: left; vertical-align: middle; }
.pin-group-table th { background: rgb(248,249,250); font-weight: 600; position: sticky; top: 0; z-index: 1; box-shadow: 0 1px 0 rgb(230,230,230); }
.pin-group-table tr:last-child td { border-bottom: none; }
.pin-group-table select { width: 100%; max-width: 300px; padding: 5px 8px; font-size: 13px; }
</style>
</head>
<body>
<div id="wrapper">
<div id="page-wrapper">
  <header class="header" id="header"></header>
  <main class="main">
    <div class="page-title-bar"><h1>設定</h1></div>

    <!-- 来場ステータス（アクティブ物件＝案件ごと） -->
    <div class="settings-section">
      <div class="section-header"><h2 class="section-heading">来場ステータス</h2></div>
      <div class="active-prop-note" style="margin-bottom:10px">
        <span>編集中の物件:</span>
        <strong id="visitStatusTargetProp">-</strong>
      </div>
      <p class="hint" style="margin-bottom:12px;line-height:1.55;max-width:700px">
        顧客一覧の「ステータス」候補とモーダルでの編集用です。<strong>ヘッダーの物件切替</strong>で対象物件を切り替えて編集します。設定は物件ごとにキャッシュDB（LibSQL）へ保存されます。
      </p>
      <div class="form-group">
        <label>ステータス名（1行に1つ・最大60件）</label>
        <textarea id="visitStatusesText" rows="14" style="width:100%;max-width:700px;font-family:inherit;font-size:13px;padding:8px;border:1px solid #ced4da"></textarea>
      </div>
      <div id="visitStatusMsg" class="error-box" style="display:none"></div>
      <button class="btn btn-primary-solid" onclick="saveVisitStatuses()">ステータス一覧を保存</button>
    </div>

    <!-- マッピング色設定 -->
    <div class="settings-section">
      <div class="section-header"><h2 class="section-heading">顧客マッピング ピン色設定</h2></div>
      <p class="hint" style="margin-bottom:12px">顧客マッピングの凡例色・ピン色を変更できます。下の表で<strong>来場ステータスごと</strong>にどの色グループへ割り当てるか指定します（物件ごとにブラウザに保存されます）。</p>
      <div class="color-grid">
        <div class="color-item">
          <label>物件地（黒ピン）</label>
          <div class="color-row">
            <span class="color-dot" id="previewColorProperty"></span>
            <input type="color" id="mapColorProperty" style="width:64px;padding:0;height:32px">
          </div>
        </div>
        <div class="color-item">
          <label>資料請求・エントリー系</label>
          <div class="color-row">
            <span class="color-dot" id="previewColorRequest"></span>
            <input type="color" id="mapColorRequest" style="width:64px;padding:0;height:32px">
          </div>
        </div>
        <div class="color-item">
          <label>来場系</label>
          <div class="color-row">
            <span class="color-dot" id="previewColorVisit"></span>
            <input type="color" id="mapColorVisit" style="width:64px;padding:0;height:32px">
          </div>
        </div>
        <div class="color-item">
          <label>その他ステータス</label>
          <div class="color-row">
            <span class="color-dot" id="previewColorOther"></span>
            <input type="color" id="mapColorOther" style="width:64px;padding:0;height:32px">
          </div>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn btn-primary-solid" onclick="saveMapPinColors()">色設定を保存</button>
        <button class="btn btn-sm" onclick="resetMapPinColors()">初期色に戻す</button>
      </div>
      <div class="form-group" style="margin-top:20px;max-width:720px">
        <label>ステータス別ピン分類（現在の物件）</label>
        <p class="hint" style="margin-bottom:8px">来場ステータス一覧と同期しています。一覧を変更したあと<strong>ステータス一覧を保存</strong>し、必要ならこの表を更新してください。</p>
        <div id="statusPinGroupTableWrap" class="pin-group-table-wrap"><p class="hint" style="padding:12px;margin:0">読み込み中…</p></div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <button type="button" class="btn btn-primary-solid btn-sm" onclick="saveStatusPinGroups()">ピン分類を保存</button>
          <button type="button" class="btn btn-sm" onclick="rebuildStatusPinGroupTable()">表を再読み込み</button>
        </div>
      </div>
    </div>

    <!-- パスワード変更 -->
    <div class="settings-section">
      <div class="section-header"><h2 class="section-heading">パスワード変更</h2></div>
      <div class="form-group">
        <label>現在のパスワード</label>
        <input type="password" id="currentPassword">
      </div>
      <div class="form-group">
        <label>新しいパスワード</label>
        <input type="password" id="newPassword">
      </div>
      <div class="form-group">
        <label>新しいパスワード（確認）</label>
        <input type="password" id="confirmPassword">
      </div>
      <div id="pwMsg" class="error-box" style="display:none"></div>
      <div id="pwSuccess" class="success-msg">パスワードを変更しました</div>
      <button class="btn btn-primary-solid" onclick="changePassword()">パスワードを変更</button>
    </div>

  </main>
</div>
</div>

<script src="common.js"></script>
<script>
const MAP_PIN_COLORS_KEY = "map_pin_colors_v1";
const MAP_STATUS_PIN_GROUP_KEY = "map_status_pin_group_v1";
const MAP_PIN_COLOR_DEFAULTS = {
  property: "#111111",
  request: "#2e7d32",
  visit: "#d84315",
  other: "#6a1b9a",
};

function defaultPinGroupForStatus(name) {
  const s = String(name || "").trim();
  if (s === "資料請求・エントリー") return "request";
  if (s === "新規来場") return "visit";
  return "other";
}
function loadAllStatusPinGroupMaps() {
  try {
    const raw = localStorage.getItem(MAP_STATUS_PIN_GROUP_KEY);
    const j = raw ? JSON.parse(raw) : {};
    return j && typeof j === "object" ? j : {};
  } catch (_) {
    return {};
  }
}
function escapeHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

(async () => {
  if (!await requireAuth()) return;
  document.getElementById("header").innerHTML = renderHeader("settings.html");
  await loadVisitStatusesEditor();
  loadMapPinColorsEditor();
  await rebuildStatusPinGroupTable();
})();

async function rebuildStatusPinGroupTable() {
  const wrap = document.getElementById("statusPinGroupTableWrap");
  if (!wrap) return;
  const ap = Auth.getActiveProperty();
  const pid = ap?.id;
  if (!pid) {
    wrap.innerHTML = "<p class=\"hint\" style=\"padding:12px;margin:0\">物件をヘッダーで選択してください。</p>";
    return;
  }
  let statuses = [];
  try {
    const res = await fetch(`${CONFIG.API_BASE}/local/visit-statuses`, {
      headers: { Authorization: `Bearer ${Auth.getToken()}` },
    });
    const d = await res.json();
    if (d.ok && Array.isArray(d.statuses)) statuses = d.statuses;
  } catch (_) {}
  if (!statuses.length) {
    wrap.innerHTML = "<p class=\"hint\" style=\"padding:12px;margin:0\">来場ステータスが取得できません。先に上記でステータスを保存してください。</p>";
    return;
  }
  const allMaps = loadAllStatusPinGroupMaps();
  const map = allMaps[pid] && typeof allMaps[pid] === "object" ? { ...allMaps[pid] } : {};
  const opts = [
    { v: "request", t: "資料請求・エントリー系" },
    { v: "visit", t: "来場系" },
    { v: "other", t: "その他" },
  ];
  let rows = "";
  for (const st of statuses) {
    const g = map[st] || defaultPinGroupForStatus(st);
    const sel = opts.map((o) => `<option value="${o.v}"${o.v === g ? " selected" : ""}>${escapeHtml(o.t)}</option>`).join("");
    rows += `<tr><td>${escapeHtml(st)}</td><td><select class="pin-group-sel" data-s="${encodeURIComponent(st)}">${sel}</select></td></tr>`;
  }
  wrap.innerHTML = `<table class="pin-group-table"><thead><tr><th style="width:42%">ステータス名</th><th>マップ上の色グループ</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function saveStatusPinGroups() {
  const ap = Auth.getActiveProperty();
  const pid = ap?.id;
  if (!pid) {
    alert("物件を選択してください");
    return;
  }
  const allMaps = loadAllStatusPinGroupMaps();
  const next = { ...(allMaps[pid] && typeof allMaps[pid] === "object" ? allMaps[pid] : {}) };
  document.querySelectorAll("#statusPinGroupTableWrap select.pin-group-sel").forEach((sel) => {
    const st = decodeURIComponent(sel.getAttribute("data-s") || "");
    if (!st) return;
    const v = sel.value;
    if (v === "request" || v === "visit" || v === "other") next[st] = v;
  });
  allMaps[pid] = next;
  localStorage.setItem(MAP_STATUS_PIN_GROUP_KEY, JSON.stringify(allMaps));
  alert("ピン分類を保存しました。顧客マッピング画面で反映されます。");
}

function normalizeColorHex(v, fallback) {
  const s = String(v || "").trim();
  if (/^#[0-9a-fA-F]{6}$/.test(s)) return s.toLowerCase();
  return fallback;
}
function loadMapPinColorsStored() {
  try {
    const raw = localStorage.getItem(MAP_PIN_COLORS_KEY);
    const obj = raw ? JSON.parse(raw) : {};
    return {
      property: normalizeColorHex(obj.property, MAP_PIN_COLOR_DEFAULTS.property),
      request: normalizeColorHex(obj.request, MAP_PIN_COLOR_DEFAULTS.request),
      visit: normalizeColorHex(obj.visit, MAP_PIN_COLOR_DEFAULTS.visit),
      other: normalizeColorHex(obj.other, MAP_PIN_COLOR_DEFAULTS.other),
    };
  } catch (_) {
    return { ...MAP_PIN_COLOR_DEFAULTS };
  }
}
function applyMapPinColorPreview() {
  const vals = {
    property: document.getElementById("mapColorProperty").value,
    request: document.getElementById("mapColorRequest").value,
    visit: document.getElementById("mapColorVisit").value,
    other: document.getElementById("mapColorOther").value,
  };
  document.getElementById("previewColorProperty").style.background = vals.property;
  document.getElementById("previewColorRequest").style.background = vals.request;
  document.getElementById("previewColorVisit").style.background = vals.visit;
  document.getElementById("previewColorOther").style.background = vals.other;
}
function loadMapPinColorsEditor() {
  const c = loadMapPinColorsStored();
  document.getElementById("mapColorProperty").value = c.property;
  document.getElementById("mapColorRequest").value = c.request;
  document.getElementById("mapColorVisit").value = c.visit;
  document.getElementById("mapColorOther").value = c.other;
  ["mapColorProperty","mapColorRequest","mapColorVisit","mapColorOther"].forEach((id) => {
    document.getElementById(id).addEventListener("input", applyMapPinColorPreview);
  });
  applyMapPinColorPreview();
}
function saveMapPinColors() {
  const colors = {
    property: normalizeColorHex(document.getElementById("mapColorProperty").value, MAP_PIN_COLOR_DEFAULTS.property),
    request: normalizeColorHex(document.getElementById("mapColorRequest").value, MAP_PIN_COLOR_DEFAULTS.request),
    visit: normalizeColorHex(document.getElementById("mapColorVisit").value, MAP_PIN_COLOR_DEFAULTS.visit),
    other: normalizeColorHex(document.getElementById("mapColorOther").value, MAP_PIN_COLOR_DEFAULTS.other),
  };
  localStorage.setItem(MAP_PIN_COLORS_KEY, JSON.stringify(colors));
  applyMapPinColorPreview();
  alert("マッピングのピン色を保存しました");
}
function resetMapPinColors() {
  localStorage.setItem(MAP_PIN_COLORS_KEY, JSON.stringify(MAP_PIN_COLOR_DEFAULTS));
  loadMapPinColorsEditor();
  alert("初期色に戻しました");
}

async function loadVisitStatusesEditor() {
  try {
    const ap = Auth.getActiveProperty();
    document.getElementById("visitStatusTargetProp").textContent = ap?.name || `物件(${ap?.id || "-"})`;
    const res = await fetch(`${CONFIG.API_BASE}/local/visit-statuses`, {
      headers: { Authorization: `Bearer ${Auth.getToken()}` },
    });
    const d = await res.json();
    if (d.ok && Array.isArray(d.statuses)) {
      document.getElementById("visitStatusesText").value = d.statuses.join("\n");
    }
  } catch (_) {}
}

async function saveVisitStatuses() {
  const ta = document.getElementById("visitStatusesText");
  const msg = document.getElementById("visitStatusMsg");
  msg.style.display = "none";
  const statuses = ta.value.split("\n").map((s) => s.trim()).filter(Boolean);
  const res = await fetch(`${CONFIG.API_BASE}/local/visit-statuses`, {
    method: "PUT",
    headers: {
      Authorization: `Bearer ${Auth.getToken()}`,
      "Content-Type": "application/json",
    },
    body: JSON.stringify({ statuses }),
  });
  const d = await res.json();
  if (!d.ok) {
    msg.textContent = d.message || "保存に失敗しました";
    msg.style.display = "block";
    return;
  }
  ta.value = d.statuses.join("\n");
  alert("保存しました");
  await rebuildStatusPinGroupTable();
}

async function changePassword() {
  const current = document.getElementById("currentPassword").value;
  const newPw = document.getElementById("newPassword").value;
  const confirm = document.getElementById("confirmPassword").value;
  const errEl = document.getElementById("pwMsg");
  errEl.style.display = "none";
  if (newPw !== confirm) { errEl.textContent = "新しいパスワードが一致しません"; errEl.style.display = "block"; return; }
  if (newPw.length < 4) { errEl.textContent = "パスワードは4文字以上にしてください"; errEl.style.display = "block"; return; }
  const res = await fetch(`${CONFIG.API_BASE}/user/change-password`, {
    method: "POST", headers: { "Authorization": `Bearer ${Auth.getToken()}`, "Content-Type": "application/json" },
    body: JSON.stringify({ currentPassword: current, newPassword: newPw })
  });
  const data = await res.json();
  if (!data.ok) { errEl.textContent = data.message; errEl.style.display = "block"; return; }
  document.getElementById("pwSuccess").style.display = "block";
  document.getElementById("currentPassword").value = "";
  document.getElementById("newPassword").value = "";
  document.getElementById("confirmPassword").value = "";
  setTimeout(() => document.getElementById("pwSuccess").style.display = "none", 3000);
}
</script>
</body>
</html>
