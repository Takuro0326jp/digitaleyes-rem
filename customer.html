<script>
const LIMIT = 20;
const PREFS = ["北海道","青森県","岩手県","宮城県","秋田県","山形県","福島県","茨城県","栃木県","群馬県","埼玉県","千葉県","東京都","神奈川県","新潟県","富山県","石川県","福井県","山梨県","長野県","岐阜県","静岡県","愛知県","三重県","滋賀県","京都府","大阪府","兵庫県","奈良県","和歌山県","鳥取県","島根県","岡山県","広島県","山口県","徳島県","香川県","愛媛県","高知県","福岡県","佐賀県","長崎県","熊本県","大分県","宮崎県","鹿児島県","沖縄県"];
const YOSAN = ["～3000万円","～3500万円","～4000万円","～4500万円","～5000万円","～5500万円","～6000万円","～6500万円","～7000万円","～7500万円","～8000万円"];
const JIKOSIKIN = ["〜100万円","〜200万円","〜300万円","〜400万円","〜500万円","〜600万円","〜700万円","〜800万円","〜900万円","〜1000万円","〜1200万円","〜1500万円","〜2000万円"];

let customers = [], totalCount = 0, currentPage = 1, selected = new Set(), showDetail = false;
let VISIT_STATUSES = [];
let modalCustomerIdx = null;
let modalCustomerDirty = false;
let activePropertyQrMeta = { visitSurveyUrl: "", newRegistrationUrl: "" };
let modalSurveyQrCollapsed = true;
let listNewRegQrCollapsed = true;
let editingSalesHistoryId = "";

/** 入力値を http(s) URL として解釈できる形にそろえる（スキーム省略時は https を付与） */
function normalizeHttpUrl(raw) {
  let t = String(raw || "").trim();
  if (!t) return "";
  if (/^\/\//.test(t)) return "https:" + t;
  if (!/^https?:\/\//i.test(t)) {
    if (/^mailto:/i.test(t) || /^tel:/i.test(t)) return "";
    if (/^[a-z0-9+.-]+\.[a-z]{2,}/i.test(t) || /^localhost(?::\d+)?(\/|$)/i.test(t)) return "https://" + t;
  }
  return t;
}

function parseHttpUrl(raw) {
  const t = normalizeHttpUrl(raw);
  if (!t) return null;
  try {
    const u = new URL(t);
    if (u.protocol !== "http:" && u.protocol !== "https:") return null;
    return u.href;
  } catch (_) {
    return null;
  }
}

function fillQrHost(hostId, rawUrl) {
  const wrap = document.getElementById(hostId);
  if (!wrap) return false;
  wrap.innerHTML = "";
  const href = parseHttpUrl(rawUrl);
  if (!href) return false;
  if (typeof QRCode === "undefined") return false;
  const L = QRCode.CorrectLevel || {};
  const level = L.H != null ? L.H : L.M != null ? L.M : 0;
  new QRCode(wrap, { text: href, width: 140, height: 140, correctLevel: level });
  return true;
}

function buildSurveyQrUrl(c) {
  const raw = String(activePropertyQrMeta.visitSurveyUrl || "").trim();
  const href = parseHttpUrl(raw);
  if (!href) return "";
  return href;
}

function openQrPreviewFromUrl(rawUrl) {
  const href = parseHttpUrl(rawUrl);
  if (!href) return;
  const host = document.getElementById("qrPreviewHost");
  if (host) {
    host.innerHTML = "";
    if (typeof QRCode !== "undefined") {
      const L = QRCode.CorrectLevel || {};
      const level = L.H != null ? L.H : L.M != null ? L.M : 0;
      new QRCode(host, { text: href, width: 220, height: 220, correctLevel: level });
    }
  }
  const a = document.getElementById("qrPreviewLink");
  if (a) {
    a.href = href;
    a.textContent = href.length > 60 ? href.slice(0, 60) + "…" : href;
  }
  document.getElementById("qrPreviewModal").style.display = "flex";
}

function closeQrPreview() {
  const modal = document.getElementById("qrPreviewModal");
  if (modal) modal.style.display = "none";
}

function renderMiniQrHtml(c) {
  const href = buildSurveyQrUrl(c);
  if (!href) return "—";
  return `<button type="button" class="btn btn-sm" style="padding:2px;border:1px solid #ced4da;background:#fff" data-qr-url="${esc(href)}" onclick="event.stopPropagation();openQrPreviewFromUrl(this.dataset.qrUrl)">
    <span class="mini-qr-host" data-qr-url="${esc(href)}" style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px"></span>
  </button>`;
}

function hydrateMiniQrs() {
  const hosts = document.querySelectorAll(".mini-qr-host[data-qr-url]");
  hosts.forEach((host) => {
    if (host.dataset.ready === "1") return;
    const href = parseHttpUrl(host.dataset.qrUrl || "");
    host.innerHTML = "";
    if (!href || typeof QRCode === "undefined") return;
    const L = QRCode.CorrectLevel || {};
    const level = L.H != null ? L.H : L.M != null ? L.M : 0;
    new QRCode(host, { text: href, width: 28, height: 28, correctLevel: level });
    host.dataset.ready = "1";
  });
}

function updateListPageNewRegQr() {
  const p = document.getElementById("qrNewRegistrationPanel");
  const body = document.getElementById("qrNewRegBody");
  const btn = document.getElementById("btnNewRegQrToggle");
  const raw = String(activePropertyQrMeta.newRegistrationUrl || "").trim();
  const href = parseHttpUrl(raw);
  if (!p) return;
  if (!href) {
    p.style.display = "none";
    if (body) body.style.display = "none";
    if (btn) btn.textContent = "開く";
    const h = document.getElementById("qrNewRegHost");

function mergeListColumnsIntoDetailFields(existingFields, columns) {
  const out = (existingFields || [])
    .map((x) => ({ ...x, key: String(x.key || "") }))
    .filter((x) => x.key);
  const seen = new Set(out.map((x) => x.key));
  for (const col of columns || []) {
    const k = String(col.key || "");
    if (!k || seen.has(k)) continue;
    out.push(defaultDetailRowFromListColumn(col));
    seen.add(k);
  }
  return out;
}

function renderEditFields(c) {
  const wrap = document.getElementById("modalEditForm");
  const fieldMap = new Map(CUSTOMER_FIELDS.map((f) => [f.key, f]));
  getAllCustomerFieldDefs([c]).forEach((f) => {
    if (!fieldMap.has(f.key)) fieldMap.set(f.key, { key: f.key, label: fieldLabelOf(f.key) });
  });
  const allFields = [...fieldMap.values()].filter((f) => String(f.key) !== "c.dm_ng");
  const cfgMap = new Map((detailFieldConfig || []).map((x) => [String(x.key), x]));
  const mergedCfg = allFields.map((f) => {
    const cfg = cfgMap.get(String(f.key));
    if (cfg) return { ...cfg, key: f.key, label: cfg.label || f.label || fieldLabelOf(f.key) };
    return { key: f.key, label: f.label || fieldLabelOf(f.key), display: 1, print: 1, oneLine: f.full ? 0 : 1 };
  });
  const visible = mergedCfg
    .filter((x)=>Number(x.display)!==0)
    .map((cfg)=>({ ...cfg, base: allFields.find((f)=>f.key===cfg.key) }))
    .filter((x)=>x.base);
  wrap.innerHTML = visible.map((it) => {
    const f = it.base;
    const id = fieldId(f.key);
    const label = it.label || f.label;
    const val = c[f.key] == null ? "" : String(c[f.key]);
    if (f.type === "status") {
      return `<div class="${Number(it.oneLine)===1 ? "" : "full"}"><label>${label}</label><select id="${id}" ${f.ro ? "disabled" : ""}></select></div>`;
    }
    const input = f.textarea
      ? `<textarea id="${id}" rows="2" ${f.ro ? "readonly" : ""}>${esc(val)}</textarea>`
      : `<input id="${id}" value="${esc(val)}" ${f.ro ? "readonly" : ""}>`;
    return `<div class="${Number(it.oneLine)===1 ? "" : "full"}"><label>${label}</label>${input}</div>`;
  }).join("");
  const sel = document.getElementById(fieldId("c.status"));
  if (sel) {
    sel.innerHTML = `<option value="">（未設定）</option>${VISIT_STATUSES.map((s) => `<option value="${esc(s)}">${esc(s)}</option>`).join("")}`;

async function syncDmNgToDigitalEyes(customerId, dmNgOn) {
  const cid = String(customerId || "").trim();
  if (!/^\d+$/.test(cid)) {
    throw new Error("DM禁止フラグの外部連携対象IDが数値ではありません（統合表示行の可能性があります）");
  }
  const vNum = dmNgOn ? 1 : 0;
  const vStr = dmNgOn ? "1" : "0";
  const expected = vStr;
  async function readBackDmFlag() {
    const body = new URLSearchParams();
    body.append("limit", "1");
    body.append("page", "1");
    body.append("conditions", JSON.stringify([{ "c.id": cid }]));
    const res = await fetch(`${CONFIG.API_BASE}/api/v1/database/acquisition.json`, {
      method: "POST",
      headers: {
        Authorization: `Bearer ${Auth.getToken()}`,
        "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8",
      },
      body: body.toString(),
    });
    const text = await res.text();
    let d = {};
    try { d = text ? JSON.parse(text) : {}; } catch (_) {}
    const row = d?.data?.result?.[0] || d?.result?.[0] || null;
    if (!row || typeof row !== "object") return "";
    const raw = row["c.client_mail_stop_flag"] ?? row["client_mail_stop_flag"] ?? row["c.dm_ng"] ?? "";
    return String(raw == null ? "" : raw).trim();
  }
  // 値型・edit_type差・項目名差異をフォールバック吸収しつつ反映確認まで行う
  const tryPayloads = [
    { editType: "1", conditions: [{ "c.client_mail_stop_flag": vNum }] },
    { editType: "1", conditions: [{ "c.client_mail_stop_flag": vStr }] },
    { editType: "2", conditions: [{ "c.client_mail_stop_flag": vNum }] },
    { editType: "2", conditions: [{ "c.client_mail_stop_flag": vStr }] },
    { editType: "1", conditions: [{ "client_mail_stop_flag": vNum }] },
    { editType: "1", conditions: [{ "client_mail_stop_flag": vStr }] },
  ];
  let lastErr = "";
  for (const p of tryPayloads) {
    // 外部APIが遅延することがあるため、同一payloadを指数バックオフで再試行
    for (let attempt = 1; attempt <= 5; attempt++) {
      const ctrl = new AbortController();
      const tm = setTimeout(() => ctrl.abort(), 30000);
      const body = new URLSearchParams();
      body.append("edit_type", p.editType);
      body.append("edit_id", cid);
      body.append("X_customer_id", cid);
      body.append("conditions", JSON.stringify(p.conditions));
      try {
        const res = await fetch(`${CONFIG.API_BASE}/api/v1/database/update_condition.json`, {
          method: "POST",
          headers: {
            Authorization: `Bearer ${Auth.getToken()}`,
            "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8",
          },
          body: body.toString(),
          signal: ctrl.signal,
        });
        const text = await res.text();
        let d = {};
        try { d = text ? JSON.parse(text) : {}; } catch (_) {}
        if (res.ok && d.status !== false) {
          let reflected = false;
          for (let k = 0; k < 3; k++) {
            await new Promise((r) => setTimeout(r, 350 + 200 * k));
            const now = await readBackDmFlag();
            if (now === expected) { reflected = true; break; }
          }
          if (reflected) {
            clearTimeout(tm);
            return;
          }
          lastErr = `更新応答は成功だが反映未確認 edit_id=${cid}, attempt=${attempt}, edit_type=${p.editType}, conditions=${JSON.stringify(p.conditions)}`;
          continue;
        }
        if (d && d.status === false && !String(d.message || "").trim()) {
          lastErr = `status:false（理由未返却） edit_id=${cid}, attempt=${attempt}, edit_type=${p.editType}, conditions=${JSON.stringify(p.conditions)}`;
        } else {
          lastErr = (d.message || text || `HTTP ${res.status}`) + ` (attempt=${attempt}, edit_type=${p.editType}, conditions=${JSON.stringify(p.conditions)})`;
        }
      } catch (e) {
        if (e && e.name === "AbortError") lastErr = `タイムアウト（30秒） edit_id=${cid}, attempt=${attempt}`;
        else lastErr = `${String(e && e.message ? e.message : e)} (attempt=${attempt})`;
      } finally {
        clearTimeout(tm);
      }
      const waitMs = Math.min(4000, 400 * Math.pow(2, attempt - 1));
      await new Promise((r) => setTimeout(r, waitMs));
    }
  }
  throw new Error(`DM禁止フラグの外部連携に失敗しました: ${lastErr}`);
}

function exportCustomerPdf() {
  if (modalCustomerIdx == null) return;
  const c = customers[modalCustomerIdx];
  const exportFields = allCustomerExportFields(c);
  const pad2 = (n) => String(n).padStart(2, "0");
  const now = new Date();
  const ts = `${now.getFullYear()}${pad2(now.getMonth() + 1)}${pad2(now.getDate())}${pad2(now.getHours())}${pad2(now.getMinutes())}${pad2(now.getSeconds())}`;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: "pt", format: "a4" });
  // jsPDF の標準フォントは日本語が文字化けするため、Canvasに描画した画像をPDFへ貼り付ける
  // （ブラウザ描画フォントを利用するので日本語が崩れない）
  const W = 1240; // 150dpi相当のA4横幅
  const H = 1754; // 150dpi相当のA4縦幅
  const M = 64;
  const TITLE_H = 92;
  const ROW_GAP = 10;
  const LABEL_FONT = "600 24px sans-serif";
  const VALUE_FONT = "20px sans-serif";
  const META_FONT = "18px sans-serif";
  const LABEL_W = 320;
  const VALUE_W = W - M * 2 - LABEL_W - 20;
  const LINE_H = 30;

  const pages = [];
  let canvas = document.createElement("canvas");
  canvas.width = W;
  canvas.height = H;
  let ctx = canvas.getContext("2d");
  function paintPageBase(pageNo) {
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = "#1f2d3d";
    ctx.font = "700 36px sans-serif";
    ctx.fillText("顧客カルテ", M, M + 36);
    ctx.fillStyle = "#607080";
    ctx.font = META_FONT;
    ctx.fillText(`出力日時: ${now.getFullYear()}/${pad2(now.getMonth() + 1)}/${pad2(now.getDate())} ${pad2(now.getHours())}:${pad2(now.getMinutes())}:${pad2(now.getSeconds())}`, M, M + 66);
    ctx.textAlign = "right";
    ctx.fillText(`Page ${pageNo}`, W - M, M + 66);
    ctx.textAlign = "left";
    ctx.strokeStyle = "#d9e1e8";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(M, M + TITLE_H);
    ctx.lineTo(W - M, M + TITLE_H);
    ctx.stroke();
  }
  function wrapText(text, maxWidth, font) {
    ctx.font = font;
    const raw = String(text || "");
    const out = [];
    raw.split(/\r?\n/).forEach((line) => {
      if (!line) {
        out.push("");
        return;
      }
      let curr = "";
      for (const ch of line) {
        const next = curr + ch;
        if (ctx.measureText(next).width > maxWidth && curr) {
          out.push(curr);
          curr = ch;
        } else {
          curr = next;
        }
      }
      out.push(curr);
    });
    return out.length ? out : [""];
  }
  let pageNo = 1;
  paintPageBase(pageNo);
  let y = M + TITLE_H + 26;
  exportFields.forEach(({ label, value }, idx) => {
    const labelText = String(label || "");
    const valueLines = wrapText(String(value || "—"), VALUE_W, VALUE_FONT);
    const rowH = Math.max(LINE_H, valueLines.length * LINE_H) + 16;
    if (y + rowH > H - M) {
      pages.push(canvas);
      canvas = document.createElement("canvas");
      canvas.width = W;
      canvas.height = H;
      ctx = canvas.getContext("2d");
      pageNo += 1;
      paintPageBase(pageNo);
      y = M + TITLE_H + 26;
    }
    // label
    ctx.fillStyle = "#334455";
    ctx.font = LABEL_FONT;
    ctx.fillText(labelText, M, y + 24);
    // value
    ctx.fillStyle = "#1f2d3d";
    ctx.font = VALUE_FONT;
    valueLines.forEach((ln, i) => {
      ctx.fillText(ln, M + LABEL_W + 20, y + 24 + i * LINE_H);
    });
    // separator
    ctx.strokeStyle = "#edf1f5";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(M, y + rowH);
    ctx.lineTo(W - M, y + rowH);
    ctx.stroke();
    y += rowH + ROW_GAP;
    if (idx === exportFields.length - 1) return;
  });
  pages.push(canvas);
  pages.forEach((pg, i) => {
    if (i > 0) doc.addPage();
    const img = pg.toDataURL("image/jpeg", 0.92);
    doc.addImage(img, "JPEG", 0, 0, 595.28, 841.89);
  });
  const id = c["c.id"] || "detail";
  doc.save(`customer_export_${id}_${ts}.pdf`);
}

async function saveModalCustomer() {
  if (modalCustomerIdx == null) return;
  const c = customers[modalCustomerIdx];

  const id = c["c.id"];
  const patch = {};
  const fieldMap = new Map(CUSTOMER_FIELDS.map((f) => [f.key, f]));

    const el = document.getElementById(fieldId(f.key));
    if (!el) return;
    const v = String(el.value || "").trim();
    patch[f.key] = v || null;

  const res = await fetch(`${CONFIG.API_BASE}/local/customers/${encodeURIComponent(id)}`, {
    method: "PATCH",
    headers: {
      Authorization: `Bearer ${Auth.getToken()}`,
      "Content-Type": "application/json",
    },
    body: JSON.stringify(patch),
  });
  const d = await res.json();
  if (!res.ok) {
    alert(d.message || "保存に失敗しました");
    return;
  }
  customers[modalCustomerIdx] = d.customer;
  const nextDmNg = dmNgChecked(d.customer);
  if (prevDmNg !== nextDmNg) {
    try {
      await syncDmNgToDigitalEyes(id, nextDmNg);
    } catch (e) {
      alert(`${e.message}\nローカル保存は完了しています。外部連携のみ失敗しました。`);
    }
  }
  applyDmNgVisualState(dmNgChecked(d.customer));
  renderTable();
  await loadModalHistory(id);
  document.querySelectorAll("#modalEditForm .dirty").forEach((el) => el.classList.remove("dirty"));
  setModalCustomerDirty(false);
}

async function fileToDataUrl(file) {

    r.onload = () => resolve(String(r.result || ""));
    r.onerror = () => reject(new Error("ファイル読み込みに失敗しました"));
    r.readAsDataURL(file);
  });
}

function getFilters() {
  return {
    keyword: document.getElementById("fKeyword").value,
    state: document.getElementById("fState").value,
    baitai: document.getElementById("fBaitai").value,
    status: document.getElementById("fStatus").value,
    ninzu: document.getElementById("fNinzu").value,
    yosan: document.getElementById("fYosan").value,
    jikosikin: document.getElementById("fJikosikin").value,
    madori: document.getElementById("fMadori").value,
    menseki: document.getElementById("fMenseki").value,
  };
}

function toTimeOrZero(v) {
  if (!v) return 0;
  const s = String(v).trim().replace(/\//g, "-");
  const t = new Date(s).getTime();
  return Number.isFinite(t) ? t : 0;
}

function buildCustomerQuery(page, limit) {
  const f = getFilters();
  const qs = new URLSearchParams({ page: String(page), limit: String(limit) });
  if (f.keyword) qs.set("keyword", f.keyword);
  if (f.state) qs.set("state", f.state);
  if (f.baitai) qs.set("baitai", f.baitai);
  if (f.status) qs.set("status", f.status);
  if (f.ninzu) qs.set("ninzu", f.ninzu);
  if (f.yosan) qs.set("yosan", f.yosan);
  if (f.jikosikin) qs.set("jikosikin", f.jikosikin);
  if (f.madori) qs.set("madori", f.madori);
  if (f.menseki) qs.set("menseki", f.menseki);
  return qs;
}

async function fetchCustomerPage(page, limit) {
  const qs = buildCustomerQuery(page, limit);
  const res = await fetch(`${CONFIG.API_BASE}/local/customers?${qs}`, {
    headers: { Authorization: `Bearer ${Auth.getToken()}` },
  });
  const pack = await res.json();
  if (!res.ok || !pack.ok) throw new Error(pack.message || "顧客取得に失敗しました");
  return pack.data || {};
}

async function fetchAllFilteredCustomers() {
  const chunk = 200;
  let page = 1;
  let rows = [];
  let total = 0;
  while (true) {
    const data = await fetchCustomerPage(page, chunk);
    const part = data.result || [];
    total = parseTotalCount(data);
    rows = rows.concat(part);
    if (!part.length || rows.length >= total) break;
    page += 1;
    if (page > 500) break;
  }
  return rows;
}

function search() { currentPage = 1; load(); }
function clearFilters() {
  ["fKeyword"].forEach(id => document.getElementById(id).value = "");
  ["fState","fBaitai","fStatus","fNinzu","fYosan","fJikosikin","fMadori","fMenseki"].forEach(id => document.getElementById(id).value = "");
  search();
}
function toggleDetail() {

  document.getElementById("detailFilters").style.display = showDetail ? "block" : "none";
  document.getElementById("btnDetail").textContent = (showDetail ? "▲" : "▼") + " 詳しい検索条件を設定する";
}

async function load() {
  document.getElementById("tableArea").innerHTML = '<div class="loading-spinner"></div>';
  document.getElementById("pagination").innerHTML = "";
  updateSelBtn();

  try {
    const data = await fetchCustomerPage(currentPage, LIMIT);
    customers = (data.result || []).slice().sort((a, b) => {
      const ta = toTimeOrZero(a["c.upd_date"]) || toTimeOrZero(a["c.ins_date"]);
      const tb = toTimeOrZero(b["c.upd_date"]) || toTimeOrZero(b["c.ins_date"]);
      if (tb !== ta) return tb - ta;
      const ida = String(a["c.id"] || "");
      const idb = String(b["c.id"] || "");
      return idb.localeCompare(ida, "ja");
    });
    totalCount = parseTotalCount(data);
    document.getElementById("totalLabel").textContent = `総件数: ${totalCount.toLocaleString()}件（ローカルDB・同一メールは1件に統合・デジタライズへの通信なし）`;
    renderTable(); renderPagination();
    if (initialCid) {
      const idx = customers.findIndex((c) => String(c["c.id"] || "") === String(initialCid));
      if (idx >= 0) {
        await openModal(idx);
        initialCid = "";
      } else if (currentPage * LIMIT < totalCount) {
        currentPage += 1;
        await load();
        return;
      } else {
        initialCid = "";
      }
    }
    refreshCacheStatus();
  } catch(e) {
    document.getElementById("tableArea").innerHTML = `<div class="error-box">⚠️ ${e.message}<br><small>初回は「全件同期」でデータを取り込んでください。</small></div>`;
  }
}

async function refreshCacheStatus() {
  const el = document.getElementById("cacheStatus");
  if (!el) return;
  try {
    const res = await fetch(`${CONFIG.API_BASE}/local/sync-status`, {
      headers: { Authorization: `Bearer ${Auth.getToken()}` },
    });
    const s = await res.json();
    if (!s.ok) {
      el.textContent = s.message ? `⚠ ${s.message}` : "キャッシュ状態を取得できませんでした";
      el.style.color = "rgb(180,70,50)";
      el.title = s.message || "";
      return;
    }
    if (s.dbQueryError) {
      el.textContent = `⚠ DB接続エラー: ${String(s.dbQueryError).slice(0, 120)}${String(s.dbQueryError).length > 120 ? "…" : ""}`;
      el.style.color = "rgb(180,70,50)";
      el.title = String(s.dbQueryError);
      return;
    }
    if (s.dbEphemeral) {
      el.textContent = "⚠ 永続DB未接続（Vercel の DATABASE_URL / TURSO_AUTH_TOKEN を確認）";
      el.style.color = "rgb(180,70,50)";
      el.title = s.dbPersistenceWarning || el.textContent;
      return;
    }
    el.style.color = "";
    el.title = "";
    if (!s.hasData && !s.rows_total) {
      el.textContent = "キャッシュ未構築 → 同期が必要です";
      return;
    }
    const t = (s.last_incremental_at || s.last_full_at || "").replace("T", " ").slice(0, 16);
    el.textContent = `キャッシュ ${(s.rows_total ?? 0).toLocaleString()}件${t ? " · 最終同期 " + t : ""}`;
  } catch (_) {
    el.textContent = "";
  }
}

async function runSync(mode) {
  const b1 = document.getElementById("btnSyncInc");
  const b2 = document.getElementById("btnSyncFull");
  if (b1) b1.disabled = true;
  if (b2) b2.disabled = true;
  try {
    const res = await fetch(`${CONFIG.API_BASE}/sync/customers`, {
      method: "POST",
      headers: {
        Authorization: `Bearer ${Auth.getToken()}`,
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ mode }),
    });
    const d = await res.json();
    if (!res.ok) throw new Error(d.message || "同期に失敗しました");
    if (d.ok === false) throw new Error(d.message || "同期に失敗しました");
    alert(d.message || `${mode === "full" ? "全件" : "差分"}同期: ${d.fetched ?? 0}件取得`);
    await load();
  } catch (e) {
    alert(e.message);
  } finally {
    if (b1) b1.disabled = false;
    if (b2) b2.disabled = false;
  }
}

function renderPagination() {
  const total = Math.ceil(totalCount / LIMIT);
  if (total <= 1) return;
  const start = Math.max(1, currentPage-4), end = Math.min(total, start+8);
  let html = `<button onclick="goPage(${currentPage-1})" ${currentPage===1?"disabled":""}>＜</button>`;
  for (let i = start; i <= end; i++) html += `<button class="${i===currentPage?"active":""}" onclick="goPage(${i})">${i}</button>`;
  html += `<button onclick="goPage(${currentPage+1})" ${currentPage===total?"disabled":""}>＞</button>`;
  document.getElementById("pagination").innerHTML = html;
}

function goPage(p) {
  const t = Math.ceil(totalCount/LIMIT);
  if (p<1||p>t) return;
  currentPage = p; load(); window.scrollTo(0,0);
}

function toggleSel(id) {
  if (selected.has(id)) selected.delete(id); else selected.add(id);
  updateSelBtn(); renderTable();
}
async function toggleAllByScope() {
  const scope = document.getElementById("selScope")?.value || "page";
  if (scope === "all") {
    if (selected.size >= totalCount && totalCount > 0) {
      selected = new Set();
      updateSelBtn();
      renderTable();
      return;
    }
    try {
      const allRows = await fetchAllFilteredCustomers();
      selected = new Set(allRows.map((c) => c["c.id"]).filter(Boolean));
      updateSelBtn();
      renderTable();
    } catch (e) {
      alert(e.message || "全顧客の選択に失敗しました");
    }
    return;
  }
  const pageIds = customers.map((c) => c["c.id"]).filter(Boolean);
  const allSelectedOnPage = pageIds.length > 0 && pageIds.every((id) => selected.has(id));
  if (allSelectedOnPage) pageIds.forEach((id) => selected.delete(id));
  else pageIds.forEach((id) => selected.add(id));
  updateSelBtn();
  renderTable();
}
function updateSelBtn() {
  const scope = document.getElementById("selScope")?.value || "page";
  if (scope === "all") {
    document.getElementById("btnSelAll").textContent = selected.size >= totalCount && totalCount > 0 ? "選択解除" : "全て選択";
  } else {
    const pageIds = customers.map((c) => c["c.id"]).filter(Boolean);
    const allSelectedOnPage = pageIds.length > 0 && pageIds.every((id) => selected.has(id));
    document.getElementById("btnSelAll").textContent = allSelectedOnPage ? "選択解除" : "全て選択";
  }
  document.getElementById("btnCsvSel").disabled = selected.size===0;
}

async function printLabelsFromTemplate() {
  if (!selected.size) { alert("先に顧客を選択してください"); return; }
  try {
    const allRows = await fetchAllFilteredCustomers();
    const targets = allRows.filter((c) => selected.has(c["c.id"]));
    if (!targets.length) { alert("選択対象が見つかりませんでした"); return; }
    const res = await fetch(`${CONFIG.API_BASE}/${LABEL_TEMPLATE_URL}`);
    if (!res.ok) throw new Error("テンプレート読込に失敗しました");
    const buf = await res.arrayBuffer();
    const wb = XLSX.read(buf, { type: "array" });
    const templateSheetName = wb.SheetNames[0];
    const templateSheet = wb.Sheets[templateSheetName];
    const out = XLSX.utils.book_new();
    const printFields = (detailFieldConfig.length ? detailFieldConfig : CUSTOMER_FIELDS.map((f) => ({
      key: f.key, label: f.label, print: 1,
    }))).filter((f) => Number(f.print) !== 0 && f.key !== "c.id");
    const labelsByKey = Object.fromEntries(printFields.map((f) => [String(f.key || ""), String(f.label || f.key || "")]));

    const printAreaBySheet = [];
    targets.forEach((customer, idx) => {
      const ws = (typeof structuredClone === "function")
        ? structuredClone(templateSheet)
        : JSON.parse(JSON.stringify(templateSheet));
      fillLabelTemplateSheet(ws, customer, labelsByKey);
      const nameRaw = targets.length === 1 ? templateSheetName : `${templateSheetName}_${idx + 1}`;
      const name = String(nameRaw).slice(0, 31);
      XLSX.utils.book_append_sheet(out, ws, name || `Label_${idx + 1}`);
      // 非印刷領域をグレー表示させるため、印刷範囲を明示（G列開始）
      printAreaBySheet.push({
        name: name || `Label_${idx + 1}`,
        ref: `$G$1:$K$43`,
      });
    });
    if (!out.Workbook) out.Workbook = { Names: [] };
    if (!Array.isArray(out.Workbook.Names)) out.Workbook.Names = [];
    printAreaBySheet.forEach((it) => {
      out.Workbook.Names.push({
        Name: "_xlnm.Print_Area",
        Ref: `'${String(it.name).replace(/'/g, "''")}'!${it.ref}`,
      });
    });

    XLSX.writeFile(out, `label_print_${new Date().toISOString().slice(0,10)}.xlsx`);
  } catch (e) {
    alert(e.message || "ラベル印刷の出力に失敗しました");
  }
}

function fillLabelTemplateSheet(ws, customer, labelsByKey) {
  // テンプレート準拠: 1行目の高さを 60 に固定
  if (!Array.isArray(ws["!rows"])) ws["!rows"] = [];
  ws["!rows"][0] = { ...(ws["!rows"][0] || {}), hpx: 60, hpt: 45 };
  // テンプレート準拠: 左側ブロックの開始列を G に合わせる
  const G_COL_OFFSET = 6;

  const printVals = {};
  Object.keys(labelsByKey).forEach((k) => {
    const label = labelsByKey[k];
    const v = customer[k] == null ? "" : String(customer[k]);
    printVals[k] = v;
    printVals[label] = v;
  });
  printVals["顧客ID"] = customer["c.id"] == null ? "" : String(customer["c.id"]);

  const keys = Object.keys(ws || {}).filter((a) => !a.startsWith("!"));
  keys.forEach((addr) => {
    const cell = ws[addr];
    if (!cell || cell.t !== "s" || typeof cell.v !== "string") return;
    const src = cell.v;
    let replaced = src.replace(/\{\{\s*([^}]+?)\s*\}\}/g, (_, token) => {
      const key = String(token || "").trim();
      return Object.prototype.hasOwnProperty.call(printVals, key) ? (printVals[key] || "") : "";
    });
    if (replaced !== src) cell.v = replaced;

    const asLabel = src.trim();
    if (!Object.prototype.hasOwnProperty.call(printVals, asLabel)) return;
    const p = XLSX.utils.decode_cell(addr);
    const rightAddr = XLSX.utils.encode_cell({ r: p.r, c: p.c + 1 + G_COL_OFFSET });
    const curr = ws[rightAddr] || { t: "s", v: "" };
    curr.t = "s";
    curr.v = printVals[asLabel] || "";
    ws[rightAddr] = curr;
  });
}

function closeModal() {
  if (modalCustomerDirty) {
    if (!confirm("未保存の変更があります。保存せずに閉じますか？")) return;
  }
  const modal = document.getElementById("modal");
  modal.classList.remove("open");
  modal.classList.remove("dm-ng");
  setTimeout(() => {
    if (!modal.classList.contains("open")) modal.style.display = "none";
  }, 220);
  modalCustomerIdx = null;
  editingSalesHistoryId = "";
  setModalCustomerDirty(false);
}
