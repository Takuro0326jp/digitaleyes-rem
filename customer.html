const LIST_COLS = [
  { key: "c.id", label: "顧客ID" },

  { key: "c.kana", label: "フリガナ" },

];
const LIST_COL_MAP = Object.fromEntries(LIST_COLS.map((x) => [x.key, x]));
const BASE_FIELD_DEFS = LIST_COLS.map((x) => ({ key: x.key, defaultLabel: x.label }));

function isAdminRole() { return Number(Auth.getUser()?.role || 0) === 2; }
let availableFieldDefs = [...BASE_FIELD_DEFS];
function fieldDefByKey(key) {
  return availableFieldDefs.find((x) => x.key === key) || LIST_COL_MAP[key] || { key, defaultLabel: key };
}
function fieldLabelOf(col) {
  if (col && typeof col === "object") {
    return String(col.label || fieldDefByKey(col.key).defaultLabel || col.key);
  }
  return String(fieldDefByKey(col).defaultLabel || col || "");
}
function getAllCustomerFieldDefs(rows = []) {
  const map = new Map();
  availableFieldDefs.forEach((f) => map.set(String(f.key), { key: String(f.key), defaultLabel: String(f.defaultLabel || f.key) }));
  rows.forEach((r) => {
    Object.keys(r || {}).forEach((k) => {
      if (!String(k).startsWith("c.")) return;
      if (!map.has(k)) map.set(k, { key: k, defaultLabel: k.replace(/^c\./, "") });
    });
  });
  return [...map.values()].sort((a, b) => a.key.localeCompare(b.key, "ja"));
}
function listCellHtml(c, key) {
  if (key === "c.status") return statusBadge(c[key]);
  if (key === "c.baitai") return baitaiBadge(c[key]);
  if (key === "c.name") return `${esc(c["c.name"] || "")}<br><span style="font-size:11px;color:rgb(150,160,170)">${esc(c["c.kana"] || "")}</span>`;
  if (key === "c.upd_date") return esc((c[key] || "").slice(0, 10));
  return esc(c[key] || "");
}

async function loadColumnsConfig(targetUserId = "") {
  const uid = targetUserId || Auth.getUser()?.id || "";
  const qs = new URLSearchParams({ userId: uid });
  const res = await fetch(`${CONFIG.API_BASE}/local/customers/columns?${qs.toString()}`, {
    headers: { Authorization: `Bearer ${Auth.getToken()}` },
  });
  const d = await res.json();
  if (!res.ok || !d.ok) throw new Error(d.message || "列設定取得に失敗しました");
  availableFieldDefs = Array.isArray(d.availableFields) && d.availableFields.length
    ? d.availableFields.map((x) => ({ key: String(x.key || ""), defaultLabel: String(x.defaultLabel || x.key || "") })).filter((x) => x.key)
    : [...BASE_FIELD_DEFS];
  const normalizeCol = (x) => ({
    key: String(x.key || ""),
    width: Number(x.width || 120),
    label: String(x.label || fieldDefByKey(x.key).defaultLabel || x.key),
  });
  activeColumns = (d.columns || []).map(normalizeCol).filter((x) => x.key);
  if (!activeColumns.length) activeColumns = (d.defaults || []).map(normalizeCol).filter((x) => x.key);
  colTargetUserId = uid;
}

async function openColConfig() {
  if (!isAdminRole()) return;
  configMode = "list";
  document.querySelector("#colConfigModal .modal-header h3").textContent = "顧客一覧の表示項目設定";
  colDraft = activeColumns.map((x) => ({ ...x }));
  document.getElementById("colConfigAdminRow").style.display = "block";
  document.getElementById("colConfigUser").innerHTML = accountMaster.map((a) => `<option value="${a.id}" ${String(a.id)===String(colTargetUserId)?"selected":""}>${esc(a.name || a.email || a.id)}</option>`).join("");
  renderColConfigUi();
  document.getElementById("colConfigModal").style.display = "flex";
}
function closeColConfig() { document.getElementById("colConfigModal").style.display = "none"; }
async function changeColConfigUser(uid) {
  await loadColumnsConfig(uid);
  colDraft = activeColumns.map((x) => ({ ...x }));
  renderColConfigUi();
}
function renderColConfigUi() {
  const cand = document.getElementById("colCandidateList");
  cand.innerHTML = availableFieldDefs.map((c) => {
    const checked = colDraft.some((x) => x.key === c.key);
    return `<label style="display:flex;gap:8px;align-items:center;justify-content:space-between;margin-bottom:6px;border-bottom:1px solid #f0f0f0;padding-bottom:6px">
      <span>
        <span style="display:block;font-weight:600">${esc(c.defaultLabel || c.key)}</span>
        <span style="display:block;font-size:11px;color:#678">${esc(c.key)}</span>
      </span>
      <input type="checkbox" ${checked?"checked":""} onchange="toggleColDraft('${c.key}', this.checked)">
    </label>`;
  }).join("");
  const ul = document.getElementById("colSelectedList");
  ul.innerHTML = colDraft.map((c, idx) => `<li draggable="true" ondragstart="dragColStart(${idx})" ondragover="event.preventDefault()" ondrop="dropCol(${idx})" style="display:flex;align-items:center;gap:8px;padding:6px;border:1px solid #eee;margin-bottom:6px;background:#fafafa;cursor:move">
    <span style="font-weight:700">☰</span>
    <div style="flex:1;min-width:0">
      <div style="font-size:11px;color:#678">${esc(c.key)}</div>
      <input value="${esc(c.label || fieldLabelOf(c.key))}" onchange="setColLabel('${c.key}', this.value)" style="width:100%;padding:4px 6px;border:1px solid #ced4da" placeholder="論理名">
    </div>
    <input type="number" min="80" max="600" value="${Number(c.width||120)}" onchange="setColWidth('${c.key}', this.value)" style="width:88px;padding:4px 6px;border:1px solid #ced4da">
  </li>`).join("");
}
function toggleColDraft(key, checked) {
  const i = colDraft.findIndex((x) => x.key === key);
  if (checked && i < 0) colDraft.push({ key, width: 120, label: fieldLabelOf(key) });
  if (!checked && i >= 0) colDraft.splice(i, 1);
  renderColConfigUi();

function labelForCustomerExportKey(key) {
  const k = String(key || "");
  const cfg = detailFieldConfig.find((x) => String(x.key) === k);
  if (cfg && String(cfg.label || "").trim()) return String(cfg.label).trim();
  const def = CUSTOMER_FIELDS.find((f) => f.key === k);
  if (def && String(def.label || "").trim()) return String(def.label).trim();
  return String(fieldDefByKey(k).defaultLabel || k.replace(/^c\./, ""));
}
function formatCustomerExportValue(v) {
  if (v == null || v === "") return "";
  if (typeof v === "object") {
    try { return JSON.stringify(v); } catch (_) { return String(v); }
  }
  return String(v);
}
function allCustomerExportFields(c) {
  const row = c || {};
  const keys = Object.keys(row).filter((k) => String(k).startsWith("c."));
  const fieldOrder = new Map(CUSTOMER_FIELDS.map((f, i) => [f.key, i]));
  keys.sort((a, b) => {
    const ia = fieldOrder.has(a) ? fieldOrder.get(a) : 1e9;
    const ib = fieldOrder.has(b) ? fieldOrder.get(b) : 1e9;
    if (ia !== ib) return ia - ib;
    return a.localeCompare(b, "ja");
  });
  return keys.map((key) => ({
    key,
    label: labelForCustomerExportKey(key),
    value: formatCustomerExportValue(row[key]),
  }));
}

function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function renderEditFields(c) {
  const wrap = document.getElementById("modalEditForm");
  const fieldMap = new Map(CUSTOMER_FIELDS.map((f) => [f.key, f]));
  getAllCustomerFieldDefs([c]).forEach((f) => {
    if (!fieldMap.has(f.key)) fieldMap.set(f.key, { key: f.key, label: fieldLabelOf(f.key) });
  });
  const allFields = [...fieldMap.values()];
  const cfgMap = new Map((detailFieldConfig || []).map((x) => [String(x.key), x]));
  const mergedCfg = allFields.map((f) => {
    const cfg = cfgMap.get(String(f.key));
    if (cfg) return { ...cfg, key: f.key, label: cfg.label || f.label || fieldLabelOf(f.key) };
    return { key: f.key, label: f.label || fieldLabelOf(f.key), display: 1, print: 1, oneLine: f.full ? 0 : 1 };
  });
  const visible = mergedCfg
    .filter((x)=>Number(x.display)!==0)
    .map((cfg)=>({ ...cfg, base: allFields.find((f)=>f.key===cfg.key) }))
    .filter((x)=>x.base);
  wrap.innerHTML = visible.map((it) => {
    const f = it.base;
    const id = fieldId(f.key);
    const label = it.label || f.label;
    const val = c[f.key] == null ? "" : String(c[f.key]);
    if (f.type === "status") {
      return `<div class="${Number(it.oneLine)===1 ? "" : "full"}"><label>${label}</label><select id="${id}" ${f.ro ? "disabled" : ""}></select></div>`;
    }
    const input = f.textarea
      ? `<textarea id="${id}" rows="2" ${f.ro ? "readonly" : ""}>${esc(val)}</textarea>`
      : `<input id="${id}" value="${esc(val)}" ${f.ro ? "readonly" : ""}>`;
    return `<div class="${Number(it.oneLine)===1 ? "" : "full"}"><label>${label}</label>${input}</div>`;
  }).join("");
  const sel = document.getElementById(fieldId("c.status"));
  if (sel) {
    sel.innerHTML = `<option value="">（未設定）</option>${VISIT_STATUSES.map((s) => `<option value="${esc(s)}">${esc(s)}</option>`).join("")}`;
    sel.value = c["c.status"] || "";
  }
}

async function exportCustomerExcel() {
  if (modalCustomerIdx == null) return;
  const c = customers[modalCustomerIdx];
  const exportFields = allCustomerExportFields(c);
  const pad2 = (n) => String(n).padStart(2, "0");
  const now = new Date();
  const jaDate = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日`;
  const ts = `${now.getFullYear()}${pad2(now.getMonth() + 1)}${pad2(now.getDate())}${pad2(now.getHours())}${pad2(now.getMinutes())}${pad2(now.getSeconds())}`;
  const id = c["c.id"] || "detail";
  const fileName = `customer_export_${id}_${ts}.xlsx`;
  try {
    const res = await fetch(`${CONFIG.API_BASE}/local/customers/export-karte-excel`, {
      method: "POST",
      headers: { Authorization: `Bearer ${Auth.getToken()}`, "Content-Type": "application/json" },
      body: JSON.stringify({
        title: "顧客カルテ",
        jaDate,
        ts,
        customerId: id,
        rows: exportFields.map(({ label, value }) => ({ label, value })),
      }),
    });
    if (!res.ok) {
      let msg = "Excel出力に失敗しました";
      try {
        const j = await res.json();
        if (j.message) msg = j.message;
      } catch (_) {}
      throw new Error(msg);
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = fileName;
    a.click();
    URL.revokeObjectURL(url);
  } catch (e) {
    alert(e.message || "Excel出力に失敗しました");
  }
}

  const items = d.items || [];
  if (!items.length) { box.innerHTML = '<div style="color:rgb(150,160,170)">営業履歴はまだありません</div>'; return; }
  box.innerHTML = `<div class="table-scroll"><table class="list-table">
    <thead><tr><th>対応日時</th><th>担当者</th><th>対応方法</th><th>対応内容</th></tr></thead>
    <tbody>
      ${items.map((x)=>`<tr><td>${esc(x.actionDate || x.createdAt || "")}</td><td>${esc(x.staffName || "")}</td><td>${esc(x.actionType || "")}</td><td>${esc(x.actionDetail || x.memo || "")}</td></tr>`).join("")}
    </tbody></table></div>`;
}

async function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(String(r.result || ""));
    r.onerror = () => reject(new Error("ファイル読み込みに失敗しました"));
    r.readAsDataURL(file);
  });
}

async function uploadCustomerFile() {
  if (modalCustomerIdx == null) return;
  const c = customers[modalCustomerIdx];
  const id = c["c.id"];
  const input = document.getElementById("cfFile");
  const file = input?.files?.[0];
  if (!file) return;
  const allow = ["application/pdf", "image/jpeg", "image/png"];
  if (!allow.includes(file.type)) { alert("pdf / jpg / png のみ対応です"); return; }
  const fileData = await fileToDataUrl(file);
  const res = await fetch(`${CONFIG.API_BASE}/local/customers/${encodeURIComponent(id)}/files`, {
    method: "POST",
    headers: { Authorization: `Bearer ${Auth.getToken()}`, "Content-Type": "application/json" },
    body: JSON.stringify({ filename: file.name, mimeType: file.type, fileData }),
  });
  const d = await res.json();
  if (!res.ok || !d.ok) { alert(d.message || "アップロードに失敗しました"); return; }
  input.value = "";
  await loadCustomerFiles(id);
}

async function loadCustomerFiles(customerId) {
  const box = document.getElementById("customerFilesList");
  box.innerHTML = '<div class="loading-spinner" style="margin:10px auto"></div>';
  const res = await fetch(`${CONFIG.API_BASE}/local/customers/${encodeURIComponent(customerId)}/files?limit=100`, {
    headers: { Authorization: `Bearer ${Auth.getToken()}` },
  });
  const d = await res.json();
  if (!res.ok || !d.ok) { box.innerHTML = `<div class="error-box">⚠️ ${esc(d.message || "取得失敗")}</div>`; return; }
  const files = d.files || [];
  if (!files.length) { box.innerHTML = '<div style="color:rgb(150,160,170)">ファイルはまだありません</div>'; return; }
  box.innerHTML = `<div class="table-scroll"><table class="list-table">
    <thead><tr><th>ファイル名</th><th>追加日</th><th style="width:160px">操作</th></tr></thead>
    <tbody>
      ${files.map((f)=>`<tr>
        <td>${esc(f.filename)}</td>
        <td>${esc((f.createdAt||"").replace("T"," ").slice(0,16))}</td>
        <td>
          <a class="btn btn-sm" href="${f.fileData}" download="${esc(f.filename)}" style="text-decoration:none">ダウンロード</a>
          <button class="btn btn-sm" style="color:#cc0000;border-color:#cc0000" onclick="deleteCustomerFile('${esc(f.id)}')">削除</button>
        </td>
      </tr>`).join("")}
    </tbody></table></div>`;
}

async function deleteCustomerFile(fileId) {
  if (modalCustomerIdx == null) return;
  if (!confirm("このファイルを削除しますか？")) return;
  const c = customers[modalCustomerIdx];
  const id = c["c.id"];
  const res = await fetch(`${CONFIG.API_BASE}/local/customers/${encodeURIComponent(id)}/files/${encodeURIComponent(fileId)}`, {
    method: "DELETE",
    headers: { Authorization: `Bearer ${Auth.getToken()}` },
  });
  const d = await res.json();
  if (!res.ok || !d.ok) { alert(d.message || "削除に失敗しました"); return; }
  await loadCustomerFiles(id);
}

function getFilters() {
  return {
    keyword: document.getElementById("fKeyword").value,
    state: document.getElementById("fState").value,
    baitai: document.getElementById("fBaitai").value,
    status: document.getElementById("fStatus").value,
    ninzu: document.getElementById("fNinzu").value,
    yosan: document.getElementById("fYosan").value,
    jikosikin: document.getElementById("fJikosikin").value,
    madori: document.getElementById("fMadori").value,
    menseki: document.getElementById("fMenseki").value,
  };
}

function toTimeOrZero(v) {
  if (!v) return 0;
  const s = String(v).trim().replace(/\//g, "-");
  const t = new Date(s).getTime();
  return Number.isFinite(t) ? t : 0;
}

function buildCustomerQuery(page, limit) {
  const f = getFilters();
  const qs = new URLSearchParams({ page: String(page), limit: String(limit) });
  if (f.keyword) qs.set("keyword", f.keyword);
  if (f.state) qs.set("state", f.state);
  if (f.baitai) qs.set("baitai", f.baitai);
  if (f.status) qs.set("status", f.status);
  if (f.ninzu) qs.set("ninzu", f.ninzu);
  if (f.yosan) qs.set("yosan", f.yosan);
  if (f.jikosikin) qs.set("jikosikin", f.jikosikin);
  if (f.madori) qs.set("madori", f.madori);
  if (f.menseki) qs.set("menseki", f.menseki);
  return qs;
}

async function fetchCustomerPage(page, limit) {
  const qs = buildCustomerQuery(page, limit);
  const res = await fetch(`${CONFIG.API_BASE}/local/customers?${qs}`, {
    headers: { Authorization: `Bearer ${Auth.getToken()}` },
  });
  const pack = await res.json();
  if (!res.ok || !pack.ok) throw new Error(pack.message || "顧客取得に失敗しました");
  return pack.data || {};
}

async function fetchAllFilteredCustomers() {
  const chunk = 200;
  let page = 1;
  let rows = [];
  let total = 0;
  while (true) {
    const data = await fetchCustomerPage(page, chunk);
    const part = data.result || [];
    total = parseTotalCount(data);
    rows = rows.concat(part);
    if (!part.length || rows.length >= total) break;
    page += 1;
    if (page > 500) break;
  }
  return rows;
}

function search() { currentPage = 1; load(); }
function clearFilters() {
  ["fKeyword"].forEach(id => document.getElementById(id).value = "");
  ["fState","fBaitai","fStatus","fNinzu","fYosan","fJikosikin","fMadori","fMenseki"].forEach(id => document.getElementById(id).value = "");
  search();
}
function toggleDetail() {
  showDetail = !showDetail;
  document.getElementById("detailFilters").style.display = showDetail ? "block" : "none";
  document.getElementById("btnDetail").textContent = (showDetail ? "▲" : "▼") + " 詳しい検索条件を設定する";
}

async function load() {
  document.getElementById("tableArea").innerHTML = '<div class="loading-spinner"></div>';
  document.getElementById("pagination").innerHTML = "";
  updateSelBtn();

  try {
    const data = await fetchCustomerPage(currentPage, LIMIT);
    customers = (data.result || []).slice().sort((a, b) => {
      const ta = toTimeOrZero(a["c.upd_date"]) || toTimeOrZero(a["c.ins_date"]);
      const tb = toTimeOrZero(b["c.upd_date"]) || toTimeOrZero(b["c.ins_date"]);
      if (tb !== ta) return tb - ta;
      const ida = String(a["c.id"] || "");
      const idb = String(b["c.id"] || "");
      return idb.localeCompare(ida, "ja");
    });
    totalCount = parseTotalCount(data);
    document.getElementById("totalLabel").textContent = `総件数: ${totalCount.toLocaleString()}件（ローカルDB・デジタライズへの通信なし）`;
    renderTable(); renderPagination();
    if (initialCid) {
      const idx = customers.findIndex((c) => String(c["c.id"] || "") === String(initialCid));
      if (idx >= 0) {
        openModal(idx);
        initialCid = "";
      } else if (currentPage * LIMIT < totalCount) {
        currentPage += 1;
        await load();
        return;
      } else {
        initialCid = "";
      }
    }
    refreshCacheStatus();
  } catch(e) {
    document.getElementById("tableArea").innerHTML = `<div class="error-box">⚠️ ${e.message}<br><small>初回は「全件同期」でデータを取り込んでください。</small></div>`;
  }
}

async function refreshCacheStatus() {
  const el = document.getElementById("cacheStatus");
  if (!el) return;
  try {
    const res = await fetch(`${CONFIG.API_BASE}/local/sync-status`, {
      headers: { Authorization: `Bearer ${Auth.getToken()}` },
    });
    const s = await res.json();
    if (!s.ok) return;
    if (!s.hasData && !s.rows_total) {
      el.textContent = "キャッシュ未構築 → 同期が必要です";
      return;
    }
    const t = (s.last_incremental_at || s.last_full_at || "").replace("T", " ").slice(0, 16);
    el.textContent = `キャッシュ ${(s.rows_total ?? 0).toLocaleString()}件${t ? " · 最終同期 " + t : ""}`;
  } catch (_) {
    el.textContent = "";
  }
}

async function runSync(mode) {
  const b1 = document.getElementById("btnSyncInc");
  const b2 = document.getElementById("btnSyncFull");
  if (b1) b1.disabled = true;
  if (b2) b2.disabled = true;
  try {
    const res = await fetch(`${CONFIG.API_BASE}/sync/customers`, {
      method: "POST",
      headers: {
        Authorization: `Bearer ${Auth.getToken()}`,
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ mode }),
    });
    const d = await res.json();
    if (!res.ok) throw new Error(d.message || "同期に失敗しました");
    if (d.ok === false) throw new Error(d.message || "同期に失敗しました");
    alert(d.message || `${mode === "full" ? "全件" : "差分"}同期: ${d.fetched ?? 0}件取得`);
    await load();
  } catch (e) {
    alert(e.message);
  } finally {
    if (b1) b1.disabled = false;
    if (b2) b2.disabled = false;
  }
}

function renderTable() {
  if (!customers.length) { document.getElementById("tableArea").innerHTML = '<div class="empty-msg">データが見つかりませんでした</div>'; return; }
  const cols = activeColumns.length ? activeColumns : [
    { key: "c.id", width: 100 }, { key: "c.name", width: 220 }, { key: "c.status", width: 140 },
    { key: "c.mail", width: 220 }, { key: "c.state", width: 120 }, { key: "c.city", width: 140 },
    { key: "c.baitai", width: 140 }, { key: "c.date_entry", width: 120 }, { key: "c.upd_date", width: 120 },
  ];
  let html = `<div class="table-scroll"><table class="list-table">
    <thead><tr>
      <th style="width:36px"><input type="checkbox" id="chkAll" onclick="toggleAllByScope()"></th>
      ${cols.map((c)=>`<th style="min-width:${Number(c.width||120)}px">${esc(fieldLabelOf(c))}</th>`).join("")}
    </tr></thead><tbody>`;
  customers.forEach((c, i) => {
    const id = c["c.id"];
    html += `<tr onclick="openModal(${i})">
      <td onclick="event.stopPropagation();toggleSel(${JSON.stringify(id)})"><input type="checkbox" ${selected.has(id)?"checked":""} onclick="event.stopPropagation();toggleSel(${JSON.stringify(id)})"></td>
      ${cols.map((x)=>`<td style="${x.key==='c.name'?'font-weight:600':''}">${listCellHtml(c, x.key)}</td>`).join("")}
    </tr>`;
  });
  html += "</tbody></table></div>";
  document.getElementById("tableArea").innerHTML = html;
}

function renderPagination() {
  const total = Math.ceil(totalCount / LIMIT);
  if (total <= 1) return;
  const start = Math.max(1, currentPage-4), end = Math.min(total, start+8);
  let html = `<button onclick="goPage(${currentPage-1})" ${currentPage===1?"disabled":""}>＜</button>`;
  for (let i = start; i <= end; i++) html += `<button class="${i===currentPage?"active":""}" onclick="goPage(${i})">${i}</button>`;
  html += `<button onclick="goPage(${currentPage+1})" ${currentPage===total?"disabled":""}>＞</button>`;
  document.getElementById("pagination").innerHTML = html;
}

function goPage(p) {
  const t = Math.ceil(totalCount/LIMIT);
  if (p<1||p>t) return;
  currentPage = p; load(); window.scrollTo(0,0);
}

function toggleSel(id) {
  if (selected.has(id)) selected.delete(id); else selected.add(id);
  updateSelBtn(); renderTable();
}
async function toggleAllByScope() {
  const scope = document.getElementById("selScope")?.value || "page";
  if (scope === "all") {
    if (selected.size >= totalCount && totalCount > 0) {
      selected = new Set();
      updateSelBtn();
      renderTable();
      return;
    }
    try {
      const allRows = await fetchAllFilteredCustomers();
      selected = new Set(allRows.map((c) => c["c.id"]).filter(Boolean));
      updateSelBtn();
      renderTable();
    } catch (e) {
      alert(e.message || "全顧客の選択に失敗しました");
    }
    return;
  }
  const pageIds = customers.map((c) => c["c.id"]).filter(Boolean);
  const allSelectedOnPage = pageIds.length > 0 && pageIds.every((id) => selected.has(id));
  if (allSelectedOnPage) pageIds.forEach((id) => selected.delete(id));
  else pageIds.forEach((id) => selected.add(id));
  updateSelBtn();
  renderTable();
}
function updateSelBtn() {
  const scope = document.getElementById("selScope")?.value || "page";
  if (scope === "all") {
    document.getElementById("btnSelAll").textContent = selected.size >= totalCount && totalCount > 0 ? "選択解除" : "全て選択";
  } else {
    const pageIds = customers.map((c) => c["c.id"]).filter(Boolean);
    const allSelectedOnPage = pageIds.length > 0 && pageIds.every((id) => selected.has(id));
    document.getElementById("btnSelAll").textContent = allSelectedOnPage ? "選択解除" : "全て選択";
  }
  document.getElementById("btnCsvSel").disabled = selected.size===0;
}

async function exportAll() {
  const allRows = await fetchAllFilteredCustomers();
  const cols = getAllCustomerFieldDefs(allRows);
  exportCSV(allRows, cols.map((c) => fieldLabelOf(c.key)), cols.map((c) => c.key), "顧客一覧.csv");
}
async function exportSelected() {
  const allRows = await fetchAllFilteredCustomers();
  const rows = allRows.filter(c=>selected.has(c["c.id"]));
  const cols = getAllCustomerFieldDefs(rows);
  exportCSV(rows, cols.map((c) => fieldLabelOf(c.key)), cols.map((c) => c.key), "顧客一覧_選択.csv");
}

async function printLabelsFromTemplate() {
  if (!selected.size) { alert("先に顧客を選択してください"); return; }
  try {
    const allRows = await fetchAllFilteredCustomers();
    const targets = allRows.filter((c) => selected.has(c["c.id"]));
    if (!targets.length) { alert("選択対象が見つかりませんでした"); return; }
    const res = await fetch(`${CONFIG.API_BASE}/${LABEL_TEMPLATE_URL}`);
    if (!res.ok) throw new Error("テンプレート読込に失敗しました");
    const buf = await res.arrayBuffer();
    const wb = XLSX.read(buf, { type: "array" });
    const templateSheetName = wb.SheetNames[0];
    const templateSheet = wb.Sheets[templateSheetName];
    const out = XLSX.utils.book_new();
    const printFields = (detailFieldConfig.length ? detailFieldConfig : CUSTOMER_FIELDS.map((f) => ({
      key: f.key, label: f.label, print: 1,
    }))).filter((f) => Number(f.print) !== 0 && f.key !== "c.id");
    const labelsByKey = Object.fromEntries(printFields.map((f) => [String(f.key || ""), String(f.label || f.key || "")]));

    const printAreaBySheet = [];
    targets.forEach((customer, idx) => {
      const ws = (typeof structuredClone === "function")
        ? structuredClone(templateSheet)
        : JSON.parse(JSON.stringify(templateSheet));
      fillLabelTemplateSheet(ws, customer, labelsByKey);
      const nameRaw = targets.length === 1 ? templateSheetName : `${templateSheetName}_${idx + 1}`;
      const name = String(nameRaw).slice(0, 31);
      XLSX.utils.book_append_sheet(out, ws, name || `Label_${idx + 1}`);
      // 非印刷領域をグレー表示させるため、印刷範囲を明示（G列開始）
      printAreaBySheet.push({
        name: name || `Label_${idx + 1}`,
        ref: `$G$1:$K$43`,
      });
    });
    if (!out.Workbook) out.Workbook = { Names: [] };
    if (!Array.isArray(out.Workbook.Names)) out.Workbook.Names = [];
    printAreaBySheet.forEach((it) => {
      out.Workbook.Names.push({
        Name: "_xlnm.Print_Area",
        Ref: `'${String(it.name).replace(/'/g, "''")}'!${it.ref}`,
      });
    });

    XLSX.writeFile(out, `label_print_${new Date().toISOString().slice(0,10)}.xlsx`);
  } catch (e) {
    alert(e.message || "ラベル印刷の出力に失敗しました");
  }
}

function fillLabelTemplateSheet(ws, customer, labelsByKey) {
  // テンプレート準拠: 1行目の高さを 60 に固定
  if (!Array.isArray(ws["!rows"])) ws["!rows"] = [];
  ws["!rows"][0] = { ...(ws["!rows"][0] || {}), hpx: 60, hpt: 45 };
  // テンプレート準拠: 左側ブロックの開始列を G に合わせる
  const G_COL_OFFSET = 6;

  const printVals = {};
  Object.keys(labelsByKey).forEach((k) => {
    const label = labelsByKey[k];
    const v = customer[k] == null ? "" : String(customer[k]);
    printVals[k] = v;
    printVals[label] = v;
  });
  printVals["顧客ID"] = customer["c.id"] == null ? "" : String(customer["c.id"]);

  const keys = Object.keys(ws || {}).filter((a) => !a.startsWith("!"));
  keys.forEach((addr) => {
    const cell = ws[addr];
    if (!cell || cell.t !== "s" || typeof cell.v !== "string") return;
    const src = cell.v;
    let replaced = src.replace(/\{\{\s*([^}]+?)\s*\}\}/g, (_, token) => {
      const key = String(token || "").trim();
      return Object.prototype.hasOwnProperty.call(printVals, key) ? (printVals[key] || "") : "";
    });
    if (replaced !== src) cell.v = replaced;

    const asLabel = src.trim();
    if (!Object.prototype.hasOwnProperty.call(printVals, asLabel)) return;
    const p = XLSX.utils.decode_cell(addr);
    const rightAddr = XLSX.utils.encode_cell({ r: p.r, c: p.c + 1 + G_COL_OFFSET });
    const curr = ws[rightAddr] || { t: "s", v: "" };
    curr.t = "s";
    curr.v = printVals[asLabel] || "";
    ws[rightAddr] = curr;
  });
}

function openModal(idx) {
  modalCustomerIdx = idx;
  const c = customers[idx];
  document.getElementById("modalTitle").textContent = `${c["c.name"]||""} ${c["c.kana"]?"（"+c["c.kana"]+"）":""}`;
  renderEditFields(c);
  bindModalDirtyTracking();
  setModalCustomerDirty(false);
  document.getElementById("shDate").value = new Date().toISOString().slice(0,10);
  document.getElementById("shStaff").value = Auth.getUser()?.name || "";
  document.getElementById("shType").value = "電話";
  document.getElementById("shResult").value = "未設定";
  document.getElementById("shDetail").value = "";
  document.getElementById("shMemo").value = "";
  document.getElementById("shNextDate").value = "";
  loadModalHistory(c["c.id"]);
  loadReactions(c["c.id"]);
  loadSalesHistory(c["c.id"]);
  loadCustomerFiles(c["c.id"]);
  document.getElementById("btnDetailConfig").style.display = isAdminRole() ? "inline-block" : "none";
  document.getElementById("historyHint").textContent = "";
  const modal = document.getElementById("modal");
  modal.style.display = "flex";
  requestAnimationFrame(() => modal.classList.add("open"));
}
function closeModal() {
  if (modalCustomerDirty) {
    if (!confirm("未保存の変更があります。保存せずに閉じますか？")) return;
  }
  const modal = document.getElementById("modal");
  modal.classList.remove("open");
  setTimeout(() => {
    if (!modal.classList.contains("open")) modal.style.display = "none";
  }, 220);
  modalCustomerIdx = null;
  setModalCustomerDirty(false);
}

(async () => {
  if (!await requireAuth()) return;
  window.addEventListener("beforeunload", (e) => {
    if (!modalCustomerDirty) return;
    e.preventDefault();
    e.returnValue = "";
  });

})();
